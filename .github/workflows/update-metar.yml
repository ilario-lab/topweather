name: Aggiorna METAR Europa

on:
  schedule:
    - cron: '*/30 * * * *'  # Ogni 30 minuti
  workflow_dispatch:

jobs:
  update-metar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Scarica METAR Europa e Russia
        run: |
          mkdir -p metar
          python3 << 'PYEOF'
          import urllib.request, json, datetime

          # Tutte le stazioni Italia + Europa + Russia
          # Usa l'API NOAA che supporta filtro per paese/regione
          REGIONS = [
              # Italia
              'LI', 'LI',
              # Europa occidentale
              'EG', 'EH', 'EB', 'ED', 'ET', 'LF', 'LE', 'LP', 'LI',
              'LZ', 'LK', 'LO', 'LH', 'LY', 'LJ', 'LD', 'LW', 'LB',
              'LG', 'LT', 'LC', 'LM', 'LX', 'LS', 'GC', 'GE', 'GM',
              # Europa settentrionale
              'EK', 'EN', 'EF', 'EV', 'EY', 'EE', 'ES', 'EI', 'EI',
              'BI', 'BG',
              # Europa orientale / Russia
              'UK', 'UM', 'UB', 'UG', 'UT', 'UW', 'UU', 'UL', 'UI',
              'UK', 'EP', 'EV', 'EY', 'EE',
              'UR', 'US', 'UN', 'UO', 'UH',
          ]

          # Rimuovi duplicati
          prefixes = list(dict.fromkeys(REGIONS))

          # Scarica tutti i METAR Europa in una sola chiamata
          url = 'https://aviationweather.gov/api/data/metar?format=json&hours=2&bbox=25,-30,75,60'
          # bbox: lat_min, lon_min, lat_max, lon_max (Europa intera + Russia europea)

          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'TopWeather/1.0'})
              with urllib.request.urlopen(req, timeout=60) as r:
                  data = json.loads(r.read())
              print(f"Scaricati {len(data)} METAR")
          except Exception as e:
              print(f"Errore bbox Europa: {e}")
              data = []

          # Scarica anche Russia asiatica
          url2 = 'https://aviationweather.gov/api/data/metar?format=json&hours=2&bbox=40,60,75,180'
          try:
              req2 = urllib.request.Request(url2, headers={'User-Agent': 'TopWeather/1.0'})
              with urllib.request.urlopen(req2, timeout=60) as r:
                  data2 = json.loads(r.read())
              print(f"Scaricati {len(data2)} METAR Russia asiatica")
              data += data2
          except Exception as e:
              print(f"Errore Russia: {e}")

          # Crea indice per ICAO
          index = {}
          for m in data:
              icao = m.get('icaoId', '')
              if icao:
                  index[icao] = m

          print(f"Totale stazioni: {len(index)}")

          # Salva
          output = {
              'updated': datetime.datetime.utcnow().isoformat() + 'Z',
              'count': len(index),
              'stations': index
          }

          with open('metar/data.json', 'w') as f:
              json.dump(output, f)

          print("Salvato metar/data.json")
          PYEOF

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metar/
          git diff --staged --quiet || git commit -m "METAR aggiornati $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
