      <div style="font-size:10px;color:var(--muted)">🌅 ${fmt(sun.rise)}</div>
      <div style="font-size:10px;color:var(--muted)">🌇 ${fmt(sun.set)}</div>
      <div style="font-size:10px;color:var(--muted)">${moon.icon} ${fmtDur(sun.dayLen)}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <style>
      .eff-city-banner { display:flex; align-items:center; gap:10px; margin:0 16px 12px;
        background:var(--glass); border:1px solid var(--glass-border); border-radius:14px;
        padding:12px 14px; }
      .eff-city-icon { font-size:26px; flex-shrink:0; }
      .eff-city-name { font-size:15px; font-weight:700; color:var(--text); }
      .eff-city-sub  { font-size:10px; color:var(--muted); margin-top:1px; }
      .eff-card { background:var(--glass); border:1px solid var(--glass-border);
        border-radius:16px; padding:14px 16px; margin:0 16px 12px; }
      .eff-title { font-size:10px; font-weight:700; letter-spacing:1px;
        color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
      .eff-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
      .eff-icon { font-size:22px; width:30px; text-align:center; flex-shrink:0; }
      .eff-label { font-size:11px; color:var(--muted); }
      .eff-value { font-size:14px; font-weight:700; color:var(--text); }
      .eff-sub   { font-size:10px; color:var(--muted); }
      .eff-timeline { position:relative; height:28px; background:rgba(255,255,255,0.04);
        border-radius:14px; margin:10px 0; overflow:hidden; }
      .eff-daybar { position:absolute; top:0; height:100%; background:linear-gradient(90deg,#f5a623,#ffe082,#f5a623);
        border-radius:14px; opacity:0.35; }
      .eff-now-tick { position:absolute; top:0; width:2px; height:100%; background:#fff; border-radius:1px; }
      .eff-tl-label { display:flex; justify-content:space-between; font-size:9px; color:var(--muted); }
      .eff-7day { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:0 16px 12px; }
      .moon-bar-wrap { height:8px; background:rgba(255,255,255,0.08); border-radius:4px; margin-top:4px; overflow:hidden; }
      .moon-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,#a0a0c0,#e8e8ff); }
    </style>

    <!-- Banner città -->
    <div class="eff-city-banner">
      <div class="eff-city-icon">📍</div>
      <div>
        <div class="eff-city-name">${city}</div>
        <div class="eff-city-sub">${region ? region + ' · ' : ''}${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E</div>
      </div>
    </div>

    <!-- Card sole oggi -->
    <div class="eff-card">
      <div class="eff-title">☀️ Sole — Oggi ${today.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})}</div>
      ${main.sun ? `
        <!-- Barra giornata -->
        <div class="eff-timeline">
          ${(() => {
            const midnight = new Date(today); midnight.setHours(0,0,0,0);
            const dayMs = 86400000;
            const rPct = ((main.sun.dawn - midnight) / dayMs * 100).toFixed(1);
            const sPct = ((main.sun.dusk  - midnight) / dayMs * 100).toFixed(1);
            const width = (sPct - rPct).toFixed(1);
            const nowPct = ((today - midnight) / dayMs * 100).toFixed(1);
            return `<div class="eff-daybar" style="left:${rPct}%;width:${width}%"></div>
                    <div class="eff-now-tick" style="left:${nowPct}%"></div>`;
          })()}
        </div>
        <div class="eff-tl-label"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>
        <div style="height:10px"></div>
        <div class="eff-row"><div class="eff-icon">🌅</div><div><div class="eff-label">Alba</div><div class="eff-value">${fmt(main.sun.rise)}</div></div><div style="margin-left:auto"><div class="eff-label">Crepuscolo mattutino</div><div class="eff-sub">${fmt(main.sun.dawn)}</div></div></div>
        <div class="eff-row"><div class="eff-icon">🌞</div><div><div class="eff-label">Mezzogiorno solare</div><div class="eff-value">${fmt(main.sun.transit)}</div></div><div style="margin-left:auto"><div class="eff-label">Elevazione max</div><div class="eff-sub">${main.sun.elevation}°</div></div></div>
        <div class="eff-row"><div class="eff-icon">🌇</div><div><div class="eff-label">Tramonto</div><div class="eff-value">${fmt(main.sun.set)}</div></div><div style="margin-left:auto"><div class="eff-label">Crepuscolo serale</div><div class="eff-sub">${fmt(main.sun.dusk)}</div></div></div>
        <div class="eff-row"><div class="eff-icon">⏱</div><div><div class="eff-label">Durata del giorno</div><div class="eff-value">${fmtDur(main.sun.dayLen)}</div></div><div style="margin-left:auto"><div class="eff-label">Declinazione solare</div><div class="eff-sub">${main.sun.decl}°</div></div></div>
      ` : '<div style="color:var(--muted);font-size:12px">Sole sempre sotto l\'orizzonte o sempre sopra.</div>'}
    </div>

    <!-- Card luna -->
    <div class="eff-card">
      <div class="eff-title">🌙 Luna — Fase attuale</div>
      <div class="eff-row">
        <div style="font-size:48px;line-height:1">${main.moon.icon}</div>
        <div style="flex:1">
          <div class="eff-value">${main.moon.name}</div>
          <div class="eff-label" style="margin-top:2px">Illuminazione ${(main.moon.pct < 0.5 ? main.moon.pct*2 : (1-main.moon.pct)*2)*100|0}%</div>
          <div class="moon-bar-wrap"><div class="moon-bar" style="width:${(main.moon.pct < 0.5 ? main.moon.pct*2 : (1-main.moon.pct)*2)*100|0}%"></div></div>
          <div class="eff-sub" style="margin-top:4px">Giorno ${main.moon.phase.toFixed(1)} / 29.5 del ciclo</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px">
        ${[['🌑','Nuova',0],['🌓','I Quarto',7.4],['🌕','Piena',14.8],['🌗','III Quarto',22.1]].map(([ic,nm,day])=>{
          const d2 = new Date(today);
          const diff = ((day - main.moon.phase) + 29.53) % 29.53;
          d2.setDate(today.getDate() + Math.round(diff));
          return `<div style="text-align:center;background:rgba(255,255,255,0.04);border-radius:10px;padding:8px 4px">
            <div style="font-size:20px">${ic}</div>
            <div style="font-size:9px;color:var(--muted);margin-top:2px">${nm}</div>
            <div style="font-size:10px;font-weight:700;color:var(--text)">${d2.getDate()} ${['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][d2.getMonth()]}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Card stagione -->
    <div class="eff-card">
      <div class="eff-title">🗓 Stagione & Anno Solare</div>
      <div class="eff-row"><div class="eff-icon" style="font-size:28px">${stagione.split(' ')[0]}</div>
        <div><div class="eff-value">${stagione.split(' ').slice(1).join(' ')}</div>
          <div class="eff-sub">Inizio astronomico: ${solstizio}</div></div>
      </div>
    </div>

    <!-- 7 giorni -->
    <div style="padding:0 16px 6px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase">Prossimi 6 giorni</div>
    <div class="eff-7day">${dayCards}</div>
    <div class="last-updated" style="margin:4px 16px 12px">Calcolo astronomico locale · Algoritmo Jean Meeus</div>
  `;
}
</script>


</body>
</html>
