// Cache piste fetched da OurAirports
const rwyCache = {};
// Pista corrente selezionata
let currentRwyHdg = 150;
let currentRwyLabel = '15/33';
let currentRwyAll = [{ name:'15/33', hdg:150, label:'15/33' }];

async function fetchRunways(icao) {
  // Prima controlla cache e DB locale
  if (rwyCache[icao]) return rwyCache[icao];
  if (RWY_DB[icao])   { rwyCache[icao] = RWY_DB[icao]; return RWY_DB[icao]; }

  // Fallback: prova a ottenere i dati da aviationweather.gov (stesso dominio del METAR)
  try {
    const r = await fetch(
      `https://aviationweather.gov/api/data/airport?ids=${icao}&format=json`,
      { signal: AbortSignal.timeout(5000) }
    );
    if (r.ok) {
      const data = await r.json();
      const apt = Array.isArray(data) ? data[0] : data;
      // aviationweather restituisce il campo 'rwy' con le piste
      if (apt?.rwy?.length) {
        const runways = apt.rwy.map(rw => {
          const hdg = Math.round(parseFloat(rw.heading) || 90);
          const label = (rw.id || '09/27').replace('C','').replace('L','').replace('R','');
          return { name: rw.id || '09/27', hdg, label };
        });
        rwyCache[icao] = runways;
        return runways;
      }
    }
  } catch(e) {}

  // Fallback finale: pista generica basata sulle prime due cifre del codice
  const fallback = [{ name: '09/27', hdg: 90, label: '09/27' }];
  rwyCache[icao] = fallback;
  return fallback;
}

function renderCrosswindWidget(wdir, wspd, wgst, runways) {
  const el = document.getElementById('cw-widget');
  if (!el) return;

  // Usa le piste passate o quelle correnti
  if (runways) {
    currentRwyAll  = runways;
    currentRwyHdg   = runways[0].hdg;
    currentRwyLabel = runways[0].label;
  }

  if (wdir == null || wspd == null || (wdir === 0 && wspd === 0)) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">
      Vento calma — nessuna componente significativa.</div>`;
    return;
  }

  const RWY_HDG = currentRwyHdg;

  // Selettore pista (se più di una)
  const rwySelector = currentRwyAll.length > 1
    ? `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
        ${currentRwyAll.map((rwy, i) => `
          <button onclick="selectRunway(${i},${wdir},${wspd},${wgst||'null'})"
            style="flex:1;padding:6px 10px;border-radius:10px;font-size:11px;font-weight:600;
              font-family:'Outfit',sans-serif;cursor:pointer;
              border:1px solid ${rwy.hdg===currentRwyHdg ? 'rgba(99,202,255,0.4)' : 'var(--border)'};
              background:${rwy.hdg===currentRwyHdg ? 'rgba(99,202,255,0.12)' : 'var(--glass)'};
              color:${rwy.hdg===currentRwyHdg ? '#63caff' : 'var(--muted)'}">
            RWY ${rwy.label}
          </button>`).join('')}
      </div>`
    : '';

  // Calcolo componenti
  const rad = Math.PI / 180;
  const relAngle = ((wdir - RWY_HDG) + 360) % 360;
  const relRad   = relAngle * rad;
  const headwind  = Math.round(wspd * Math.cos(relRad));
  const crosswind = Math.round(Math.abs(wspd * Math.sin(relRad)));
  const cwDir     = Math.sin(relRad) >= 0 ? 'D→' : '←S';
  let cwGust = null, hwGust = null;
  if (wgst) {
    cwGust = Math.round(Math.abs(wgst * Math.sin(relRad)));
    hwGust = Math.round(wgst * Math.cos(relRad));
  }

  const cwColor = crosswind < 10 ? 'cw-ok' : crosswind < 15 ? 'cw-warn' : 'cw-crit';
  const hwLabel = headwind >= 0 ? '⬆ Vento contrario' : '⬇ Vento in coda';
  const hwColor = headwind < 0 ? 'cw-warn' : 'cw-ok';

  // Canvas
  const size = 130;
  const cx = size / 2, cy = size / 2, r = 50;
  const windFromAngle = (wdir - 90) * rad;
  const wxEnd = cx + r * Math.cos(windFromAngle);
  const wyEnd = cy + r * Math.sin(windFromAngle);
  const rwyAngle1 = (RWY_HDG - 90) * rad;
  const rwyAngle2 = (RWY_HDG + 180 - 90) * rad;
  const rx1 = cx + (r + 2) * Math.cos(rwyAngle1);
  const ry1 = cy + (r + 2) * Math.sin(rwyAngle1);
  const rx2 = cx + (r + 2) * Math.cos(rwyAngle2);
  const ry2 = cy + (r + 2) * Math.sin(rwyAngle2);

  // Label pista: numero corto (es. "15" e "33")
  const parts = currentRwyLabel.split('/');
  const lbl1 = parts[0] || '??';
  const lbl2 = parts[1] || '??';

  el.innerHTML = `
    <div style="font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
      color:#63caff;opacity:0.85;margin-bottom:12px">💨 Crosswind — Pista ${currentRwyLabel}</div>
    ${rwySelector}
    <div class="cw-main">
      <div class="cw-canvas-wrap">
        <canvas id="cw-canvas" width="${size}" height="${size}"></canvas>
      </div>
      <div class="cw-stats">
        <div class="cw-stat">
          <div class="cw-stat-label">💨 Crosswind (${cwDir})</div>
          <div class="cw-stat-val ${cwColor}">${crosswind} kt${cwGust ? ' / ' + cwGust + ' kt' : ''}</div>
        </div>
        <div class="cw-stat">
          <div class="cw-stat-label">${hwLabel}</div>
          <div class="cw-stat-val ${hwColor}">${Math.abs(headwind)} kt${hwGust ? ' / ' + Math.abs(hwGust) + ' kt' : ''}</div>
        </div>
        <div class="cw-stat">
          <div class="cw-stat-label">🌬 Vento rilevato</div>
          <div class="cw-stat-val" style="font-size:14px;color:var(--text)">${wdir}° / ${wspd} kt${wgst ? ' (raffica ' + wgst + ' kt)' : ''}</div>
        </div>
      </div>
    </div>
    <div class="cw-limits">
      <div class="cw-limit">
        <div class="cw-limit-label">Limite XW leggeri</div>
        <div class="cw-limit-val ${crosswind < 15 ? 'cw-ok' : 'cw-crit'}">15 kt — ${crosswind < 15 ? '✓ OK' : '✗ OLTRE'}</div>
      </div>
      <div class="cw-limit">
        <div class="cw-limit-label">Limite XW ICAO</div>
        <div class="cw-limit-val ${crosswind < 20 ? 'cw-ok' : 'cw-crit'}">20 kt — ${crosswind < 20 ? '✓ OK' : '✗ OLTRE'}</div>
      </div>
      <div class="cw-limit">
        <div class="cw-limit-label">Pista attiva</div>
        <div class="cw-limit-val" style="color:#63caff">RWY ${headwind >= 0 ? lbl1 : lbl2}</div>
      </div>
    </div>
  `;

  // Disegna canvas
  setTimeout(() => {
    const canvas = document.getElementById('cw-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    [r*0.5, r*0.25].forEach(rr => {
      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
    });
    ctx.beginPath(); ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry2);
    ctx.strokeStyle = 'rgba(99,202,255,0.6)'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

    // Etichette pista dentro il cerchio
    ctx.font = 'bold 10px Outfit'; ctx.fillStyle = '#63caff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const labelR = r - 12;
    ctx.fillText(lbl2, cx + labelR * Math.cos(rwyAngle1), cy + labelR * Math.sin(rwyAngle1));
    ctx.fillText(lbl1, cx + labelR * Math.cos(rwyAngle2), cy + labelR * Math.sin(rwyAngle2));

    // Freccia vento
    const arrowColor = crosswind < 10 ? '#4ade80' : crosswind < 15 ? '#fbbf24' : '#f87171';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(wxEnd, wyEnd);
    ctx.strokeStyle = arrowColor; ctx.lineWidth = 2.5; ctx.stroke();
    const ang = Math.atan2(wyEnd - cy, wxEnd - cx);
    ctx.beginPath();
    ctx.moveTo(wxEnd, wyEnd);
    ctx.lineTo(wxEnd - 8*Math.cos(ang-0.4), wyEnd - 8*Math.sin(ang-0.4));
    ctx.lineTo(wxEnd - 8*Math.cos(ang+0.4), wyEnd - 8*Math.sin(ang+0.4));
    ctx.closePath(); ctx.fillStyle = arrowColor; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();

    // Cardinali
    ctx.font = '9px Outfit'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', cx, 8); ctx.fillText('S', cx, size-8);
    ctx.fillText('E', size-6, cy); ctx.fillText('O', 6, cy);
  }, 50);
}

function selectRunway(idx, wdir, wspd, wgst) {
  if (!currentRwyAll[idx]) return;
  currentRwyHdg   = currentRwyAll[idx].hdg;
  currentRwyLabel = currentRwyAll[idx].label;
  renderCrosswindWidget(wdir, wspd, wgst || null);
}

function metarSearch() {
  const v = document.getElementById('metar-icao-input').value.trim().toUpperCase();
  if (v.length === 4) fetchMetar(v);
}

async function fetchMetar(icao) {
  metarStationId = icao;
  const body = document.getElementById('metar-body');
  if (!body) return;
  body.innerHTML = `<div class="loading"><div class="loading-icon">📡</div><div class="loading-text">Carico ${icao}...</div></div>`;

  const METAR_URL = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
  const TAF_URL   = `https://aviationweather.gov/api/data/taf?ids=${icao}&format=json`;

  // fetch con timeout via AbortController
  const ft = (url, ms=8000) => {
    const c = new AbortController();
    const id = setTimeout(() => c.abort(), ms);
    return fetch(url, {signal: c.signal}).finally(() => clearTimeout(id));
  };

  // Prova a parsare JSON in modo sicuro
  const safeJson = async (res) => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  };

  // 4 strategie diverse — la prima che risponde vince
  const tryStrategy = async (label) => {
    if (label === 'direct') {
      // Strategia 1: API diretta (funziona se il browser/CDN non blocca CORS)
      const [m, t] = await Promise.all([
        ft(METAR_URL, 6000).then(safeJson),
        ft(TAF_URL, 6000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'corsproxy') {
      const P = 'https://corsproxy.io/?url=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 9000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   9000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'allorigins') {
      const P = 'https://api.allorigins.win/get?url=';
      const [mr, tr] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(r => r.json()),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(r => r.json()).catch(() => ({contents:'[]'})),
      ]);
      const m = JSON.parse(mr.contents || '[]');
      const t = JSON.parse(tr.contents || '[]');
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'codetabs') {
      const P = 'https://api.codetabs.com/v1/proxy?quest=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
  };

  const strategies = ['direct', 'corsproxy', 'allorigins', 'codetabs'];

  for (let i = 0; i < strategies.length; i++) {
    try {
      const result = await tryStrategy(strategies[i]);
      if (!result.m) throw new Error('empty response');
      renderMetarResult(result.m, result.t, icao);
      return;
    } catch (e) {
      console.warn(`METAR strategy ${strategies[i]} failed:`, e.message);
      if (i < strategies.length - 1) {
        body.innerHTML = `<div class="loading">
          <div class="loading-icon">📡</div>
          <div class="loading-text">Fonte ${i+1} non disponibile, provo alternativa ${i+2}/${strategies.length}...</div>
        </div>`;
      }
    }
  }

  // Tutte le fonti fallite
  body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
    <div style="font-size:28px">⚠️</div>
    <div style="margin-top:8px;font-size:13px">Nessun servizio ha risposto per <b>${icao}</b>.<br>
    <span style="font-size:11px;opacity:.7">Controlla il codice ICAO e la connessione, poi riprova.</span></div>
    <button onclick="fetchMetar('${icao}')" style="margin-top:14px;padding:8px 20px;
      border-radius:10px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:12px;font-weight:700">
      ↺ Riprova
    </button>
  </div>`;
}

function metarWxIcon(wx) {
  if (!wx) return '';
  if (wx.includes('TS')) return '⛈';
  if (wx.includes('RA') || wx.includes('DZ')) return '🌧';
  if (wx.includes('SN') || wx.includes('GS')) return '❄️';
  if (wx.includes('FG') || wx.includes('BR')) return '🌫';
  if (wx.includes('HZ')) return '😶‍🌫️';
  if (wx.includes('SQ') || wx.includes('FC')) return '🌪';
  return '🌦';
}

function flightRule(vis, ceil) {
  // vis in statute miles, ceil in feet
  if (ceil < 500 || vis < 1) return ['LIFR','fr-lifr'];
  if (ceil < 1000 || vis < 3) return ['IFR','fr-ifr'];
  if (ceil < 3000 || vis < 5) return ['MVFR','fr-mvfr'];
  return ['VFR','fr-vfr'];
}

function renderMetarResult(m, taf, icao) {
  const body = document.getElementById('metar-body');
  if (!m) {
    body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
      <div style="font-size:28px">🚫</div><div>Nessun METAR disponibile per ${icao}.<br>Verifica il codice ICAO.</div></div>`;
    return;
  }

  // --- decodifica METAR ---
  const wind = m.wdir != null
    ? `${m.wdir === 0 && m.wspd === 0 ? 'CALMA' : m.wdir + '°'} ${m.wspd || 0} kt${m.wgst ? ' / Raffica ' + m.wgst + ' kt' : ''}`
    : 'N/D';
  const vis  = m.visib != null ? (m.visib >= 9999 ? '≥10 km' : m.visib + ' SM') : 'N/D';
  const temp = m.temp  != null ? m.temp + ' °C' : 'N/D';
  const dewp = m.dewp  != null ? m.dewp + ' °C' : 'N/D';
  const altim = m.altim != null ? m.altim.toFixed(0) + ' hPa' : 'N/D';
  const wxStr = (m.wxString || '').trim();
  const wxIcon = metarWxIcon(wxStr);

  // Sky condition
  const skyMap = { SKC:'Cielo libero', CLR:'Cielo libero', FEW:'Poche nuvole', SCT:'Nuvolosità variabile', BKN:'Molto nuvoloso', OVC:'Coperto', VV:'Visibilità verticale' };
  const skyChips = (m.clouds || []).map(c => {
    // aviationweather.gov: c.base è in centinaia di piedi (es. 25 = 2500 ft)
    // Ma alcuni proxy potrebbero restituirlo già in piedi interi
    // Heuristica: se base < 1000 è quasi certamente in centinaia di ft
    const raw = parseFloat(c.base);
    if (c.base == null || isNaN(raw)) {
      return `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover}</span>`;
    }
    const ftVal = raw < 1000 ? raw * 100 : raw; // centinaia → piedi
    const mVal  = Math.round(ftVal * 0.3048);
    return `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover} · ${ftVal.toLocaleString('it-IT')} ft (${mVal} m)</span>`;
  }).join('');

  // Ceiling for flight rules (in feet)
  const bknovc = (m.clouds||[]).filter(c=>['BKN','OVC','VV'].includes(c.cover));
  const ceil = bknovc.length ? Math.min(...bknovc.map(c => {
    const raw = parseFloat(c.base);
    return isNaN(raw) ? 99999 : (raw < 1000 ? raw * 100 : raw);
  })) : 99999;
  const [fr, frClass] = flightRule(m.visib || 99, ceil);

  // Orario
  const obsTime = m.reportTime ? new Date(m.reportTime).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+' UTC' : '';

  // --- TAF ---
  let tafHTML = '<div style="padding:0 16px 8px;color:var(--muted);font-size:12px">Nessun TAF disponibile.</div>';
  if (taf && taf.rawTAF) {
    // Mostra TAF grezzo con parsing basilare
    const lines = taf.rawTAF.replace(/\n/g,' ').split(/(TEMPO|BECMG|FM\d{6}|PROB\d{2}\s+TEMPO|PROB\d{2})/)
      .filter(s=>s.trim());
    let tafParsed = '';
    let mainBlock = true;
    for (let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      if (!l) continue;
      if (/^(TEMPO|BECMG|FM\d{6}|PROB\d{2})/.test(l)) {
        // keyword, next is content
        const keyword = l;
        const content = lines[i+1] ? lines[i+1].trim() : '';
        i++;
        const kLabel = keyword.startsWith('FM') ? '⏩ Da '+keyword.slice(2)
          : keyword.startsWith('TEMPO') ? '⚡ Temporaneamente'
          : keyword.startsWith('BECMG') ? '🔄 In evoluzione'
          : keyword.startsWith('PROB') ? '🎲 '+keyword
          : keyword;
        tafParsed += `<div class="taf-line"><div class="taf-period">${kLabel}</div><div class="taf-text">${content}</div></div>`;
      } else if (mainBlock) {
        tafParsed += `<div class="taf-line"><div class="taf-period">📋 Previsione base</div><div class="taf-text">${l}</div></div>`;
        mainBlock = false;
      }
    }
    const tafValidity = taf.validTimeFrom && taf.validTimeTo
      ? `Valido: ${new Date(taf.validTimeFrom * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} → ${new Date(taf.validTimeTo * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} UTC`
      : '';
    tafHTML = `
      <div class="metar-card">
        <div class="metar-card-title">📋 TAF — ${icao} <span style="font-weight:400;font-size:9px;margin-left:auto">${tafValidity}</span></div>
        <div class="metar-raw">${taf.rawTAF || ''}</div>
        <div>${tafParsed}</div>
      </div>`;
  }

  body.innerHTML = `
    <div class="metar-time">📡 Osservazione: ${obsTime}</div>
    <div class="metar-card">
      <div class="metar-card-title">
        <span class="metar-cond">${wxIcon||'🌡'}</span>
        METAR — ${m.name||icao}
        <span class="metar-flight-rule ${frClass}">${fr}</span>
      </div>
      <div class="metar-raw">${m.rawOb || ''}</div>
      <div class="metar-grid">
        <div class="metar-item"><div class="metar-item-lbl">🌡 Temperatura</div><div class="metar-item-val">${temp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💧 Punto di rugiada</div><div class="metar-item-val">${dewp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💨 Vento</div><div class="metar-item-val" style="font-size:12px">${wind}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">👁 Visibilità</div><div class="metar-item-val">${vis}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">🔵 Pressione QNH</div><div class="metar-item-val">${altim}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">☁️ Nuvolosità</div>
          <div class="metar-sky">${skyChips||'<span class="metar-sky-chip">N/D</span>'}</div>
        </div>
      </div>
      ${wxStr ? `<div class="metar-sky" style="margin-top:10px"><span class="metar-wx-chip">${wxIcon} ${wxStr}</span></div>` : ''}
    </div>
    ${tafHTML}
    <div class="last-updated" style="margin:4px 16px 12px">Fonte: NOAA Aviation Weather Center · aviationweather.gov</div>
  `;
  // Dopo aver renderizzato il METAR, carica piste e widget crosswind
  renderGpsSatCard();
  fetchRunways(icao).then(runways => {
    renderCrosswindWidget(m.wdir, m.wspd, m.wgst || null, runways);
  });
}

// Propagazione SGP4 semplificata
function satElevation(line1, line2, lat, lon, now) {
  try {
    const rad = Math.PI / 180;
    const incl = parseFloat(line2.slice(8,16)) * rad;
    const raan = parseFloat(line2.slice(17,25)) * rad;
    const ecc  = parseFloat('0.' + line2.slice(26,33).trim());
    const argp = parseFloat(line2.slice(34,42)) * rad;
    const mm   = parseFloat(line2.slice(52,63));
    const ma0  = parseFloat(line2.slice(43,51)) * rad;
    const epoch = line1.slice(18,32);
    const ey = parseInt(epoch.slice(0,2));
    const year = ey < 57 ? 2000 + ey : 1900 + ey;
    const doy  = parseFloat(epoch.slice(2));
    const epochMs = Date.UTC(year, 0, 1) + (doy - 1) * 86400000;
    const dt_s = (now - epochMs) / 1000;

    const n  = mm * 2 * Math.PI / 86400;
    const M  = (ma0 + n * dt_s) % (2 * Math.PI);
    let E = M;
    for (let i = 0; i < 15; i++) E = M + ecc * Math.sin(E);
    const nu = 2 * Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));

    const mu = 398600.4418;
    const a  = Math.pow(mu / (n*n), 1/3);
    const r  = a * (1 - ecc * Math.cos(E));
    const xo = r * Math.cos(nu), yo = r * Math.sin(nu);

    const cr=Math.cos(raan), sr=Math.sin(raan);
    const ci=Math.cos(incl), si=Math.sin(incl);
    const ca=Math.cos(argp), sa=Math.sin(argp);

    const x = (cr*ca-sr*sa*ci)*xo + (-cr*sa-sr*ca*ci)*yo;
    const y = (sr*ca+cr*sa*ci)*xo + (-sr*sa+cr*ca*ci)*yo;
    const z = (sa*si)*xo + (ca*si)*yo;

    const JD = now/86400000 + 2440587.5;
    const T  = (JD - 2451545.0) / 36525.0;
    const gmst = (280.46061837 + 360.98564736629*(JD-2451545.0) + T*T*(0.000387933-T/38710000)) % 360;
    const gr = gmst * rad;

    const xe = x*Math.cos(gr) + y*Math.sin(gr);
    const ye = -x*Math.sin(gr) + y*Math.cos(gr);
    const ze = z;

    const latr=lat*rad, lonr=lon*rad, Re=6378.137;
    const x0=Re*Math.cos(latr)*Math.cos(lonr);
    const y0=Re*Math.cos(latr)*Math.sin(lonr);
    const z0=Re*Math.sin(latr);

    const dx=xe-x0, dy=ye-y0, dz=ze-z0;
    const S  = Math.sin(latr)*Math.cos(lonr)*dx + Math.sin(latr)*Math.sin(lonr)*dy - Math.cos(latr)*dz;
    const E2 = -Math.sin(lonr)*dx + Math.cos(lonr)*dy;
    const Z  = Math.cos(latr)*Math.cos(lonr)*dx + Math.cos(latr)*Math.sin(lonr)*dy + Math.sin(latr)*dz;
    const rng = Math.sqrt(S*S+E2*E2+Z*Z);
    const el = Math.asin(Z/rng)/rad;
    const az = (Math.atan2(-E2,S)/rad+360)%360;
    return { el, az, range: rng };
  } catch(e) { return null; }
}

function renderGpsSatCard() {
  // Inietta il card GPS satelliti nel pannello METAR (indipendente dal caricamento METAR)
  const panel = document.getElementById('panel-metar');
  if (!panel) return;
  if (document.getElementById('gps-sat-card')) return; // già presente

  const card = document.createElement('div');
  card.id = 'gps-sat-card';
  card.style.cssText = 'margin:0 16px 12px';
  card.innerHTML = `
    <div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:14px 16px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">
        🛰 Satelliti GNSS visibili
      </div>
      <div id="gps-sat-body">
        <button onclick="initGpsSat()" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--glass-border);
          background:var(--glass);color:var(--text);font-size:13px;cursor:pointer">
          📡 Richiedi posizione GPS
        </button>
      </div>
    </div>`;
  panel.appendChild(card);
}

// ── Auto-aggiornamento TLE da Celestrak con cache localStorage ────────────
const TLE_CACHE_KEY = 'gnss_tle_cache';
const TLE_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 ore

const CELESTRAK_URLS = {
  GPS:     'https://celestrak.org/NORAD/elements/gp.php?GROUP=gps-ops&FORMAT=json',
  GLONASS: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=glo-ops&FORMAT=json',
  GALILEO: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=galileo&FORMAT=json',
  BEIDOU:  'https://celestrak.org/NORAD/elements/gp.php?GROUP=beidou&FORMAT=json',
};

function parseCelestrakJSON(jsonData) {
  // Celestrak JSON OMM format → array di {name, line1, line2}
  return jsonData.map(o => {
    const name  = (o.OBJECT_NAME || '').trim();
    const line1 = (o.TLE_LINE1 || '').trim();
    const line2 = (o.TLE_LINE2 || '').trim();
    if (line1.startsWith('1 ') && line2.startsWith('2 ')) return { name, line1, line2 };
    return null;
  }).filter(Boolean);
}

async function fetchFreshTLE(statusCallback) {
  // 1. Controlla cache localStorage
  try {
    const cached = localStorage.getItem(TLE_CACHE_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < TLE_CACHE_TTL) {
        statusCallback('cache');
        return data;
      }
    }
  } catch(e) {}

  // 2. Prova a scaricare da Celestrak (funziona dal browser reale)
  statusCallback('fetch');
  const result = {};
  let anyOk = false;
  for (const [id, url] of Object.entries(CELESTRAK_URLS)) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      const sats = parseCelestrakJSON(json);
      if (sats.length > 0) { result[id] = sats; anyOk = true; }
    } catch(e) {
      result[id] = null; // useremo fallback per questa costellazione
    }
  }

  if (anyOk) {
    // Completa le costellazioni fallite con i dati embedded
    for (const id of Object.keys(EMBEDDED_TLE)) {
      if (!result[id] || result[id].length === 0) result[id] = EMBEDDED_TLE[id];
    }
    // Salva in cache
    try { localStorage.setItem(TLE_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: result })); } catch(e) {}
    statusCallback('live');
    return result;
  }

  // 3. Fallback: dati embedded
  statusCallback('embedded');
  return EMBEDDED_TLE;
}

let tleSource = 'embedded'; // 'embedded' | 'cache' | 'live'
let activeTLE = EMBEDDED_TLE;

async function initGpsSat() {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    🛰 Aggiorno dati orbitali...</div>`;

  // Scarica TLE (con cache e fallback)
  activeTLE = await fetchFreshTLE(s => { tleSource = s; });

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    📍 Richiedo posizione GPS...</div>`;

  if (!navigator.geolocation) {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center">GPS non supportato dal browser.</div>`;
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    gpsSatPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
    computeAndRender(gpsSatPos);

    clearInterval(gpsSatInterval);
    gpsSatInterval = setInterval(() => {
      if (gpsSatPos) computeAndRender(gpsSatPos);
    }, 30000);

  }, (err) => {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">
      ⚠️ Posizione non disponibile: ${err.message}</div>`;
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
}

function computeAndRender(pos) {
  const now = Date.now();
  const allSats = [];
  const constellationResults = [];

  for (const c of GNSS_CONSTELLATIONS) {
    const tles = activeTLE[c.id] || EMBEDDED_TLE[c.id] || [];
    const visible = [];
    for (const sat of tles) {
      const r = satElevation(sat.line1, sat.line2, pos.lat, pos.lon, now);
      if (r && r.el >= 0) visible.push({ ...sat, el: r.el, az: r.az, range: r.range });
    }
    visible.sort((a,b) => b.el - a.el);
    constellationResults.push({ ...c, total: tles.length, visible });
    allSats.push(...visible.map(s => ({...s, constellation:c.id, color:c.color})));
  }

  renderGpsSat(constellationResults, allSats, pos, now);
}

function renderGpsSat(constellations, allSats, pos, now) {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  const totalVis = allSats.length;
  const polarSize = 200;
  const cx = polarSize/2, cy = polarSize/2, cr = polarSize/2 - 10;

  const satDots = allSats.map(s => {
    const rDot = cr * (1 - s.el/90);
    const azR  = (s.az - 90) * Math.PI/180;
    const sx = cx + rDot * Math.cos(azR);
    const sy = cy + rDot * Math.sin(azR);
    return `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="5" fill="${s.color}" opacity="0.9"
      stroke="rgba(255,255,255,0.3)" stroke-width="1">
      <title>${s.name}\nEl: ${s.el.toFixed(0)}° Az: ${s.az.toFixed(0)}°</title>
    </circle>
    <text x="${(sx+6).toFixed(1)}" y="${(sy+4).toFixed(1)}" font-size="7" fill="${s.color}" opacity="0.8">${s.el.toFixed(0)}°</text>`;
  }).join('');

  const polarSVG = `
    <svg width="${polarSize}" height="${polarSize}" viewBox="0 0 ${polarSize} ${polarSize}" style="display:block;margin:0 auto">
      <circle cx="${cx}" cy="${cy}" r="${cr}"     fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="${cr*2/3}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="${cr/3}"   fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <line x1="${cx}" y1="${cy-cr}" x2="${cx}" y2="${cy+cr}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <line x1="${cx-cr}" y1="${cy}" x2="${cx+cr}" y2="${cy}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <text x="${cx-3}" y="${cy-cr-3}" font-size="9" fill="rgba(255,255,255,0.35)">N</text>
      <text x="${cx-3}" y="${cy+cr+11}" font-size="9" fill="rgba(255,255,255,0.35)">S</text>
      <text x="${cx+cr+3}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">E</text>
      <text x="${cx-cr-11}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">W</text>
      <text x="${cx-4}" y="${cy+cr*2/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">30°</text>
      <text x="${cx-4}" y="${cy+cr/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">60°</text>
      ${satDots}
    </svg>`;

  const constRows = constellations.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;font-weight:600;color:var(--text)">${c.name}</div>
      <div style="font-size:11px;color:var(--muted)">${c.total} sats</div>
      <div style="font-size:13px;font-weight:700;color:${c.color};min-width:28px;text-align:right">${c.visible.length} ↑</div>
    </div>`).join('');

  const top8 = allSats.slice(0,8).map(s => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0">
      <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
      <div style="font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
      <div style="font-size:11px;font-weight:600;color:var(--text)">${s.el.toFixed(1)}°</div>
      <div style="font-size:10px;color:var(--muted)">${s.az.toFixed(0)}°</div>
    </div>`).join('');

  const qualityColor = pos.accuracy < 5 ? '#4ade80' : pos.accuracy < 20 ? '#f59e0b' : '#f87171';
  const qualityLabel = pos.accuracy < 5 ? 'Eccellente' : pos.accuracy < 20 ? 'Buono' : pos.accuracy < 50 ? 'Discreto' : 'Scarso';
  const nowDate = new Date(now);

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:10px;
        padding:6px 12px;font-size:20px;font-weight:700;color:#4ade80">${totalVis}</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--text)">satelliti visibili</div>
        <div style="font-size:10px;color:var(--muted)">su 4 costellazioni GNSS</div>
      </div>
      <div style="margin-left:auto;text-align:right">
        <div style="font-size:10px;color:var(--muted)">Accuratezza fix</div>
        <div style="font-size:12px;font-weight:700;color:${qualityColor}">±${Math.round(pos.accuracy)}m — ${qualityLabel}</div>
      </div>
    </div>
    ${constRows}
    <div style="margin:10px 0 6px;font-size:10px;color:var(--muted);text-align:center">🌐 Vista polare — punti = satelliti sopra l'orizzonte</div>
    ${polarSVG}
    <div style="margin-top:8px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;margin-bottom:4px">TOP ELEVAZIONE</div>
      ${top8}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
      <div style="font-size:9px;color:var(--muted);opacity:.6">
        ${tleSource === 'live' ? '🟢 TLE live da Celestrak' : tleSource === 'cache' ? '🟡 TLE da cache (24h)' : '🔵 TLE embedded'} · SGP4 · ${nowDate.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
      </div>
      <button onclick="localStorage.removeItem('gnss_tle_cache');initGpsSat()" style="padding:4px 10px;border-radius:8px;border:1px solid var(--glass-border);
        background:var(--glass);color:var(--muted);font-size:10px;cursor:pointer">↺ Aggiorna</button>
    </div>
  `;
}

let astroInitialized = false;

function initAstro() {
  if (astroInitialized) return;
  astroInitialized = true;
  renderAstroShell();
}

function switchAstroSub(name, btn) {
  astroSubTab = name;
  document.querySelectorAll('.astro-subtab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.astro-subpanel').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const panel = document.getElementById('asub-' + name);
  if (panel) panel.classList.add('active');

  if (name === 'iss') {
    if (issTimer) clearTimeout(issTimer);
    fetchISSPosition(currentLat, currentLon);
  }
  if (name === 'voyager') renderVoyagerLive();
  if (name === 'perseverance') fetchPerseveranceData();
  if (name === 'jwst') fetchJWSTData();
}

function renderAstroShell() {
  const el = document.getElementById('astro-content');

  const lat = currentLat || 38.11;

  // Precalcola dati astronomici

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    d.setHours(12,0,0,0);
    sunData.push({ d, sun: sunTimes(lat, lon, d), moon: moonPhase(d) });

    const sPct = ((s.dusk  - midnight) / dayMs * 100).toFixed(1);
    const w   = (sPct - rPct).toFixed(1);
    const now = ((today - midnight) / dayMs * 100).toFixed(1);
    return `<div class="astro-daybar" style="left:${rPct}%;width:${w}%"></div>

        </div>
        <div class="astro-row">
          <div class="astro-icon">🌞</div>

          <div style="margin-left:auto;text-align:right"><div class="astro-label">Elevazione massima</div><div class="astro-sub">${s.elevation}°</div></div>
        </div>
        <div class="astro-row">

          <div style="margin-left:auto;text-align:right"><div class="astro-label">Crepuscolo serale</div><div class="astro-sub">${fmt(s.dusk)}</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">⏱</div>
          <div><div class="astro-label">Durata del giorno</div><div class="astro-value">${fmtDur(s.dayLen)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Declinazione</div><div class="astro-sub">${s.decl}°</div></div>
        </div>

    </div>
    <div class="astro-card">
      <div class="astro-card-title">🗓 Stagione Astronomica</div>
      <div class="astro-row">

// ── Pannello Luna ────────────────────────────────────────────
function renderLunaPanel(main, sunData, today) {
  const moon = main.moon;
  const illum = Math.round((moon.pct < 0.5 ? moon.pct * 2 : (1 - moon.pct) * 2) * 100);

  const prossimeFasi = [
    ['🌑','Luna Nuova', 0],
    ['🌓','Primo Quarto', 7.38],
    ['🌕','Luna Piena', 14.77],
    ['🌗','Ultimo Quarto', 22.15],
  ].map(([ic, nm, day]) => {
    const diff = ((day - moon.phase) + 29.53) % 29.53;
    const d2 = new Date(today);
    d2.setDate(today.getDate() + Math.round(diff));
    const giorniMancanti = Math.round(diff);
    return `<div style="text-align:center;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:12px;padding:10px 4px">
      <div style="font-size:24px">${ic}</div>

      <div style="font-size:11px;font-weight:700;color:var(--text);margin-top:2px">${d2.getDate()} ${['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'][d2.getMonth()]}</div>
      <div style="font-size:9px;color:var(--muted)">${giorniMancanti === 0 ? 'Oggi' : `fra ${giorniMancanti}g`}</div>
    </div>`;
  }).join('');

  // Calendario fasi mese corrente
  const mesiCals = sunData.map(({d, moon:m}) => {
    const dn = ['D','L','M','M','G','V','S'][d.getDay()];
    return `<div style="text-align:center">
      <div style="font-size:14px">${m.icon}</div>
      <div style="font-size:9px;color:var(--muted)">${dn} ${d.getDate()}</div>
    </div>`;
  }).join('');

  return `
    <div class="astro-card">
      <div class="astro-card-title">🌙 Fase Lunare Attuale</div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:14px">
        <div style="font-size:64px;line-height:1;filter:drop-shadow(0 0 18px rgba(200,200,255,0.3))">${moon.icon}</div>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700;color:var(--text)">${moon.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">Illuminazione ${illum}%</div>
          <div class="moon-bar-wrap"><div class="moon-bar" style="width:${illum}%"></div></div>
          <div style="font-size:10px;color:var(--muted);margin-top:5px">Giorno ${moon.phase.toFixed(1)} di 29.5 nel ciclo sinodico</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${prossimeFasi}</div>
    </div>
    <div class="astro-card">
      <div class="astro-card-title">🗓 Fasi Prossimi 7 Giorni</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${mesiCals}</div>
    </div>
    <div class="last-updated" style="padding:4px 0 12px">Algoritmo Jean Meeus · Ephemeris 2000</div>
  `;
}

// ── Pannello Pianeti ─────────────────────────────────────────
function renderPianetiPanel(today, lat, lon) {
  // Calcolo approssimativo visibilità pianeti (algoritmo Jean Meeus semplificato)
  const JD = toJulian(today);
  const T = (JD - 2451545.0) / 36525.0;

  const planets = [
    { name: 'Mercurio', icon: '☿', ...mercuryVis(T, today, lat) },
    { name: 'Venere',   icon: '♀', ...venusVis(T, today, lat) },
    { name: 'Marte',    icon: '♂', ...marsVis(T, today, lat) },
    { name: 'Giove',    icon: '♃', ...jupiterVis(T, today, lat) },
    { name: 'Saturno',  icon: '♄', ...saturnVis(T, today, lat) },
    { name: 'Urano',    icon: '⛢', ...uranusVis(T, today, lat) },
  ];

  const cards = planets.map(p => {
    const visCls = p.visible === 'sera' ? 'p-vis' : p.visible === 'mattina' ? 'p-dawn' : 'p-inv';
    const visLbl = p.visible === 'sera' ? '🌆 Visibile sera' : p.visible === 'mattina' ? '🌄 Visibile mattina' : '● Non visibile';
    return `<div class="planet-card">
      <div class="planet-icon">${p.icon}</div>
      <div class="planet-name">${p.name}</div>
      <div class="planet-detail">${p.info}</div>
      <div class="planet-visible ${visCls}">${visLbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="astro-card" style="margin-bottom:10px">
      <div class="astro-card-title">🪐 Pianeti del Sistema Solare</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.5">
        Visibilità calcolata per <strong style="color:var(--text)">${currentCity}</strong> — 
        ${today.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})}
      </div>
    </div>
    <div class="planet-grid">${cards}</div>
    <div class="last-updated" style="padding:4px 0 12px">Calcolo orbitale approssimativo · Jean Meeus cap. 33–36</div>
  `;
}

// ── ISS Live Position — wheretheiss.at (CORS aperto) ─────────
let issTimer = null;
async function fetchISSPosition(userLat, userLon) {
  const elStatus = document.getElementById('iss-status');
  try {
    const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();

    const issLat  = parseFloat(d.latitude);
    const issLon  = parseFloat(d.longitude);
    const issAlt  = parseFloat(d.altitude).toFixed(0);
    const issVel  = Math.round(parseFloat(d.velocity)).toLocaleString('it-IT');
    const issVis  = d.visibility === 'daylight' ? '☀️ Giorno' : '🌙 Notte';

    const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    set('iss-lat', issLat.toFixed(2) + '°');
    set('iss-lon', issLon.toFixed(2) + '°');
    set('iss-alt', issAlt);
    set('iss-vel', issVel);
    set('iss-vis', issVis);

    if (userLat && userLon) {
      const dist = Math.round(haversineKm(userLat, userLon, issLat, issLon));
      set('iss-dist', dist.toLocaleString('it-IT'));
    }

    if (elStatus) {
      elStatus.style.background = 'rgba(91,196,187,0.07)';
      elStatus.style.borderColor = 'rgba(91,196,187,0.2)';
      elStatus.style.color = 'var(--teal)';
      elStatus.textContent = `● Live — ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    }
  } catch(e) {
    if (elStatus) {
      elStatus.style.color = 'var(--danger)';
      elStatus.textContent = '⚠️ API non raggiungibile — riprovo...';
    }
  }
  // Rischedula solo se il pannello ISS è ancora attivo
  if (document.getElementById('asub-iss')?.classList.contains('active')) {
    issTimer = setTimeout(() => fetchISSPosition(userLat, userLon), 5000);
  }
}

// ── Pannello Voyager ─────────────────────────────────────────
// Dati di riferimento NASA (pubblicati + estrapolazione lineare)
// Voyager 1: vel ~17.043 km/s ≈ 3.595 AU/anno (eliocentric)
// Voyager 2: vel ~15.341 km/s ≈ 3.232 AU/anno
// Distanze di riferimento confermate da NASA/JPL al 1 Gen 2024:
//   V1 ≈ 162.43 AU,  V2 ≈ 135.73 AU  (fonte: NASA Eyes on Solar System)
const V1_REF  = { date: new Date('2024-01-01T00:00:00Z'), au: 162.43, velKms: 17.043, velAuYear: 3.595 };
const V2_REF  = { date: new Date('2024-01-01T00:00:00Z'), au: 135.73, velKms: 15.341, velAuYear: 3.232 };
const AU_KM   = 149597870.7; // km per 1 AU
const LIGHT_S = 299792.458;  // km/s

function voyagerNow(ref) {
  const now = Date.now();
  const yearsElapsed = (now - ref.date.getTime()) / (365.25 * 24 * 3600 * 1000);
  const au = ref.au + ref.velAuYear * yearsElapsed;
  const km = au * AU_KM;
  const lightSec = km / LIGHT_S;
  const lightMin = lightSec / 60;
  const lightH   = lightMin / 60;
  return { au: au.toFixed(2), km: Math.round(km).toLocaleString('it-IT'), lightH: lightH.toFixed(1), lightMin: lightMin.toFixed(0), velKms: ref.velKms };
}

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

function toJulian(date) {

  const L = (252.251 + 149474.07 * T) % 360;

// ── Riutilizzo funzioni ex-effemeridi ───────────────────────

// Algoritmo sunrise/sunset NOAA (gml.noaa.gov/grad/solcalc)
// Restituisce orari in UTC come oggetti Date
function sunTimes(lat, lon, date) {
  const rad = Math.PI / 180;

  // Julian Day Number (mezzogiorno UTC del giorno dato)
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const A = Math.floor((14-m)/12);
  const Y = y + 4800 - A;
  const M2 = m + 12*A - 3;
  const JD = d + Math.floor((153*M2+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045;

  // Secolo giuliano da J2000
  const JC = (JD - 2451545.0) / 36525.0;

  // Longitudine media del sole
  const L0 = (280.46646 + JC*(36000.76983 + JC*0.0003032)) % 360;

  // Anomalia media
  const Mdeg = (357.52911 + JC*(35999.05029 - 0.0001537*JC)) % 360;
  const Mr = Mdeg * rad;

  // Centro dell'equazione
  const C = (1.914602 - JC*(0.004817 + 0.000014*JC))*Math.sin(Mr)
           + (0.019993 - 0.000101*JC)*Math.sin(2*Mr)
           + 0.000289*Math.sin(3*Mr);

  // Longitudine vera e apparente
  const SunLon = L0 + C;
  const omega  = 125.04 - 1934.136*JC;
  const AppLon = SunLon - 0.00569 - 0.00478*Math.sin(omega*rad);

  // Obliquità corretta
  const MeanObl = 23 + (26 + (21.448 - JC*(46.815 + JC*(0.00059 - JC*0.001813)))/60)/60;
  const OblCorr = MeanObl + 0.00256*Math.cos(omega*rad);

  // Declinazione solare
  const sinDecl = Math.sin(OblCorr*rad) * Math.sin(AppLon*rad);
  const Decl = Math.asin(sinDecl) / rad;

  // Equazione del tempo (minuti)
  const y2 = Math.tan(OblCorr*rad/2)**2;
  const ecc = 0.016708634;
  const EqT = 4/rad * (y2*Math.sin(2*L0*rad) - 2*ecc*Math.sin(Mr)
              + 4*ecc*y2*Math.sin(Mr)*Math.cos(2*L0*rad)
              - 0.5*y2*y2*Math.sin(4*L0*rad)
              - 1.25*ecc*ecc*Math.sin(2*Mr));

  // Angolo orario all'alba/tramonto
  const cosHA = (Math.sin(-0.8333*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
               / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  if (Math.abs(cosHA) > 1) return null;
  const HA = Math.acos(cosHA) / rad; // gradi

  // Mezzogiorno solare in minuti da mezzanotte UTC
  const noonMin  = 720 - 4*lon - EqT;
  const riseMin  = noonMin - HA*4;
  const setMin   = noonMin + HA*4;

  // Crepuscolo civile (~34 min prima/dopo per -6° sotto orizzonte, usiamo -50' per astronomico civile approx)
  const cosHAdawn = (Math.sin(-6*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
                   / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  const HAdawn = Math.abs(cosHAdawn) <= 1 ? Math.acos(Math.max(-1,Math.min(1,cosHAdawn)))/rad : HA+20;
  const dawnMin = noonMin - HAdawn*4;
  const duskMin = noonMin + HAdawn*4;

  // Converti minuti UTC → Date UTC
  const minsToDate = (mins) => {
    const base = new Date(Date.UTC(y, m-1, d));
    return new Date(base.getTime() + mins*60000);
  };

  return {
    rise:    minsToDate(riseMin),
    set:     minsToDate(setMin),
    transit: minsToDate(noonMin),
    dawn:    minsToDate(dawnMin),
    dusk:    minsToDate(duskMin),
    dayLen:  (setMin - riseMin) / 60,
    decl:    Decl.toFixed(1),
    elevation: (90 - Math.abs(lat - Decl)).toFixed(1),
  };
}

// Fase lunare
function moonPhase(date) {
  const known = new Date(2000, 0, 6, 18, 14); // new moon 6 Jan 2000
  const diff = (date - known) / (1000*60*60*24);
  const cycle = 29.53058867;
  const phase = ((diff % cycle) + cycle) % cycle;
  const pct = phase / cycle;
  const icons = ['🌑','🌒','🌒','🌓','🌔','🌔','🌕','🌖','🌖','🌗','🌘','🌘','🌑'];
  const names = ['Luna Nuova','Crescente','Crescente','Primo Quarto','Gibbosa Crescente','Gibbosa Crescente','Luna Piena','Gibbosa Calante','Gibbosa Calante','Ultimo Quarto','Calante','Calante','Luna Nuova'];
  const idx = Math.round(pct * 12) % 13;
  return { phase, pct, icon: icons[idx], name: names[idx] };
}

// Stagione astronomica
function season(date, lat) {
  const m = date.getMonth();
  const isNorth = lat >= 0;
  if (isNorth) {
    if (m >= 2 && m <= 4) return ['🌸 Primavera', '21 Mar'];
    if (m >= 5 && m <= 7) return ['☀️ Estate',    '21 Giu'];
    if (m >= 8 && m <= 10) return ['🍂 Autunno',  '22 Set'];
    return ['❄️ Inverno', '21 Dic'];
  } else {
    if (m >= 2 && m <= 4) return ['🍂 Autunno',   '21 Mar'];
    if (m >= 5 && m <= 7) return ['❄️ Inverno',   '21 Giu'];
    if (m >= 8 && m <= 10) return ['🌸 Primavera','22 Set'];
    return ['☀️ Estate', '21 Dic'];
  }
}

function fmt(date) {
  if (!date) return 'N/D';
  return date.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Rome'});
}
function fmtDur(h) {
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  return `${hh}h ${String(mm).padStart(2,'0')}m`;
}

async function fetchPerseveranceData() {
  // Dati missione calcolati
  const now = Date.now();
  const solLength = 88775244; // ms per 1 sol marziano
  const msSinceLanding = now - PERSO_LANDING.getTime();
  const solsOnMars = Math.floor(msSinceLanding / solLength);
  const daysSinceLaunch = Math.floor((now - PERSO_LAUNCH.getTime()) / 86400000);
  const currentSol = solsOnMars;

  // Render stats immediato (dati calcolati)
  const el = document.getElementById('perso-stats');
  if (el) {
    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px">
        <div class="iss-stat">
          <div class="iss-stat-val" style="color:#e07070;font-size:20px">${solsOnMars.toLocaleString('it-IT')}</div>
          <div class="iss-stat-label">Sol su Marte</div>
        </div>
        <div class="iss-stat">
          <div class="iss-stat-val" style="color:#fbbf24;font-size:20px">${daysSinceLaunch.toLocaleString('it-IT')}</div>
          <div class="iss-stat-label">Giorni dal lancio</div>
        </div>
        <div class="iss-stat">
          <div class="iss-stat-val" id="perso-dist" style="color:var(--teal);font-size:16px">—</div>
          <div class="iss-stat-label">Km percorsi</div>
        </div>
      </div>
      <div class="astro-card" style="margin:0 16px 10px">
        <div class="astro-card-title" style="color:#e07070">📡 Info Missione</div>
        <div class="astro-row">
          <div class="astro-icon">🚀</div>
          <div><div class="astro-label">Lancio</div><div class="astro-value" style="font-size:13px">30 Luglio 2020</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🛬</div>
          <div><div class="astro-label">Atterraggio</div><div class="astro-value" style="font-size:13px">18 Feb 2021 · Jezero Crater</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🚁</div>
          <div><div class="astro-label">Ingenuity</div><div class="astro-value" style="font-size:13px">Primo elicottero su altro pianeta</div></div>
        </div>
        <div class="astro-row" style="margin-bottom:0">
          <div class="astro-icon">🔬</div>
          <div><div class="astro-label">Obiettivo</div><div class="astro-value" style="font-size:13px">Campioni di suolo · Ricerca vita passata</div></div>
        </div>
      </div>
    `;
  }

  // Fetch dati reali in parallelo
  const [distRes, photoRes] = await Promise.allSettled([
    fetch('https://mars.nasa.gov/mmgis-maps/M20/Layers/json/M20_waypoints.json'),
    fetch('https://images-api.nasa.gov/search?q=perseverance+mars+sol&media_type=image&page_size=9&year_start=2024')
  ]);

  // Distanza percorsa
  if (distRes.status === 'fulfilled' && distRes.value.ok) {
    try {
      const gj = await distRes.value.json();
      const features = gj.features || [];
      const last = features[features.length - 1];
      const km = last?.properties?.total_dist_m
        ? (last.properties.total_dist_m / 1000).toFixed(2)
        : last?.properties?.odometry_m
          ? (last.properties.odometry_m / 1000).toFixed(2)
          : null;
      if (km) {
        const elD = document.getElementById('perso-dist');
        if (elD) elD.textContent = km + ' km';
      }
    } catch(e) {}
  }

  // Foto — via NASA Image Library (CORS aperto)
  const elP = document.getElementById('perso-photos');
  const upd = document.getElementById('perso-updated');

  let photoItems = [];

  if (photoRes.status === 'fulfilled' && photoRes.value.ok) {
    try {
      const pj = await photoRes.value.json();
      const items = pj.collection?.items || [];
      // Filtra solo immagini con link valido
      for (const item of items) {
        const link = item.links?.find(l => l.rel === 'preview' || l.href?.includes('.jpg'));
        const data = item.data?.[0];
        if (link && data) {
          photoItems.push({
            thumb: link.href,
            title: data.title || 'Mars',
            date: data.date_created?.slice(0, 10) || '',
            nasa_id: data.nasa_id,
          });
          if (photoItems.length >= 6) break;
        }
      }
    } catch(e) {}
  }

  // Fallback: foto curate direttamente dai comunicati JPL (URL permanenti NASA)
  if (photoItems.length < 3) {
    photoItems = [

      { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/PIA23764-1041.jpg/640px-PIA23764-1041.jpg', title: 'Perseverance Rover', date: '2020', nasa_id: '' },
      { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Ingenuity_Mars_Helicopter_attached_to_Perseverance_Rover.jpg/640px-Ingenuity_Mars_Helicopter_attached_to_Perseverance_Rover.jpg', title: 'Ingenuity su Perseverance', date: '2021', nasa_id: '' },
      { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Tracks_from_Mars_Perseverance_Sol_0046_%28Nav_Cam_Right%29.jpg/640px-Tracks_from_Mars_Perseverance_Sol_0046_%28Nav_Cam_Right%29.jpg', title: 'Tracce del rover · Sol 46', date: '2021-03-16', nasa_id: '' },
    ];
  }

  if (elP) {
    elP.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
        ${photoItems.slice(0, 6).map(p => `
          <div style="border-radius:10px;overflow:hidden;border:1px solid var(--border);
            aspect-ratio:1;background:#1a0808;cursor:pointer;position:relative"
            onclick="window.open('https://mars.nasa.gov/mars2020/multimedia/raw-images/','_blank')">
            <img src="${p.thumb}" alt="${p.title}"
              loading="lazy"
              style="width:100%;height:100%;object-fit:cover;display:block"
              onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\\'height:100%;display:flex;align-items:center;justify-content:center;font-size:20px\\'>🔴</div>'">
          </div>
        `).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);text-align:center;padding-bottom:4px">
        📷 Immagini NASA/JPL-Caltech · Tap per aprire il portale foto raw
      </div>
      <div style="margin-top:6px;text-align:center">

          style="font-size:11px;color:#e07070;text-decoration:none;
          background:rgba(224,112,112,0.1);border:1px solid rgba(224,112,112,0.25);
          border-radius:50px;padding:6px 16px;display:inline-block">
          📡 Vedi tutte le foto raw su NASA.gov →
        </a>
      </div>
    `;
  }
  if (upd) upd.textContent = `Immagini: NASA Image Library · ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
}

    btn.style.borderColor = 'rgba(126,184,232,0.35)';
    btn.style.color = '#7eb8e8';
  }
}

async function fetchJWSTData() {
  const now = Date.now();
  const daysSinceLaunch = Math.floor((now - JWST_LAUNCH.getTime()) / 86400000);
  const yearsSinceLaunch = (daysSinceLaunch / 365.25).toFixed(1);

  // Stats missione
  const statsEl = document.getElementById('jwst-stats');
  if (statsEl) statsEl.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px 12px">
      <div class="iss-stat">
        <div class="iss-stat-val" style="color:#7eb8e8;font-size:18px">${daysSinceLaunch.toLocaleString('it-IT')}</div>
        <div class="iss-stat-label">Giorni in orbita</div>
      </div>
      <div class="iss-stat">
        <div class="iss-stat-val" style="color:#a082ff;font-size:18px">${yearsSinceLaunch}y</div>
        <div class="iss-stat-label">Anni missione</div>
      </div>
      <div class="iss-stat">
        <div class="iss-stat-val" style="color:var(--teal);font-size:13px">~1.5M km</div>
        <div class="iss-stat-label">Da Terra (L2)</div>
      </div>
    </div>
    <div class="astro-card" style="margin:0 16px 10px">
      <div class="astro-card-title" style="color:#7eb8e8">📡 Orbita & Caratteristiche</div>
      <div class="astro-row">
        <div class="astro-icon">⚖️</div>
        <div><div class="astro-label">Punto di Lagrange</div><div class="astro-value" style="font-size:13px">Sun-Earth L2 · Orbita Halo</div></div>
      </div>
      <div class="astro-row">
        <div class="astro-icon">🪞</div>
        <div><div class="astro-label">Specchio primario</div><div class="astro-value" style="font-size:13px">6.5 m · 18 segmenti in berillio dorato</div></div>
      </div>
      <div class="astro-row">
        <div class="astro-icon">📻</div>
        <div><div class="astro-label">Downlink dati</div><div class="astro-value" style="font-size:13px">~28 GB/giorno via DSN</div></div>
        <div style="margin-left:auto;text-align:right"><div class="astro-label">Durata prevista</div><div class="astro-sub">20+ anni</div></div>
      </div>
      <div class="astro-row" style="margin-bottom:0">
        <div class="astro-icon">🌡</div>
        <div><div class="astro-label">Lato caldo (parasole)</div><div class="astro-value" style="font-size:13px;color:#fbbf24">+52°C / +13°C</div></div>
        <div style="margin-left:auto;text-align:right"><div class="astro-label">Lato freddo (specchio)</div><div class="astro-sub" style="color:#7eb8e8">-235°C / -231°C</div></div>
      </div>
    </div>
  `;

  // Temperature strumenti
  const tempsEl = document.getElementById('jwst-temps-el');
  if (tempsEl) {
    const tempColor = t => t < -200 ? '#7eb8e8' : t < 0 ? '#a082ff' : '#fbbf24';
    const instruments = [
      { name: 'NIRCam', temp: JWST_TEMPS.nircam,  icon: '📷', desc: 'Near Infrared Camera' },
      { name: 'NIRSpec', temp: JWST_TEMPS.nirspec, icon: '🔬', desc: 'Near IR Spectrograph' },
      { name: 'MIRI',   temp: JWST_TEMPS.miri,    icon: '❄️', desc: 'Mid-Infrared · criocooler' },
      { name: 'FGS',    temp: JWST_TEMPS.fgs,     icon: '🎯', desc: 'Fine Guidance Sensor' },
    ];
    tempsEl.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
        ${instruments.map(i => `
          <div class="iss-stat" style="text-align:left;padding:10px 12px">
            <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${i.icon} ${i.name}</div>
            <div style="font-size:22px;font-weight:700;color:${tempColor(i.temp)};letter-spacing:-0.5px">${i.temp}°C</div>
            <div style="font-size:8.5px;color:var(--muted2);margin-top:2px">${i.desc}</div>
          </div>
        `).join('')}
      </div>
      <div style="font-size:10px;color:var(--muted);padding:2px 2px 12px;line-height:1.5">
        ❄️ <strong style="color:#7eb8e8">MIRI a -266°C</strong> è lo strumento spaziale più freddo mai costruito —
        più freddo dello spazio profondo. Richiede un criocooler attivo alimentato dall'elettricità del telescopio.
      </div>
    `;
  }

  // Immagini via NASA Image Library (CORS aperto)
  const photoEl = document.getElementById('jwst-photos');
  const updEl   = document.getElementById('jwst-updated');
  let photos = [];

  try {
    const r = await fetch('https://images-api.nasa.gov/search?q=james+webb+telescope+galaxy&media_type=image&page_size=9&year_start=2022');
    if (r.ok) {
      const pj = await r.json();
      for (const item of (pj.collection?.items || [])) {
        const link = item.links?.find(l => l.href?.match(/\.(jpg|jpeg|png)/i));
        const data = item.data?.[0];
        if (link && data) { photos.push({ thumb: link.href, title: data.title || 'JWST' }); if (photos.length >= 6) break; }
      }
    }
  } catch(e) {}

  // Fallback: immagini iconiche JWST (Wikimedia Commons / STScI)
  if (photos.length < 3) photos = [
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Webb%27s_First_Deep_Field.jpg/640px-Webb%27s_First_Deep_Field.jpg', title: 'Webb First Deep Field – SMACS 0723' },
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/79/Webb_-_Carina_Nebula_%282022%29.jpg/640px-Webb_-_Carina_Nebula_%282022%29.jpg', title: 'Nebulosa della Carena' },
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Webb_captures_dying_star%27s_final_%27performance%27_in_unprecedented_detail_%2852258985007%29.jpg/640px-Webb_captures_dying_star%27s_final_%27performance%27_in_unprecedented_detail_%2852258985007%29.jpg', title: 'Nebulosa Anello del Sud' },
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Webb_inspects_the_heart_of_the_Milky_Way_%2852854850083%29.jpg/640px-Webb_inspects_the_heart_of_the_Milky_Way_%2852854850083%29.jpg', title: 'Centro della Via Lattea' },
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Pillars_of_Creation_%28NIRCam_Image%29.jpg/640px-Pillars_of_Creation_%28NIRCam_Image%29.jpg', title: 'Pilastri della Creazione' },
    { thumb: 'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Webb_SMACS_723_ero_00001.jpg/640px-Webb_SMACS_723_ero_00001.jpg', title: 'Quintetto di Stefano' },
  ];

  if (photoEl) photoEl.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
      ${photos.slice(0,6).map(p => `
        <div style="border-radius:10px;overflow:hidden;border:1px solid var(--border);
          aspect-ratio:1;background:#020510;cursor:pointer" title="${p.title}"
          onclick="window.open('https://webbtelescope.org/images','_blank')">
          <img src="${p.thumb}" alt="${p.title}" loading="lazy"
            style="width:100%;height:100%;object-fit:cover;display:block"
            onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\\'height:100%;display:flex;align-items:center;justify-content:center;font-size:24px\\'>🌌</div>'">
        </div>
      `).join('')}
    </div>
    <div style="font-size:10px;color:var(--muted);text-align:center;padding-bottom:6px">
      🌌 Immagini NASA/ESA/CSA/STScI — Tap per aprire Webb Telescope Gallery
    </div>
    <div style="text-align:center;padding-bottom:4px;display:flex;gap:8px;justify-content:center">
      <a href="https://webbtelescope.org/images" target="_blank"
        style="font-size:11px;color:#7eb8e8;text-decoration:none;
        background:rgba(126,184,232,0.1);border:1px solid rgba(126,184,232,0.25);
        border-radius:50px;padding:6px 14px;display:inline-block">🔭 Webb Gallery →</a>
      <a href="https://spacetelescopelive.org/webb" target="_blank"
        style="font-size:11px;color:#a082ff;text-decoration:none;
        background:rgba(160,130,255,0.1);border:1px solid rgba(160,130,255,0.25);
        border-radius:50px;padding:6px 14px;display:inline-block">📡 Osservazioni Live →</a>
    </div>
  `;

  if (updEl) updEl.textContent = `Immagini: NASA Image Library & STScI · Temperature: NASA GSFC · ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
}


let _deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});

async function installPWA() {
  if (!_deferredInstallPrompt) {
    alert('Per installare:\n• Android Chrome → Menu ⋮ → "Installa app"\n• iOS Safari → Condividi 🔗 → "Aggiungi a schermata Home"');
    return;
  }
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.textContent = '⏳';
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    if (btn) btn.style.display = 'none';
    _deferredInstallPrompt = null;
  } else {
    if (btn) btn.textContent = '⬇️';
  }
}

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  _deferredInstallPrompt = null;
});

let effInitialized = false;

function initEffemeridi() {
  if (effInitialized) return;
  effInitialized = true;
  renderEffemeridi();
}

function renderEffemeridi() {
  const el = document.getElementById('eff-content');
  if (!el) return;

  const lat  = currentLat || 38.11;
  const lon  = currentLon || 15.66;
  const today = new Date();

  const sunData = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    d.setHours(12, 0, 0, 0);
    sunData.push({ d, sun: sunTimes(lat, lon, d), moon: moonPhase(d) });
  }
  const { sun: s, moon } = sunData[0];
  const [stagione, solstizio] = season(today, lat);

  // Barra giorno
  let timeBar = '';
  if (s) {
    const midnight = new Date(today); midnight.setHours(0,0,0,0);
    const ms = 86400000;
    const rP  = ((s.dawn  - midnight) / ms * 100).toFixed(1);
    const sP  = ((s.dusk  - midnight) / ms * 100).toFixed(1);
    const w   = (sP - rP).toFixed(1);
    const now = ((today   - midnight) / ms * 100).toFixed(1);
    timeBar = `
      <div class="astro-timeline" style="margin:10px 0 4px">
        <div class="astro-daybar" style="left:${rP}%;width:${w}%"></div>
        <div class="astro-now-tick" style="left:${now}%"></div>
      </div>
      <div class="astro-tl-label"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>`;
  }

  // Carte 6 giorni successivi
  const dayCards = sunData.slice(1).map(({ d, sun, moon: m }) => {
    if (!sun) return '';
    const dn = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][d.getDay()];
    return `<div class="astro-day-card">
      <div style="font-size:11px;font-weight:700;color:var(--text)">${dn} ${d.getDate()}</div>
      <div style="font-size:10px;color:var(--muted)">🌅 ${fmt(sun.rise)}</div>
      <div style="font-size:10px;color:var(--muted)">🌇 ${fmt(sun.set)}</div>
      <div style="font-size:10px;color:var(--muted)">${m.icon} ${fmtDur(sun.dayLen)}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <!-- Oggi: Sole -->
    <div class="astro-card">
      <div class="astro-card-title">☀️ Sole — ${today.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
      ${timeBar}
      ${s ? `
        <div style="height:10px"></div>
        <div class="astro-row">
          <div class="astro-icon">🌅</div>
          <div><div class="astro-label">Alba</div><div class="astro-value">${fmt(s.rise)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Crepuscolo civile</div><div class="astro-sub">${fmt(s.dawn)}</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🌞</div>
          <div><div class="astro-label">Mezzogiorno solare</div><div class="astro-value">${fmt(s.transit)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Elevazione max</div><div class="astro-sub">${s.elevation}°</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🌇</div>
          <div><div class="astro-label">Tramonto</div><div class="astro-value">${fmt(s.set)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Crepuscolo serale</div><div class="astro-sub">${fmt(s.dusk)}</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">⏱</div>
          <div><div class="astro-label">Durata del giorno</div><div class="astro-value">${fmtDur(s.dayLen)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Declinazione</div><div class="astro-sub">${s.decl}°</div></div>
        </div>
      ` : '<div style="color:var(--muted);font-size:12px">Dati non disponibili.</div>'}
    </div>

    <!-- Oggi: Luna -->
    <div class="astro-card">
      <div class="astro-card-title">🌙 Luna di oggi</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="font-size:54px;line-height:1;filter:drop-shadow(0 0 14px rgba(200,200,255,0.3))">${moon.icon}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:var(--text)">${moon.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">Giorno ${moon.phase.toFixed(1)} di 29.5</div>
          <div class="moon-bar-wrap" style="margin-top:8px">
            <div class="moon-bar" style="width:${Math.round((moon.pct<0.5?moon.pct*2:(1-moon.pct)*2)*100)}%"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">Illuminazione ~${Math.round((moon.pct<0.5?moon.pct*2:(1-moon.pct)*2)*100)}%</div>
        </div>
      </div>
    </div>

    <!-- Stagione -->
    <div class="astro-card">
      <div class="astro-card-title">🗓 Stagione Astronomica</div>
      <div class="astro-row">
        <div style="font-size:30px">${stagione.split(' ')[0]}</div>
        <div>
          <div class="astro-value">${stagione.split(' ').slice(1).join(' ')}</div>
          <div class="astro-sub">Inizio astronomico: ${solstizio}</div>
        </div>
      </div>
    </div>

    <!-- 6 giorni -->
    <div style="padding:0 16px 8px;font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#ffc850;opacity:0.85">Prossimi 6 giorni</div>
    <div class="astro-7day">${dayCards}</div>
    <div class="last-updated" style="padding:4px 0 16px">Calcolo locale · Algoritmo NOAA / Jean Meeus · ${currentCity}</div>
  `;
}

</script>



<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Blob URL per il Service Worker (data: URL non è più supportato da Chrome)
    const swCode = `
const CACHE = 'topweather-v2';
self.addEventListener('install', e => { self.skipWaiting(); });
self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
});
`;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl, { scope: './' })
      .then(function(reg) {
        console.log('TopWeather SW OK', reg.scope);
        // Revoca il Blob URL dopo la registrazione (non serve più)
        URL.revokeObjectURL(swUrl);
      })
      .catch(function(e) { console.warn('SW error:', e); });
  });
}
</script>
