<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Top Weather">
<meta name="theme-color" content="#080e1a">
<title>Top Weather</title>
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #080e1a;
    --surface: #0f1826;
    --surface2: #141f30;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #c8a96e;
    --accent2: #7eb8e8;
    --accent3: #6ecba8;
    --text: #e8ecf4;
    --muted: rgba(232,236,244,0.45);
    --muted2: rgba(232,236,244,0.25);
    --danger: #e07070;
    --teal: #5bc4bb;
    --gold: #c8a96e;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% -5%, rgba(30,60,110,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 70% 50% at 90% 90%, rgba(10,30,60,0.4) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 10% 70%, rgba(15,40,80,0.3) 0%, transparent 55%),
      linear-gradient(180deg, #080e1a 0%, #060b14 100%);
    pointer-events: none;
  }

  /* Subtle grain texture */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.6;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 430px; margin: 0 auto;
    padding: 0 0 48px;
    min-height: 100vh;
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    padding: 56px 16px 0;
    display: flex; gap: 8px;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 44px 13px 18px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    letter-spacing: 0.2px;
    transition: border-color 0.25s, background 0.25s;
  }
  .search-input::placeholder { color: var(--muted2); }
  .search-input:focus {
    border-color: rgba(200,169,110,0.35);
    background: var(--surface2);
  }
  .search-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 0; opacity: 0.55;
    transition: opacity 0.2s;
  }
  .search-btn:hover { opacity: 0.9; }
  .geo-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0 16px;
    color: var(--text);
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .geo-btn:active {
    background: var(--surface2);
    border-color: rgba(91,196,187,0.35);
  }

  .suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    overflow: hidden; z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .suggestion-item {
    padding: 12px 18px; cursor: pointer;
    font-size: 13px; font-weight: 400;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    letter-spacing: 0.1px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: rgba(255,255,255,0.05); }
  .suggestion-country {
    color: var(--muted); font-size: 11px; margin-left: 6px;
  }

  /* ── HEADER ── */
  .header {
    padding: 22px 20px 6px;
    text-align: center;
  }
  .city-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .city-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: var(--text);
  }
  .city-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  /* ── NAV TABS ── */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 16px 16px 0;
  }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 4px 9px;
    font-size: 10.5px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    letter-spacing: 0.2px;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .tab::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .tab-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
  .tab:active { transform: scale(0.95); opacity: 0.9; }

  .tab.active {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.3);
    color: var(--accent);
  }
  .tab.active .tab-icon { transform: scale(1.1); }
  .tab.active::after {
    content: '';
    position: absolute; bottom: 0; left: 30%; right: 30%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px 2px 0 0;
  }

  .tab[data-name="radar"].active  { background: rgba(91,196,187,0.1); border-color: rgba(91,196,187,0.3); color: var(--teal); }
  .tab[data-name="radar"].active::after { background: linear-gradient(90deg, transparent, var(--teal), transparent); }
  .tab[data-name="ventusky"].active { background: rgba(160,130,255,0.1); border-color: rgba(160,130,255,0.3); color: #a082ff; }
  .tab[data-name="ventusky"].active::after { background: linear-gradient(90deg, transparent, #a082ff, transparent); }
  .tab[data-name="terremoti"].active { background: rgba(224,112,112,0.1); border-color: rgba(224,112,112,0.3); color: var(--danger); }
  .tab[data-name="terremoti"].active::after { background: linear-gradient(90deg, transparent, var(--danger), transparent); }
  .tab[data-name="mare"].active { background: rgba(110,203,168,0.1); border-color: rgba(110,203,168,0.3); color: var(--accent3); }
  .tab[data-name="mare"].active::after { background: linear-gradient(90deg, transparent, var(--accent3), transparent); }
  .tab[data-name="pollini"].active { background: rgba(134,224,172,0.1); border-color: rgba(134,224,172,0.3); color: #86e0ac; }
  .tab[data-name="pollini"].active::after { background: linear-gradient(90deg, transparent, #86e0ac, transparent); }
  .tab[data-name="gfs"].active { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: #fbbf24; }
  .tab[data-name="gfs"].active::after { background: linear-gradient(90deg, transparent, #fbbf24, transparent); }
  .tab[data-name="metar"].active { background: rgba(99,202,255,0.1); border-color: rgba(99,202,255,0.3); color: #63caff; }
  .tab[data-name="metar"].active::after { background: linear-gradient(90deg, transparent, #63caff, transparent); }
  .tab[data-name="effemeridi"].active { background: rgba(255,200,80,0.1); border-color: rgba(255,200,80,0.3); color: #ffc850; }
  .tab[data-name="effemeridi"].active::after { background: linear-gradient(90deg, transparent, #ffc850, transparent); }

  /* ── MAIN CARD ── */
  .main-card {
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    position: relative; overflow: hidden;
  }
  .main-card::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .main-card::after {
    content: '';
    position: absolute; bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(91,196,187,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .current-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .temp-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 86px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -5px;
    color: var(--text);
  }
  .temp-main sup {
    font-size: 28px;
    letter-spacing: 0;
    position: relative; top: 14px;
    opacity: 0.75;
  }
  .feels-like {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.2px;
  }
  .weather-icon-main {
    font-size: 70px;
    line-height: 1;
    filter: drop-shadow(0 0 24px rgba(200,169,110,0.3));
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-9px)}
  }

  .condition {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
    letter-spacing: 0.1px;
    color: var(--text);
  }
  .date-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.2px;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
    margin: 20px 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3,1fr);
  }
  .stat-item { text-align: center; position: relative; }
  .stat-item:not(:last-child)::after {
    content: '';
    position: absolute; right: 0; top: 15%; height: 70%;
    width: 1px;
    background: var(--border);
  }
  .stat-icon { font-size: 16px; margin-bottom: 5px; }
  .stat-value { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .stat-label {
    font-size: 9.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 3px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 0 20px;
    margin: 28px 0 12px;
    opacity: 0.8;
  }

  /* ── HOURLY ── */
  .hourly-scroll {
    display: flex; gap: 8px;
    padding: 4px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card {
    flex: 0 0 68px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 6px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .hour-card.active {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.3);
  }
  .hour-time {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 7px;
    letter-spacing: 0.2px;
  }
  .hour-card.active .hour-time { color: var(--accent); }
  .hour-icon { font-size: 20px; margin-bottom: 7px; }
  .hour-temp { font-size: 14px; font-weight: 500; }

  /* ── DAILY ── */
  .daily-list {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .day-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s;
  }
  .day-name { font-size: 13px; font-weight: 500; width: 72px; }
  .day-icon { font-size: 21px; }
  .day-desc {
    font-size: 11px; color: var(--muted);
    flex: 1; text-align: center;
    padding: 0 6px;
  }
  .day-temps { display: flex; gap: 8px; align-items: center; }
  .day-high { font-size: 14px; font-weight: 500; }
  .day-low { font-size: 12px; color: var(--muted); }

  /* ── SUN ── */
  .sun-card {
    margin: 0 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    display: flex; justify-content: space-around; align-items: center;
  }
  .sun-item { text-align: center; }
  .sun-icon { font-size: 24px; margin-bottom: 5px; }
  .sun-time { font-size: 18px; font-weight: 500; letter-spacing: -0.5px; }
  .sun-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }
  .sun-divider { width: 1px; height: 44px; background: var(--border); }

  /* ── SEA ── */
  .sea-grid {
    padding: 0 16px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .sea-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 14px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .sea-item::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(91,196,187,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .sea-item-icon { font-size: 26px; margin-bottom: 8px; }
  .sea-item-value { font-size: 22px; font-weight: 500; color: var(--teal); letter-spacing: -0.5px; }
  .sea-item-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
  }
  .sea-item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .wave-bar {
    margin: 10px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
  }
  .wave-bar-title { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .wave-scale { display: flex; align-items: flex-end; gap: 4px; height: 44px; }
  .wave-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .wave-bar-fill {
    width: 100%; border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--teal), rgba(91,196,187,0.3));
    min-height: 4px;
  }
  .wave-bar-time { font-size: 9px; color: var(--muted); }

  /* ── POLLEN ── */
  .pollen-grid {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pollen-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .pollen-icon { font-size: 24px; flex-shrink: 0; }
  .pollen-info { flex: 1; }
  .pollen-name { font-size: 13px; font-weight: 500; }
  .pollen-level { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pollen-bar-wrap {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px; margin-top: 8px; overflow: hidden;
  }
  .pollen-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .pollen-badge {
    font-size: 10.5px; font-weight: 600;
    padding: 4px 10px; border-radius: 50px; white-space: nowrap;
  }
  .level-none   { color: var(--teal); background: rgba(91,196,187,0.12); }
  .level-low    { color: #a8e063; background: rgba(168,224,99,0.12); }
  .level-medium { color: var(--accent); background: rgba(200,169,110,0.12); }
  .level-high   { color: var(--danger); background: rgba(224,112,112,0.12); }
  .level-vhigh  { color: #ff3860; background: rgba(255,56,96,0.12); }

  /* ── LOADING / ERROR ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 14px;
  }
  .loading-icon { font-size: 40px; animation: spin 2s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }
  .error-msg {
    background: rgba(224,112,112,0.08);
    border: 1px solid rgba(224,112,112,0.2);
    border-radius: 16px; padding: 16px 18px; margin: 20px 16px;
    font-size: 13px; color: rgba(255,180,180,0.85);
    text-align: center; line-height: 1.6;
  }

  /* ── FOOTER ── */
  .last-updated {
    text-align: center; font-size: 10.5px;
    color: var(--muted2); margin-top: 24px; padding: 0 20px;
    letter-spacing: 0.2px;
  }
  .refresh-btn {
    display: block; margin: 10px auto 0;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.25);
    color: var(--accent);
    font-family: 'Outfit', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 9px 22px; border-radius: 50px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .refresh-btn:active {
    background: rgba(200,169,110,0.18);
    transform: scale(0.97);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .geo-loading {
    font-size: 11px; color: var(--teal);
    text-align: center; padding: 6px 20px 0;
    min-height: 22px; letter-spacing: 0.2px;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(160deg, #0d1826 0%, #080e1a 60%, #050a12 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #splash.hide {
    opacity: 0; transform: scale(1.03); pointer-events: none;
  }
  .splash-icon { font-size: 68px; animation: splashFloat 2.2s ease-in-out infinite; }
  @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes installPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(160,130,255,0); }
    50%      { box-shadow: 0 0 0 6px rgba(160,130,255,0.3); }
  }
  .splash-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text);
  }
  .splash-sub {
    font-size: 11px; color: var(--muted); letter-spacing: 2.5px;
    text-transform: uppercase;
  }
  .splash-dots { display: flex; gap: 7px; margin-top: 8px; }
  .splash-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); opacity: 0.3;
    animation: dotPulse 1.3s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: 0.22s; }
  .splash-dot:nth-child(3) { animation-delay: 0.44s; }
  @keyframes dotPulse {
    0%,100%{opacity:0.25;transform:scale(1)}
    50%{opacity:1;transform:scale(1.4)}
  }

  /* ── ASTRONOMIA ── */
  .astro-subtabs {
    display: flex; gap: 6px;
    padding: 0 16px 14px;
    overflow-x: auto; scrollbar-width: none;
  }
  .astro-subtabs::-webkit-scrollbar { display: none; }
  .astro-subtab {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 50px;
    font-size: 11px; font-weight: 600;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .astro-subtab.active {
    background: rgba(160,130,255,0.12);
    border-color: rgba(160,130,255,0.35);
    color: #a082ff;
  }
  .astro-subpanel { display: none; }
  .astro-subpanel.active { display: block; }
  .astro-card {

<script>
let currentLat = 38.1147, currentLon = 15.6500;
let currentCity = 'Reggio Calabria', currentRegion = 'Calabria, Italia';
let activeTab = 'meteo';
let searchTimer = null;

const WMO = {
  0:{label:'Sereno',icon:'☀️'},1:{label:'Prevalentemente sereno',icon:'🌤️'},
  2:{label:'Parzialmente nuvoloso',icon:'⛅'},3:{label:'Nuvoloso',icon:'☁️'},

  55:{label:'Pioggerella intensa',icon:'🌧️'},61:{label:'Pioggia leggera',icon:'🌧️'},
  63:{label:'Pioggia moderata',icon:'🌧️'},65:{label:'Pioggia intensa',icon:'🌧️'},
  71:{label:'Neve leggera',icon:'🌨️'},73:{label:'Neve moderata',icon:'❄️'},
  75:{label:'Neve intensa',icon:'❄️'},80:{label:'Rovesci leggeri',icon:'🌦️'},
  81:{label:'Rovesci moderati',icon:'🌧️'},82:{label:'Rovesci violenti',icon:'⛈️'},
  95:{label:'Temporale',icon:'⛈️'},96:{label:'Temporale con grandine',icon:'🌩️'},
  99:{label:'Temporale forte',icon:'🌩️'},
};
const getWMO = c => WMO[c] || {label:'Variabile',icon:'🌡️'};
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
const formatDate = d => `${DAYS_IT[d.getDay()]} ${d.getDate()} ${MONTHS_IT[d.getMonth()]}`;
const formatTime = s => new Date(s).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
const windDir = deg => ['N','NE','E','SE','S','SO','O','NO'][Math.round(deg/45)%8];

function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-'+name);
  if (panel) panel.classList.add('active');
  if (name === 'radar') initRadar();
  if (name === 'terremoti') initQuakes();
  if (name === 'gfs') initGFS();
  if (name === 'metar') initMetar();
  if (name === 'ventusky') initAstro();
  if (name === 'effemeridi') initEffemeridi();
}

// ============================================================
// INDICE KP — NOAA / GFZ Potsdam (dati aperti)
// ============================================================
async function fetchKp() {
  try {
    // Fonte: GFZ Potsdam - dati Kp realtime (JSON)
    const r = await fetch('https://kp.gfz-potsdam.de/app/json/?start=now-24h&end=now&index=Kp');
    if (!r.ok) throw new Error();
    const j = await r.json();
    return j;
  } catch(e) {
    // fallback: NOAA planetary Kp 1-minute
    try {
      const r2 = await fetch('https://services.swpc.noaa.gov/json/planetary_k_index_1m.json');
      if (!r2.ok) throw new Error();
      const data = await r2.json();
      return { source: 'noaa', data };
    } catch(e2) {
      return null;
    }
  }
}

function kpClass(kp) {
  if (kp < 1)  return { cls: 'kp-quiet',    label: 'Silenzioso' };
  if (kp < 3)  return { cls: 'kp-quiet',    label: 'Quieto' };
  if (kp < 4)  return { cls: 'kp-unsettled', label: 'Instabile' };
  if (kp < 5)  return { cls: 'kp-active',   label: 'Attivo' };
  if (kp < 6)  return { cls: 'kp-minor',    label: 'Tempesta G1' };
  if (kp < 7)  return { cls: 'kp-moderate', label: 'Tempesta G2' };
  if (kp < 8)  return { cls: 'kp-strong',   label: 'Tempesta G3' };
  if (kp < 9)  return { cls: 'kp-strong',   label: 'Tempesta G4' };
  return { cls: 'kp-strong', label: 'Tempesta G5' };
}

function kpColor(kp) {
  if (kp < 3)  return '#5bc4bb';
  if (kp < 4)  return '#a8e063';
  if (kp < 5)  return '#c8a96e';
  if (kp < 6)  return '#f5a623';
  if (kp < 7)  return '#e07070';
  return '#ff3860';
}

function kpDescription(kp) {
  if (kp < 1)  return 'Campo geomagnetico praticamente assente. Condizioni ideali per comunicazioni radio.';
  if (kp < 3)  return 'Attività geomagnetica quieta. Nessun effetto sulle infrastrutture. Aurora visibile solo ad alte latitudini polari.';
  if (kp < 4)  return 'Campo geomagnetico instabile. Piccole fluttuazioni. Aurora possibile oltre 65° lat. Nord.';
  if (kp < 5)  return 'Attività geomagnetica attiva. Aurora visibile oltre 60° latitudine. Lieve effetto su sistemi GPS ad alta precisione.';
  if (kp < 6)  return 'Tempesta geomagnetica G1. Aurora visibile fin verso 60° lat. Fluttuazioni di tensione nelle reti elettriche ad alta latitudine.';
  if (kp < 7)  return 'Tempesta geomagnetica G2. Aurora fino a 55° lat. Possibili interruzioni radio HF ad alte latitudini.';
  if (kp < 8)  return 'Tempesta geomagnetica G3. Aurora fino a 50° lat. Problemi di navigazione satellitare, possibili blackout radio.';
  return 'Tempesta geomagnetica intensa G4-G5. Aurora visibile a latitudini medie. Rischio per infrastrutture critiche.';
}

async function renderKpCard() {
  const kpData = await fetchKp();
  let currentKp = null;
  let history = [];
  let updatedStr = '';

  if (kpData) {
    if (kpData.source === 'noaa' && kpData.data) {
      // NOAA 1-minute data — prendi ultimi 8 valori (ultime 8 ore circa ogni ora)
      const arr = kpData.data;
      const step = Math.max(1, Math.floor(arr.length / 8));
      for (let i = 0; i < 8; i++) {
        const idx = Math.min(arr.length - 1, i * step);
        history.push(arr[idx]?.kp_index ?? 0);
      }
      currentKp = arr[arr.length - 1]?.kp_index ?? null;
      const lastTime = arr[arr.length - 1]?.time_tag;
      if (lastTime) updatedStr = 'Aggiornato: ' + new Date(lastTime).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    } else if (Array.isArray(kpData)) {
      // GFZ format
      history = kpData.slice(-8).map(d => parseFloat(d.Kp) || 0);
      currentKp = history[history.length - 1] ?? null;
      updatedStr = 'Fonte: GFZ Potsdam · ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    }
  }

  if (currentKp === null) {
    return `<div class="kp-card" style="margin-bottom:12px">
      <div class="kp-title" style="margin-bottom:8px">🌐 Indice Kp — Attività Geomagnetica</div>
      <div style="font-size:12px;color:var(--muted)">Dati non disponibili al momento. Riprova tra qualche istante.</div>
    </div>`;
  }

  const kpRound = Math.round(currentKp * 10) / 10;
  const { cls, label } = kpClass(kpRound);
  const maxKp = Math.max(...history, 1);

  const bars = history.map((v, i) => {
    const pct = Math.max(6, (v / 9) * 100);
    const col = kpColor(v);
    const h = i < history.length - 1 ? '' : ''; // last is current
    return `<div class="kp-bar-col">
      <div class="kp-bar-fill" style="height:${pct}%;background:${col};opacity:${i === history.length-1 ? 1 : 0.5}"></div>
      <div class="kp-bar-label">${v.toFixed(1)}</div>
    </div>`;
  }).join('');

function magClass(m) {
  if (m < 2.0) return 'mag-minor';
  if (m < 3.5) return 'mag-light';
  if (m < 5.0) return 'mag-moderate';
  if (m < 6.0) return 'mag-strong';
  return 'mag-major';
}
function magLabel(m) {
  if (m < 2.0) return 'Micro';
  if (m < 3.5) return 'Leggero';
  if (m < 5.0) return 'Moderato';
  if (m < 6.0) return 'Forte';
  if (m < 7.0) return '⚠️ Maggiore';
  return '🚨 Grande';
}
function timeAgo(ts) {
  // USGS → timestamp numerico in ms; INGV → stringa ISO "2024-05-07T10:23:00"
  const t = typeof ts === 'string' ? new Date(ts).getTime() : ts;
  const diff = Date.now() - t;
  if (isNaN(diff) || diff < 0) return '—';
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Adesso';
  if (m < 60) return `${m} min fa`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h fa`;
  return `${Math.floor(h / 24)}g fa`;
}

// ── INGV: terremoti Italia in tempo reale ────────────────────
async function fetchQuakesIT(days) {
  const end = new Date().toISOString().replace('T',' ').slice(0,19);
  const start = new Date(Date.now() - days * 86400000).toISOString().replace('T',' ').slice(0,19);
  const url = `https://webservices.ingv.it/fdsnws/event/1/query?format=geojson`
    + `&starttime=${encodeURIComponent(start)}&endtime=${encodeURIComponent(end)}`
    + `&minmagnitude=1.5&orderby=time&limit=80`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Errore INGV');
  return r.json();
}

// ── USGS: terremoti mondiali ─────────────────────────────────
async function fetchQuakesWorld(days) {
  const end = new Date().toISOString();
  const start = new Date(Date.now() - days * 86400000).toISOString();
  const url = `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson`
    + `&starttime=${start}&endtime=${end}`
    + `&minmagnitude=4.5&orderby=time&limit=100`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Errore USGS');
  return r.json();
}

// PWA — Service Worker inline (installabile senza server)
// ============================================================
function registerPWA() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'topweather-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.') || e.request.url.includes('earthquake')) return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'}).catch(()=>{});
}
registerPWA();

async function applyPosition(pos) {
  currentLat = pos.coords.latitude;
  currentLon = pos.coords.longitude;
  setGeoStatus('');
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${currentLat}&lon=${currentLon}&format=json&accept-language=it`);
    const j = await r.json();
    const addr = j.address || {};
    currentCity = addr.city || addr.town || addr.village || addr.county || 'La tua posizione';
    currentRegion = [addr.state||'', addr.country||''].filter(Boolean).join(', ');
  } catch(e) {
    currentCity = 'La tua posizione';
    currentRegion = `${currentLat.toFixed(2)}°N ${currentLon.toFixed(2)}°E`;
  }
  updateHeader(); load();
}

function doGeo() {
  if (!navigator.geolocation) { setGeoStatus('Geolocalizzazione non supportata', true); return; }
  setGeoStatus('🔍 Rilevamento posizione...');

  // Fase 1: posizione rapida (rete/IP, nessuna cache), max 8s
  navigator.geolocation.getCurrentPosition(
    pos => {
      applyPosition(pos);
      // Fase 2: affina con GPS ad alta precisione (in background, senza bloccare)
      navigator.geolocation.getCurrentPosition(
        pos2 => { if (pos2.coords.accuracy < pos.coords.accuracy) applyPosition(pos2); },
        () => {},
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
      );
    },
    err => {
      // Fase 1 fallita → prova direttamente GPS ad alta precisione
      setGeoStatus('🔍 Rilevamento GPS...');
      navigator.geolocation.getCurrentPosition(
        pos => applyPosition(pos),
        err2 => {
          const msgs = {1:'Accesso negato',2:'Posizione non disponibile',3:'Timeout GPS'};
          setGeoStatus('⚠️ ' + (msgs[err2.code]||'Errore'), true);
        },
        { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
      );
    },
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 0 }
  );
}

function setGeoStatus(msg, isErr) {

// ── ALLERTE via Open-Meteo (dati MeteoAlarm EUMETNET) ──
async function fetchAlerts() {
  // Fetch dati previsione per derivare allerte sintetiche
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${currentLat}&longitude=${currentLon}&timezone=auto&forecast_days=3&daily=weather_code,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,precipitation_probability_max,temperature_2m_max,temperature_2m_min,apparent_temperature_max,apparent_temperature_min`, { signal: AbortSignal.timeout(12000) });
  if (!r.ok) throw new Error('Alert N/D');

  // Tenta anche Meteoalarm CAP (API ufficiale europea, CORS permesso)
  let officialAlerts = [];
  try {
    const cap = await fetch(
      `https://feeds.meteoalarm.org/feeds/meteoalarm-legacy-atom-italy`,
      { signal: AbortSignal.timeout(4000) }
    );
    if (cap.ok) {
      const xml = await cap.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'application/xml');
      const entries = doc.querySelectorAll('entry');
      entries.forEach(entry => {
        const title   = entry.querySelector('title')?.textContent || '';
        const summary = entry.querySelector('summary')?.textContent || '';
        const cap_sev = (summary.match(/severity[:\s]+(\w+)/i)?.[1] || '').toLowerCase();
        const cap_evt = (summary.match(/event[:\s]+([^\n<]+)/i)?.[1] || title).trim();
        if (!cap_evt) return;
        const sev = cap_sev === 'extreme' ? 'sev-extreme'
                  : cap_sev === 'severe'  ? 'sev-severe'
                  : cap_sev === 'moderate'? 'sev-moderate' : 'sev-minor';
        officialAlerts.push({
          sev, icon: '🚨',
          title: `⚡ Allerta Ufficiale: ${cap_evt}`,
          desc: summary.replace(/<[^>]+>/g,'').slice(0,120) + '...',
          detail: summary.replace(/<[^>]+>/g,'').slice(0,300),
          day: 'Meteoalarm',
          official: true,
        });
      });
    }
  } catch(e) { /* silenzioso */ }

  return { forecast: await r.json(), officialAlerts };
}

// Override deriveAlerts per gestire il nuovo formato
const _origDeriveAlerts = deriveAlerts;

// Genera allerte sintetiche dai dati Open-Meteo
function deriveAlerts(data) {
  if (!data || !data.daily) return [];
  const d = data.daily;
  const alerts = [];
  const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  for (let i = 0; i < Math.min(3, d.time.length); i++) {
    const date = new Date(d.time[i]);
    const dayName = i===0 ? 'Oggi' : i===1 ? 'Domani' : DAYS_IT[date.getDay()];
    const wind   = d.wind_speed_10m_max?.[i] ?? 0;
    const gusts  = d.wind_gusts_10m_max?.[i] ?? 0;
    const rain   = d.precipitation_sum?.[i] ?? 0;
    const rainProb = d.precipitation_probability_max?.[i] ?? 0;
    const code   = d.weather_code?.[i] ?? 0;
    const tMax   = d.temperature_2m_max?.[i] ?? null;
    const tMin   = d.temperature_2m_min?.[i] ?? null;
    const appMax = d.apparent_temperature_max?.[i] ?? tMax;
    const appMin = d.apparent_temperature_min?.[i] ?? tMin;

    // 🌡️ Caldo estremo — soglia abbassata a 33°C
    if (tMax !== null && tMax >= 33) {
      const sev = tMax >= 42 ? 'sev-extreme' : tMax >= 40 ? 'sev-severe' : tMax >= 38 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🌡️',
        title: `Caldo ${tMax>=38?'estremo':'intenso'} — ${dayName}`,
        desc: `Temperatura massima: ${tMax.toFixed(0)}°C. Percepita: ${appMax!==null?appMax.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. max: ${tMax.toFixed(1)}°C · Percepita: ${appMax!==null?appMax.toFixed(1)+'°C':'-'}. Evitare esposizione al sole nelle ore centrali (12–16). Idratarsi frequentemente.`,
        day: dayName,
      });
    }

    // 🥶 Freddo intenso — soglia a 2°C
    if (tMin !== null && tMin <= 2) {
      const sev = tMin <= -10 ? 'sev-severe' : tMin <= -5 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🥶',
        title: `Freddo${tMin<0?' intenso':' in arrivo'} — ${dayName}`,
        desc: `Temperatura minima: ${tMin.toFixed(0)}°C. Percepita: ${appMin!==null?appMin.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. min: ${tMin.toFixed(1)}°C · Percepita: ${appMin!==null?appMin.toFixed(1)+'°C':'-'}. ${tMin<0?'Possibile formazione di ghiaccio. ':''}Coprirsi adeguatamente.`,
        day: dayName,
      });
    }

    // ⛈️ Temporale — aggiunto codice 80-82 (rovesci) e 91-92 (pioggia + temporale)
    const isThunder = [95,96,99].includes(code);
    const isShower  = [80,81,82].includes(code);
    const isMixed   = [91,92].includes(code);
    if (isThunder || isShower || isMixed) {
      const sev = code===99 ? 'sev-severe' : code===96||code===82 ? 'sev-moderate' : 'sev-minor';
      const label = isThunder ? `Temporale${code===99?' con grandine':''}` : isShower ? 'Rovesci intensi' : 'Pioggia e temporali';
      alerts.push({
        sev, icon: isThunder ? '⛈️' : '🌧️',
        title: `${label} — ${dayName}`,
        desc: `${label} previsti.${rain>0?' Accumulo stimato: '+rain.toFixed(1)+' mm.':''} Prob: ${rainProb}%.`,
        detail: `Codice WMO: ${code}. Precipitazioni: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. Raffiche: ${gusts.toFixed(0)} km/h. Prestare attenzione a fulmini e colpi di vento.`,
        day: dayName,
      });
    }

    // 💨 Vento forte — soglie abbassate: raffica 50 km/h o vento 40 km/h
    if (gusts >= 50 || wind >= 40) {
      const sev = gusts >= 100 ? 'sev-severe' : gusts >= 75 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '💨',
        title: `Vento ${gusts>=75?'forte':'sostenuto'} — ${dayName}`,
        desc: `Vento: ${wind.toFixed(0)} km/h, raffiche fino a ${gusts.toFixed(0)} km/h.`,
        detail: `Vento sostenuto: ${wind.toFixed(0)} km/h. Raffiche massime: ${gusts.toFixed(0)} km/h. Attenzione alla navigazione, alla guida e agli oggetti esposti.`,
        day: dayName,
      });
    }

    // 🌧️ Pioggia intensa — soglia abbassata a 20 mm
    if (rain >= 20 && !isThunder && !isShower && !isMixed) {
      const sev = rain >= 80 ? 'sev-severe' : rain >= 50 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🌧️',
        title: `Pioggia ${rain>=50?'intensa':'abbondante'} — ${dayName}`,
        desc: `Accumulo previsto: ${rain.toFixed(1)} mm. ${rain>=50?'Rischio allagamenti.':''}`,
        detail: `Precipitazioni totali: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. ${rain>=50?'Possibili allagamenti locali e difficoltà alla viabilità.':'Portare l\'ombrello.'}`,
        day: dayName,
      });
    }

    // ❄️ Neve
    if ([71,73,75,77].includes(code)) {
      const sev = code>=75 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '❄️',
        title: `Neve${code>=75?' abbondante':''} — ${dayName}`,
        desc: `Previste nevicate${code>=75?' abbondanti':''}.`,
        detail: `Codice WMO: ${code}. Possibili disagi alla viabilità. Verificare le condizioni stradali.`,
        day: dayName,
      });
    }

    // 🌫️ Nebbia
    if ([45,48].includes(code)) {
      alerts.push({
        sev: 'sev-minor', icon: '🌫️',
        title: `Nebbia — ${dayName}`,
        desc: 'Possibile visibilità ridotta.',
        detail: 'Nebbia prevista. Ridurre la velocità e aumentare la distanza di sicurezza.',
        day: dayName,
      });
    }
  }

  const order = {'sev-extreme':0,'sev-severe':1,'sev-moderate':2,'sev-minor':3};
  return alerts.sort((a,b) => (order[a.sev]??4) - (order[b.sev]??4));
}

function alertSevLabel(sev) {
  return {'sev-extreme':'ESTREMO','sev-severe':'SEVERO','sev-moderate':'MODERATO','sev-minor':'MINORE'}[sev] || '';
}

async function fetchMarine() {
  const r = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${currentLat}&longitude=${currentLon}&timezone=auto&current=wave_height,wave_direction,wave_period,wind_wave_height,swell_wave_height,sea_surface_temperature&hourly=wave_height,sea_surface_temperature&forecast_days=2`, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error('Mare N/D');
  return r.json();
}

async function fetchPollen() {
  const r = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${currentLat}&longitude=${currentLon}&timezone=auto&current=alder_pollen,birch_pollen,grass_pollen,mugwort_pollen,olive_pollen,ragweed_pollen&forecast_days=1`, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error('Pollini N/D');
  return r.json();
}

function pollenLevel(v) {
  if (v===null||v===undefined) return {label:'N/D',cls:'level-none',pct:0};
  if (v<10)  return {label:'Assente',   cls:'level-none',  pct:Math.min(v/10*20,20)};
  if (v<50)  return {label:'Basso',     cls:'level-low',   pct:20+(v-10)/40*20};
  if (v<200) return {label:'Moderato',  cls:'level-medium',pct:40+(v-50)/150*20};
  if (v<700) return {label:'Alto',      cls:'level-high',  pct:60+(v-200)/500*20};
  return          {label:'Molto alto', cls:'level-vhigh', pct:Math.min(80+(v-700)/300*20,100)};
}
const pollenColor = {'level-none':'#4ecdc4','level-low':'#a8e063','level-medium':'#f5a623','level-high':'#ff6b6b','level-vhigh':'#ff3860'};

const POLLENS = [
  // 🌳 Alberi
  {key:'olive_pollen',   name:'Olivo',      icon:'🫒', cat:'🌳 Alberi'},
  {key:'birch_pollen',   name:'Betulla',    icon:'🌳', cat:'🌳 Alberi'},
  {key:'alder_pollen',   name:'Ontano',     icon:'🌲', cat:'🌳 Alberi'},
  // 🌾 Graminacee
  {key:'grass_pollen',   name:'Graminacee', icon:'🌾', cat:'🌾 Graminacee'},
  // 🌿 Erbacce
  {key:'mugwort_pollen', name:'Artemisia',  icon:'🌿', cat:'🌿 Erbacce'},
  {key:'ragweed_pollen', name:'Ambrosia',   icon:'🤧', cat:'🌿 Erbacce'},
];

function waveLabel(h){ if(h<0.3)return'Calmo'; if(h<0.8)return'Quasi calmo'; if(h<1.5)return'Poco mosso'; if(h<2.5)return'Mosso'; if(h<4)return'Molto mosso'; return'Agitato'; }
function waveIcon(h){ if(h<0.5)return'🏖️'; if(h<3)return'🌊'; return'⛈️'; }

// Restituisce l'icona meteo tenendo conto se è giorno o notte
// sunriseTs e sunsetTs sono timestamp Unix in secondi (opzionali)
function getIcon(code, timeIso, sunriseIso, sunsetIso) {
  const t = timeIso ? new Date(timeIso) : new Date();
  const isNight = sunriseIso && sunsetIso
    ? t < new Date(sunriseIso) || t > new Date(sunsetIso)
    : (()=>{ const h=t.getHours(); return h<6||h>=21; })();

  // Icone notturne solo per cielo sereno/poco nuvoloso
  if (isNight) {
    if (code===0)  return '🌕';   // sereno → luna piena
    if (code===1)  return '🌔';   // prevalentemente sereno → luna quasi piena
    if (code===2)  return '🌙';   // parzialmente nuvoloso → luna con nuvola
    if (code===3)  return '☁️';   // nuvoloso (uguale giorno/notte)
  }
  return getWMO(code).icon;
}

  const now = new Date();

  const sunrise0 = d.sunrise[0];
  const sunset0  = d.sunset[0];

  const currentIcon = getIcon(c.weather_code, now.toISOString(), sunrise0, sunset0);

  const currentIdx = h.time.findIndex(t => new Date(t).getHours()===nowHour);
  const start = currentIdx>=0 ? currentIdx : 0;

  // Allerte da window._lastAlerts (già popolato prima di render)
  const alerts = window._lastAlerts || [];
  const hourSlots = [];
  for(let i=start;i<Math.min(start+8,h.time.length);i++){
    // Per ogni slot orario scegli l'alba/tramonto del giorno giusto
    const slotDate = new Date(h.time[i]);
    const dayIdx = d.time.findIndex(dt => dt === slotDate.toISOString().slice(0,10));
    const sr = dayIdx>=0 ? d.sunrise[dayIdx] : sunrise0;
    const ss = dayIdx>=0 ? d.sunset[dayIdx]  : sunset0;
    hourSlots.push({
      time: h.time[i],

  // Allerte — fuori dalla card, sopra tutto

            <div class="alert-chevron">›</div>

      </div>

  // METEO panel
  const meteoHTML = `
    ${alertsInlineHTML}
    <div class="main-card">
      <div class="current-top">
        <div>
          <div class="temp-main">${Math.round(c.temperature_2m)}<sup>°</sup></div>
          <div class="feels-like">Percepita ${Math.round(c.apparent_temperature)}°C</div>

        Previsioni modellistiche CAMS · Consultare un medico per allergie.<br>

  } else {
    polliniHTML = `<div class="error-msg">🌿 Dati pollinici non disponibili per questa posizione.</div>`;
  }

  const html = `
    <div id="panel-meteo" class="tab-panel ${activeTab==='meteo'?'active':''}">${meteoHTML}
      <div class="last-updated">Aggiornato: ${now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})} · Open-Meteo</div>

        <div class="ais-wrap">

    <div id="panel-pollini" class="tab-panel ${activeTab==='pollini'?'active':''}">
      <div style="height:14px"></div>${polliniHTML}

async function load() {
  document.getElementById('weather-content').innerHTML = `<div class="loading"><div class="loading-icon">🌀</div><div class="loading-text">Caricamento...</div></div>`;
  try {
    let [weather, marine, pollen, alertData] = await Promise.allSettled([
      fetchWeather(), fetchMarine(), fetchPollen(), fetchAlerts()
    ]);
    // Retry singolo automatico se il meteo (essenziale) fallisce per timeout/rete
    if (weather.status==='rejected') {
      [weather] = await Promise.allSettled([fetchWeather()]);
    }
    if (weather.status==='rejected') throw new Error('Meteo non disponibile');
    let alerts = [];
    if (alertData.status === 'fulfilled') {
      const { forecast, officialAlerts } = alertData.value;
      const derived = deriveAlerts(forecast);
      // Le allerte ufficiali vanno prima
      alerts = [...(officialAlerts || []), ...derived];
    }
    window._lastAlerts = alerts;
    render(weather.value, marine.status==='fulfilled'?marine.value:null, pollen.status==='fulfilled'?pollen.value:null);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = `<div class="error-msg">⚠️ ${e.message||'Errore'}<br>Controlla la connessione.<br><br><button class="refresh-btn" onclick="load()">Riprova</button></div>`;
  }
  // Hide splash
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('hide'); setTimeout(()=>splash.remove(), 700); }
}

async function initRadar() {

  if (!document.getElementById('panel-radar')) buildRadarPanel();

  if (!radarMap) {

    radarMap = L.map('radarMap', {

      zoom: 7,

    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 18,
    }).addTo(radarMap);

    }).addTo(radarMap).bindPopup(currentCity);

  }

async function loadRadarFrames() {
  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const j = await r.json();

    if (radarCurrentType === 'rainviewer') {
      radarFrames = [...(j.radar.past || []), ...(j.radar.nowcast || [])];
    } else if (radarCurrentType === 'sat_ir') {
      radarFrames = j.satellite?.infrared || [];
    } else {
      radarFrames = j.satellite?.visible || [];
    }

    if (!radarFrames.length) { setRadarTime('Nessun dato'); return; }

    const slider = document.getElementById('radarSlider');
    if (slider) { slider.max = radarFrames.length - 1; slider.value = radarFrames.length - 1; }
    radarIdx = radarFrames.length - 1;
    showRadarFrame(radarIdx);
  } catch(e) { setRadarTime('Errore caricamento'); }
}

function showRadarFrame(idx) {
  if (!radarMap || !radarFrames.length) return;
  radarIdx = idx;

  if (radarLayer) { radarMap.removeLayer(radarLayer); radarLayer = null; }

  const frame = radarFrames[idx];
  const ts = frame.time;
  const path = frame.path;

  let tileUrl;
  if (radarCurrentType === 'rainviewer') {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/2/1_1.png`;
  } else {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/0/0_0.png`;
  }

  radarLayer = L.tileLayer(tileUrl, { opacity: 0.7, maxZoom: 18, maxNativeZoom: 7 }).addTo(radarMap);

  const d = new Date(ts * 1000);
  setRadarTime(d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}));

  const slider = document.getElementById('radarSlider');
  if (slider) slider.value = idx;
}

function setRadarTime(t) {
  const el = document.getElementById('radarTime');
  if (el) el.textContent = t;
}

function onRadarSlider(val) {
  stopRadarPlay();
  showRadarFrame(parseInt(val));
}

function toggleRadarPlay() {
  radarPlaying ? stopRadarPlay() : startRadarPlay();
}

function startRadarPlay() {
  radarPlaying = true;
  const btn = document.getElementById('radarPlayBtn');
  if (btn) btn.textContent = '⏸';
  radarTimer = setInterval(() => {
    radarIdx = (radarIdx + 1) % radarFrames.length;
    showRadarFrame(radarIdx);
  }, 600);
}

function stopRadarPlay() {
  radarPlaying = false;
  const btn = document.getElementById('radarPlayBtn');
  if (btn) btn.textContent = '▶';
  if (radarTimer) { clearInterval(radarTimer); radarTimer = null; }
}

function setRadarType(type, el) {
  radarCurrentType = type;
  document.querySelectorAll('.radar-layer-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');

}

// Auto-geolocalizzazione all'avvio: tenta posizione reale, poi load()
// Garantisce SEMPRE l'avvio dell'app anche se il GPS non risponde mai
(function autoGeoOnStart() {
  let started = false;
  const startApp = () => {
    if (started) return;
    started = true;
    updateHeader();
    load();
  };

  // Failsafe: se entro 11s non è partito nulla, avvia comunque con i default
  // (11s = margine oltre il timeout di 8s della fase di rilevamento rete/WiFi,
  // così la geolocalizzazione automatica ha davvero il tempo di completarsi)
  const failsafe = setTimeout(startApp, 11000);

  if (!navigator.geolocation) { clearTimeout(failsafe); startApp(); return; }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const isLate = started;
      if (!isLate) clearTimeout(failsafe);
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${currentLat}&lon=${currentLon}&format=json&accept-language=it`)
        .then(r => r.json())
        .then(j => {
          const addr = j.address || {};
          currentCity = addr.city || addr.town || addr.village || addr.county || 'La tua posizione';
          currentRegion = [addr.state||'', addr.country||''].filter(Boolean).join(', ');
        })
        .catch(() => {
          currentCity = 'La tua posizione';
          currentRegion = `${currentLat.toFixed(2)}°N ${currentLon.toFixed(2)}°E`;
        })
        .finally(() => {
          if (isLate) {
            // L'app era già partita con i default: aggiorna ora con la posizione reale
            updateHeader(); load();
          } else {
            startApp();
          }
        });
    },
    () => { clearTimeout(failsafe); startApp(); }, // permesso negato o errore → carica con coordinate default
    { enableHighAccuracy: false, timeout: 8000, maximumAge: 0 }
  );
})();

// Scala colori T 850hPa
function temp850Color(t) {
  const stops = [
    [-20,[130,0,200]],[-10,[0,0,255]],[0,[0,180,255]],
    [5,[0,220,120]],[10,[100,230,0]],[15,[255,230,0]],
    [20,[255,140,0]],[25,[255,50,0]],[30,[200,0,0]]
  ];
  t = Math.max(-20, Math.min(30, t));
  for (let i = 0; i < stops.length-1; i++) {
    const [t0,c0] = stops[i], [t1,c1] = stops[i+1];
    if (t >= t0 && t <= t1) {
      const f = (t-t0)/(t1-t0);
      return `rgba(${~~(c0[0]+(c1[0]-c0[0])*f)},${~~(c0[1]+(c1[1]-c0[1])*f)},${~~(c0[2]+(c1[2]-c0[2])*f)},0.70)`;
    }
  }
  return 'rgba(200,0,0,0.70)';
}

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:10}).addTo(gfsMap);
    // Avvia polling contatore fulmini
    startLightningCounter();
  }, 80);
}

async function fetchGFSData() {
  const det = document.getElementById('gfs-load-detail');
  try {
    // Fetch tutti i punti in parallelo — parametri corretti Open-Meteo
    // temperature_850hPa, windspeed_850hPa, winddirection_850hPa sono i nomi ufficiali
    const urls = GFS_GRID.map(p =>
      `https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}` +
      `&hourly=temperature_850hPa,windspeed_850hPa,winddirection_850hPa` +
      `&forecast_days=5&timeformat=unixtime`
    );

    if (det) det.textContent = `0 / ${urls.length} punti...`;

    // Fetch sequenziali a gruppi di 4 per non sovraccaricare
    const results = [];
    for (let i = 0; i < urls.length; i += 4) {
      const batch = urls.slice(i, i+4).map(u => fetch(u).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }));
      const batchRes = await Promise.all(batch);
      results.push(...batchRes);
      if (det) det.textContent = `${Math.min(i+4, urls.length)} / ${urls.length} punti...`;
    }

    // Estrai ore dal primo risultato
    gfsHours = results[0].hourly.time; // unix timestamps

    // Ridimensiona a ogni 3h (prendi ogni 3° elemento)
    const stride = 3;
    const idxs = gfsHours.map((_,i)=>i).filter(i=>i%stride===0);
    gfsHours = idxs.map(i=>gfsHours[i]);

    gfsDataGrid = GFS_GRID.map((p, ri) => {
      const h = results[ri].hourly;
      return {
        lat: p.lat, lon: p.lon,
        temps:  idxs.map(i => h.temperature_850hPa?.[i] ?? null),
        wspeed: idxs.map(i => h.windspeed_850hPa?.[i] ?? null),
        wdir:   idxs.map(i => h.winddirection_850hPa?.[i] ?? null),
      };
    });

    // Nascondi loading
    const ld = document.getElementById('gfs-load');
    if (ld) ld.style.display = 'none';

    const slider = document.getElementById('gfs-slider');
    if (slider) slider.max = gfsHours.length - 1;

    gfsDrawFrame(0);

  } catch(e) {
    const ld = document.getElementById('gfs-load');
    if (ld) ld.innerHTML = `<div style="font-size:20px">⚠️</div>
      <div>Errore: ${e.message}</div>
      <div style="font-size:10px;opacity:.6;margin-top:4px">Riprova tra qualche minuto</div>
      <button onclick="gfsInitialized=false;initGFS()" style="margin-top:8px;padding:6px 14px;
        border-radius:8px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:11px">
        ↺ Riprova
      </button>`;
  }
}

function gfsDrawFrame(idx) {
  if (!gfsMap || !gfsDataGrid.length) return;
  gfsFrameIndex = idx;

  // Rimuovi overlays precedenti
  gfsOverlays.forEach(l => gfsMap.removeLayer(l));
  gfsOverlays = [];

  // Badge tempo
  const ts = gfsHours[idx] * 1000;
  const d = new Date(ts);
  const badge = document.getElementById('gfs-badge');
  if (badge) badge.textContent = d.toLocaleString('it-IT',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  if (gfsVar === 'temp') {
    gfsDataGrid.forEach(pt => {
      const val = pt.temps[idx];
      if (val == null) return;
      const rect = L.rectangle(
        [[pt.lat-1.0, pt.lon-1.0],[pt.lat+1.0, pt.lon+1.0]],
        { color:'none', fillColor: temp850Color(val), fillOpacity: 0.72, weight: 0 }
      );
      rect.bindTooltip(`<b>${val.toFixed(1)}°C</b><br>${pt.lat}°N ${pt.lon}°E`,{sticky:true,className:'gfs-tip'});
      rect.addTo(gfsMap);
      gfsOverlays.push(rect);
    });
  } else {
    gfsDataGrid.forEach(pt => {
      const spd = pt.wspeed[idx];
      const dir = pt.wdir[idx];
      if (spd == null || dir == null) return;
      // Freccia che punta nella direzione di provenienza
      const rad = (dir - 180) * Math.PI / 180;
      const len = Math.min(0.8 + spd * 0.03, 1.4);
      const s = [pt.lat - Math.cos(rad)*len, pt.lon - Math.sin(rad)*len];
      const e = [pt.lat + Math.cos(rad)*len, pt.lon + Math.sin(rad)*len];
      const t = Math.min(spd/35, 1);
      const col = `rgb(${~~(t*255)},${~~(200-t*160)},${~~(255-t*220)})`;
      const line = L.polyline([s,e],{color:col,weight:2.5,opacity:.9});
      const dot  = L.circleMarker(e,{radius:3,color:col,fillColor:col,fillOpacity:1,weight:0});
      line.bindTooltip(`<b>${spd.toFixed(0)} km/h</b> da ${dir.toFixed(0)}°`,{sticky:true});
      line.addTo(gfsMap); dot.addTo(gfsMap);
      gfsOverlays.push(line, dot);
    });
  }

  // UI
  const pct = (idx / Math.max(gfsHours.length-1,1)) * 100;
  const prog = document.getElementById('gfs-prog');
  if (prog) prog.style.width = pct+'%';
  const sl = document.getElementById('gfs-slider');
  if (sl) sl.value = idx;
  const lbl = document.getElementById('gfs-lbl');
  if (lbl) lbl.textContent = `+${idx*3}h`;
}

function gfsSeek(v) { stopGFSPlay(); gfsDrawFrame(+v); }
function toggleGFSPlay() { gfsPlaying ? stopGFSPlay() : startGFSPlay(); }
function startGFSPlay() {
  gfsPlaying=true;
  document.getElementById('gfs-playbtn').textContent='⏸';
  gfsTimer=setInterval(()=>gfsDrawFrame((gfsFrameIndex+1)%Math.max(gfsHours.length,1)),gfsSpeed);
}
function stopGFSPlay() {
  gfsPlaying=false; clearInterval(gfsTimer);
  const b=document.getElementById('gfs-playbtn'); if(b) b.textContent='▶';
}
function gfsSetSpd(ms,btn) {
  gfsSpeed=ms;
  document.querySelectorAll('.gfs-spd').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(gfsPlaying){stopGFSPlay();startGFSPlay();}
}
function gfsSetVar(v,btn) {
  gfsVar=v;
  document.querySelectorAll('.gfs-var-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const leg=document.getElementById('gfs-legend');
  if(leg) leg.style.display=v==='temp'?'flex':'none';
  if(gfsDataGrid.length) gfsDrawFrame(gfsFrameIndex);
}

  if (modelCache[cacheKey]) { renderModelChart(modelCache[cacheKey], containerId, model); return; }

  el.innerHTML = `<div class="loading"><div class="loading-icon" style="font-size:24px">🌐</div><div class="loading-text">Scarico ${model === 'ecmwf' ? 'ECMWF IFS 9km' : 'ICON-EU'}...</div></div>`;

  try {
    // ECMWF: endpoint dedicato open-meteo.com/v1/ecmwf

    const baseUrl = model === 'ecmwf'
      ? `https://api.open-meteo.com/v1/ecmwf?latitude=${currentLat}&longitude=${currentLon}&hourly=temperature_2m,precipitation,wind_speed_10m,wind_gusts_10m,cloud_cover,cape&wind_speed_unit=kmh&timezone=auto&forecast_days=10`

function mcSetVar(varName, containerId, btn) {

function drawMCChart(varName, containerId) {
  const el = document.getElementById(containerId);
  if (!el || !el._mcData) return;
  const { labels, temps, prec, wind, gusts, cloud, cape, modelColor } = el._mcData;
  const canvas = document.getElementById('mc-canvas-' + containerId);
  const xLabels = document.getElementById('mc-xlabels-' + containerId);
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 340;
  const H = 180;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  let values, color, isBar = false, unit = '';
  switch(varName) {
    case 'temp':  values = temps;  color = '#f87171'; unit = '°C'; break;
    case 'prec':  values = prec;   color = '#60a5fa'; unit = 'mm'; isBar = true; break;
    case 'wind':  values = gusts;  color = '#fbbf24'; unit = 'km/h'; break;
    case 'cloud': values = cloud;  color = modelColor; unit = '%'; break;
    case 'cape':  values = cape;   color = '#f59e0b'; unit = 'J/kg'; isBar = true; break;
  }

  const valid = values.filter(v => v !== null && !isNaN(v));
  if (!valid.length) return;
  const vMin = isBar ? 0 : Math.min(...valid) - 2;
  const vMax = Math.max(...valid) + (isBar ? Math.max(...valid) * 0.15 : 2);
  const n = values.length;

  const pad = { t: 24, b: 16, l: 36, r: 8 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const toY = v => pad.t + chartH - ((v - vMin) / (vMax - vMin)) * chartH;
  const toX = i => pad.l + (i / (n - 1)) * chartW;

  // Grid
  const gridLines = 4;
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  for (let g = 0; g <= gridLines; g++) {
    const y = pad.t + (g / gridLines) * chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    const val = vMax - (g / gridLines) * (vMax - vMin);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '8px Outfit';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(varName==='temp'?0:0) + (g===0?unit:''), pad.l - 3, y + 3);
  }

  if (isBar) {
    const bw = Math.max(2, chartW / n * 0.7);
    values.forEach((v, i) => {
      if (v === null || isNaN(v)) return;
      const x = toX(i) - bw / 2;
      const barH = ((v - 0) / (vMax - vMin)) * chartH;
      const grad = ctx.createLinearGradient(0, toY(v), 0, toY(0));
      grad.addColorStop(0, color); grad.addColorStop(1, color + '33');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect ? ctx.roundRect(x, toY(v), bw, barH, 2) : ctx.rect(x, toY(v), bw, barH);
      ctx.fill();
    });
  } else {
    // Area sotto la linea
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(values[0] ?? vMin));
    values.forEach((v, i) => { if (v !== null) ctx.lineTo(toX(i), toY(v)); });
    ctx.lineTo(toX(n-1), H - pad.b); ctx.lineTo(toX(0), H - pad.b); ctx.closePath();
    const agrad = ctx.createLinearGradient(0, pad.t, 0, H - pad.b);
    agrad.addColorStop(0, color + '33'); agrad.addColorStop(1, color + '05');
    ctx.fillStyle = agrad; ctx.fill();
    // Linea
    ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    values.forEach((v, i) => { if (v !== null) { i===0 ? ctx.moveTo(toX(i),toY(v)) : ctx.lineTo(toX(i),toY(v)); } });
    ctx.stroke();
  }

  // X labels (ogni ~24h)
  if (xLabels) {
    const step24 = Math.max(1, Math.round(24 / 3)); // ogni 24h
    const shown = [];
    for (let i = 0; i < labels.length; i += step24) shown.push(labels[i].split(' ').slice(0,2).join(' '));
    xLabels.innerHTML = shown.map(l => `<span>${l}</span>`).join('');
  }
}

// ── Ensemble chart ────────────────────────────────────────────
const ensembleCache = {};

async function loadEnsembleChart(containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const cacheKey = 'ens_' + currentLat.toFixed(2) + '_' + currentLon.toFixed(2);
  if (ensembleCache[cacheKey]) { renderEnsembleChart(ensembleCache[cacheKey], containerId); return; }

  el.innerHTML = `<div class="loading"><div class="loading-icon" style="font-size:24px">📊</div><div class="loading-text">Scarico dati ensemble...</div></div>`;

  try {
    // GFS ENS + ICON EPS via Open-Meteo Ensemble API
    const [rGfs, rIcon] = await Promise.allSettled([
      fetch(`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${currentLat}&longitude=${currentLon}&hourly=temperature_2m,precipitation&models=gfs_seamless&forecast_days=7&timezone=auto`),
      fetch(`https://ensemble-api.open-meteo.com/v1/ensemble?latitude=${currentLat}&longitude=${currentLon}&hourly=temperature_2m,precipitation&models=icon_seamless&forecast_days=7&timezone=auto`)
    ]);
    const gfsData  = rGfs.status  === 'fulfilled' && rGfs.value.ok  ? await rGfs.value.json()  : null;
    const iconData = rIcon.status === 'fulfilled' && rIcon.value.ok ? await rIcon.value.json() : null;
    ensembleCache[cacheKey] = { gfsData, iconData };
    renderEnsembleChart({ gfsData, iconData }, containerId);
  } catch(e) {
    el.innerHTML = `<div class="error-msg">⚠️ Errore ensemble: ${e.message}</div>`;
  }
}

function renderEnsembleChart({ gfsData, iconData }, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  // Estrai membri e calcola percentili
  function getMembers(data, varName) {
    if (!data?.hourly) return [];
    return Object.entries(data.hourly)
      .filter(([k]) => k.startsWith(varName + '_member'))
      .map(([, v]) => v);
  }

  const gfsMembers  = getMembers(gfsData,  'temperature_2m');
  const iconMembers = getMembers(iconData, 'temperature_2m');
  const times       = gfsData?.hourly?.time || iconData?.hourly?.time || [];

  if (!times.length || (!gfsMembers.length && !iconMembers.length)) {
    el.innerHTML = `<div class="error-msg">⚠️ Nessun membro ensemble disponibile.</div>`; return;
  }

  // Campiona ogni 6h
  const step = 6;
  const n    = Math.min(times.length, 7*24);
  const sampledTimes = [], p10 = [], p50 = [], p90 = [], iconP50 = [];
  const allMembers = [...gfsMembers, ...iconMembers];

  for (let i = 0; i < n; i += step) {
    sampledTimes.push(new Date(times[i]));
    const vals = allMembers.map(m => m?.[i]).filter(v => v != null).sort((a,b)=>a-b);
    if (!vals.length) { p10.push(null); p50.push(null); p90.push(null); continue; }
    p10.push(vals[Math.floor(vals.length * 0.10)]);
    p50.push(vals[Math.floor(vals.length * 0.50)]);
    p90.push(vals[Math.floor(vals.length * 0.90)]);
    const iconVals = iconMembers.map(m => m?.[i]).filter(v => v != null).sort((a,b)=>a-b);
    iconP50.push(iconVals.length ? iconVals[Math.floor(iconVals.length*0.5)] : null);
  }

  const totalMem = allMembers.length;

  el.innerHTML = `
    <div class="mc-wrap">
      <div class="mc-title">📊 Ensemble — ${currentCity} · 7 giorni · ${totalMem} membri</div>
      <div class="mc-kpi">
        <div class="mc-kpi-item"><div class="mc-kpi-val" style="color:#a082ff">${gfsMembers.length}</div><div class="mc-kpi-lbl">GFS ENS</div></div>
        <div class="mc-kpi-item"><div class="mc-kpi-val" style="color:#6ecba8">${iconMembers.length}</div><div class="mc-kpi-lbl">ICON EPS</div></div>
        <div class="mc-kpi-item"><div class="mc-kpi-val" style="color:var(--teal)">${totalMem}</div><div class="mc-kpi-lbl">Tot. membri</div></div>
        <div class="mc-kpi-item"><div class="mc-kpi-val" style="color:#fbbf24">${p90[0]!=null?(p90[0]-p10[0]).toFixed(1)+'°':'—'}</div><div class="mc-kpi-lbl">Spread ora</div></div>
      </div>
      <div class="mc-canvas-wrap">
        <canvas class="mc-canvas" id="mc-ens-canvas" style="height:200px"></canvas>
        <div style="display:flex;gap:12px;justify-content:center;margin-top:6px;flex-wrap:wrap">
          <span style="font-size:9.5px;color:rgba(160,130,255,0.5)">■ P10–P90 GFS+ICON</span>
          <span style="font-size:9.5px;color:#a082ff">— P50 GFS+ICON</span>
          <span style="font-size:9.5px;color:#6ecba8">— P50 ICON</span>
        </div>
      </div>
      <div class="mc-info">
        <strong style="color:var(--text)">Ensemble forecast</strong> — ${totalMem} simulazioni con condizioni iniziali leggermente perturbate.
        La banda colorata mostra l'incertezza (P10–P90): più è ampia, meno affidabile è la previsione.
        La linea viola è il valore mediano combinato GFS+ICON, la verde è solo ICON. Dati via <strong style="color:var(--text)">Open-Meteo Ensemble API</strong> · CC BY 4.0.
      </div>
    </div>
  `;

  // Disegna ensemble chart
  setTimeout(() => {
    const canvas = document.getElementById('mc-ens-canvas');
    if (!canvas) return;
    const W = canvas.offsetWidth || 340;
    const H = 200;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0,0,W,H);
    const nn = p50.filter(v=>v!==null).length;
    if (!nn) return;

    const vMin = Math.min(...p10.filter(v=>v!==null)) - 1;
    const vMax = Math.max(...p90.filter(v=>v!==null)) + 1;
    const pad = { t:20, b:16, l:38, r:8 };
    const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
    const toY = v => pad.t + cH - ((v-vMin)/(vMax-vMin))*cH;
    const toX = i => pad.l + (i/(sampledTimes.length-1))*cW;

    // Grid
    for (let g=0; g<=4; g++) {
      const y = pad.t + (g/4)*cH;
      ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
      const v = vMax-(g/4)*(vMax-vMin);
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='8px Outfit'; ctx.textAlign='right';
      ctx.fillText(v.toFixed(0)+'°', pad.l-3, y+3);
    }

    // Banda incertezza P10-P90
    ctx.beginPath();
    sampledTimes.forEach((_,i)=>{ if(p90[i]!==null) i===0?ctx.moveTo(toX(i),toY(p90[i])):ctx.lineTo(toX(i),toY(p90[i])); });
    for(let i=sampledTimes.length-1;i>=0;i--){ if(p10[i]!==null) ctx.lineTo(toX(i),toY(p10[i])); }
    ctx.closePath();
    ctx.fillStyle='rgba(160,130,255,0.18)'; ctx.fill();

    // Linea P50 GFS+ICON
    ctx.beginPath(); ctx.strokeStyle='#a082ff'; ctx.lineWidth=2.5; ctx.lineJoin='round';
    sampledTimes.forEach((_,i)=>{ if(p50[i]!==null) i===0?ctx.moveTo(toX(i),toY(p50[i])):ctx.lineTo(toX(i),toY(p50[i])); });
    ctx.stroke();

    // Linea P50 ICON
    if (iconP50.some(v=>v!==null)) {
      ctx.beginPath(); ctx.strokeStyle='#6ecba8'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
      sampledTimes.forEach((_,i)=>{ if(iconP50[i]!==null) i===0?ctx.moveTo(toX(i),toY(iconP50[i])):ctx.lineTo(toX(i),toY(iconP50[i])); });
      ctx.stroke(); ctx.setLineDash([]);
    }

    // X labels
    const shown = Math.min(7, sampledTimes.length);
    const si    = Math.floor(sampledTimes.length / shown);
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='8px Outfit'; ctx.textAlign='center';
    for(let i=0;i<sampledTimes.length;i+=si) {
      const d=sampledTimes[i];
      const lbl=d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric'});
      ctx.fillText(lbl, toX(i), H-2);
    }
  }, 80);
}

// Cache piste fetched da OurAirports
const rwyCache = {};
// Pista corrente selezionata
let currentRwyHdg = 150;
let currentRwyLabel = '15/33';
let currentRwyAll = [{ name:'15/33', hdg:150, label:'15/33' }];

async function fetchRunways(icao) {
  // Prima controlla cache e DB locale
  if (rwyCache[icao]) return rwyCache[icao];
  if (RWY_DB[icao])   { rwyCache[icao] = RWY_DB[icao]; return RWY_DB[icao]; }

  // Fallback: prova a ottenere i dati da aviationweather.gov (stesso dominio del METAR)
  try {
    const r = await fetch(
      `https://aviationweather.gov/api/data/airport?ids=${icao}&format=json`,
      { signal: AbortSignal.timeout(5000) }
    );
    if (r.ok) {
      const data = await r.json();
      const apt = Array.isArray(data) ? data[0] : data;
      // aviationweather restituisce il campo 'rwy' con le piste
      if (apt?.rwy?.length) {
        const runways = apt.rwy.map(rw => {
          const hdg = Math.round(parseFloat(rw.heading) || 90);
          const label = (rw.id || '09/27').replace('C','').replace('L','').replace('R','');
          return { name: rw.id || '09/27', hdg, label };
        });
        rwyCache[icao] = runways;
        return runways;
      }
    }
  } catch(e) {}

  // Fallback finale: pista generica basata sulle prime due cifre del codice
  const fallback = [{ name: '09/27', hdg: 90, label: '09/27' }];
  rwyCache[icao] = fallback;
  return fallback;
}

function renderCrosswindWidget(wdir, wspd, wgst, runways) {
  const el = document.getElementById('cw-widget');
  if (!el) return;

  // Usa le piste passate o quelle correnti
  if (runways) {
    currentRwyAll  = runways;
    currentRwyHdg   = runways[0].hdg;
    currentRwyLabel = runways[0].label;
  }

  if (wdir == null || wspd == null || (wdir === 0 && wspd === 0)) {
    el.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:8px">
      Vento calma — nessuna componente significativa.</div>`;
    return;
  }

  const RWY_HDG = currentRwyHdg;

  // Selettore pista (se più di una)
  const rwySelector = currentRwyAll.length > 1
    ? `<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
        ${currentRwyAll.map((rwy, i) => `
          <button onclick="selectRunway(${i},${wdir},${wspd},${wgst||'null'})"
            style="flex:1;padding:6px 10px;border-radius:10px;font-size:11px;font-weight:600;
              font-family:'Outfit',sans-serif;cursor:pointer;
              border:1px solid ${rwy.hdg===currentRwyHdg ? 'rgba(99,202,255,0.4)' : 'var(--border)'};
              background:${rwy.hdg===currentRwyHdg ? 'rgba(99,202,255,0.12)' : 'var(--glass)'};
              color:${rwy.hdg===currentRwyHdg ? '#63caff' : 'var(--muted)'}">
            RWY ${rwy.label}
          </button>`).join('')}
      </div>`
    : '';

  // Calcolo componenti
  const rad = Math.PI / 180;
  const relAngle = ((wdir - RWY_HDG) + 360) % 360;
  const relRad   = relAngle * rad;
  const headwind  = Math.round(wspd * Math.cos(relRad));
  const crosswind = Math.round(Math.abs(wspd * Math.sin(relRad)));
  const cwDir     = Math.sin(relRad) >= 0 ? 'D→' : '←S';
  let cwGust = null, hwGust = null;
  if (wgst) {
    cwGust = Math.round(Math.abs(wgst * Math.sin(relRad)));
    hwGust = Math.round(wgst * Math.cos(relRad));
  }

  const cwColor = crosswind < 10 ? 'cw-ok' : crosswind < 15 ? 'cw-warn' : 'cw-crit';
  const hwLabel = headwind >= 0 ? '⬆ Vento contrario' : '⬇ Vento in coda';
  const hwColor = headwind < 0 ? 'cw-warn' : 'cw-ok';

  // Canvas
  const size = 130;
  const cx = size / 2, cy = size / 2, r = 50;
  const windFromAngle = (wdir - 90) * rad;
  const wxEnd = cx + r * Math.cos(windFromAngle);
  const wyEnd = cy + r * Math.sin(windFromAngle);
  const rwyAngle1 = (RWY_HDG - 90) * rad;
  const rwyAngle2 = (RWY_HDG + 180 - 90) * rad;
  const rx1 = cx + (r + 2) * Math.cos(rwyAngle1);
  const ry1 = cy + (r + 2) * Math.sin(rwyAngle1);
  const rx2 = cx + (r + 2) * Math.cos(rwyAngle2);
  const ry2 = cy + (r + 2) * Math.sin(rwyAngle2);

  // Label pista: numero corto (es. "15" e "33")
  const parts = currentRwyLabel.split('/');
  const lbl1 = parts[0] || '??';
  const lbl2 = parts[1] || '??';

  el.innerHTML = `
    <div style="font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
      color:#63caff;opacity:0.85;margin-bottom:12px">💨 Crosswind — Pista ${currentRwyLabel}</div>
    ${rwySelector}
    <div class="cw-main">
      <div class="cw-canvas-wrap">
        <canvas id="cw-canvas" width="${size}" height="${size}"></canvas>
      </div>
      <div class="cw-stats">
        <div class="cw-stat">
          <div class="cw-stat-label">💨 Crosswind (${cwDir})</div>
          <div class="cw-stat-val ${cwColor}">${crosswind} kt${cwGust ? ' / ' + cwGust + ' kt' : ''}</div>
        </div>
        <div class="cw-stat">
          <div class="cw-stat-label">${hwLabel}</div>
          <div class="cw-stat-val ${hwColor}">${Math.abs(headwind)} kt${hwGust ? ' / ' + Math.abs(hwGust) + ' kt' : ''}</div>
        </div>
        <div class="cw-stat">
          <div class="cw-stat-label">🌬 Vento rilevato</div>
          <div class="cw-stat-val" style="font-size:14px;color:var(--text)">${wdir}° / ${wspd} kt${wgst ? ' (raffica ' + wgst + ' kt)' : ''}</div>
        </div>
      </div>
    </div>
    <div class="cw-limits">
      <div class="cw-limit">
        <div class="cw-limit-label">Limite XW leggeri</div>
        <div class="cw-limit-val ${crosswind < 15 ? 'cw-ok' : 'cw-crit'}">15 kt — ${crosswind < 15 ? '✓ OK' : '✗ OLTRE'}</div>
      </div>
      <div class="cw-limit">
        <div class="cw-limit-label">Limite XW ICAO</div>
        <div class="cw-limit-val ${crosswind < 20 ? 'cw-ok' : 'cw-crit'}">20 kt — ${crosswind < 20 ? '✓ OK' : '✗ OLTRE'}</div>
      </div>
      <div class="cw-limit">
        <div class="cw-limit-label">Pista attiva</div>
        <div class="cw-limit-val" style="color:#63caff">RWY ${headwind >= 0 ? lbl1 : lbl2}</div>
      </div>
    </div>
  `;

  // Disegna canvas
  setTimeout(() => {
    const canvas = document.getElementById('cw-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.stroke();
    [r*0.5, r*0.25].forEach(rr => {
      ctx.beginPath(); ctx.arc(cx, cy, rr, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.stroke();
    });
    ctx.beginPath(); ctx.moveTo(rx1, ry1); ctx.lineTo(rx2, ry2);
    ctx.strokeStyle = 'rgba(99,202,255,0.6)'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();

    // Etichette pista dentro il cerchio
    ctx.font = 'bold 10px Outfit'; ctx.fillStyle = '#63caff';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const labelR = r - 12;
    ctx.fillText(lbl2, cx + labelR * Math.cos(rwyAngle1), cy + labelR * Math.sin(rwyAngle1));
    ctx.fillText(lbl1, cx + labelR * Math.cos(rwyAngle2), cy + labelR * Math.sin(rwyAngle2));

    // Freccia vento
    const arrowColor = crosswind < 10 ? '#4ade80' : crosswind < 15 ? '#fbbf24' : '#f87171';
    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(wxEnd, wyEnd);
    ctx.strokeStyle = arrowColor; ctx.lineWidth = 2.5; ctx.stroke();
    const ang = Math.atan2(wyEnd - cy, wxEnd - cx);
    ctx.beginPath();
    ctx.moveTo(wxEnd, wyEnd);
    ctx.lineTo(wxEnd - 8*Math.cos(ang-0.4), wyEnd - 8*Math.sin(ang-0.4));
    ctx.lineTo(wxEnd - 8*Math.cos(ang+0.4), wyEnd - 8*Math.sin(ang+0.4));
    ctx.closePath(); ctx.fillStyle = arrowColor; ctx.fill();
    ctx.beginPath(); ctx.arc(cx, cy, 3, 0, 2*Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();

    // Cardinali
    ctx.font = '9px Outfit'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', cx, 8); ctx.fillText('S', cx, size-8);
    ctx.fillText('E', size-6, cy); ctx.fillText('O', 6, cy);
  }, 50);
}

function selectRunway(idx, wdir, wspd, wgst) {
  if (!currentRwyAll[idx]) return;
  currentRwyHdg   = currentRwyAll[idx].hdg;

}
