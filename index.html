async function fetchMetar(icao) {
  metarStationId = icao;
  const body = document.getElementById('metar-body');
  if (!body) return;
  body.innerHTML = `<div class="loading"><div class="loading-icon">📡</div><div class="loading-text">Carico ${icao}...</div></div>`;

  // CheckWX proxied via Cloudflare Worker (chiave API mai esposta nel sorgente)
  const WORKER_METAR = `https://checkwx-proxy.ilariomariani.workers.dev/metar/${icao}`;
  const WORKER_TAF   = `https://checkwx-proxy.ilariomariani.workers.dev/taf/${icao}`;
  const AWC_METAR    = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
  const AWC_TAF      = `https://aviationweather.gov/api/data/taf?ids=${icao}&format=json`;

  const ft = (url, ms = 10000, opts = {}) => {
    const c = new AbortController();
    const id = setTimeout(() => c.abort(), ms);
    return fetch(url, { signal: c.signal, ...opts }).finally(() => clearTimeout(id));
  };

  // Normalizza risposta CheckWX (api.checkwxapi.com decoded) in formato compatibile con AWC
  const normalizeCheckWX = (d, isTaf = false) => {
    if (!d || !d.data || !d.data.length) throw new Error('empty');
    const s = d.data[0];
    if (isTaf) {
      return [{
        rawTAF:    s.raw_text || '',
        stationId: s.icao || icao,
        validTime: s.period ? s.period.from : '',
        fcsts:     (s.forecast || []).map(f => ({
          timeFrom: f.change && f.change.period ? f.change.period.from : '',
          timeTo:   f.change && f.change.period ? f.change.period.to   : '',
          wdir:     f.wind ? f.wind.degrees : null,
          wspd:     f.wind && f.wind.speed ? f.wind.speed.kts : null,
          wgst:     f.wind && f.wind.gust  ? f.wind.gust.kts  : null,
          visib:    f.visibility ? f.visibility.miles : null,
          wxString: (f.conditions || []).map(c => c.code).join(' '),
          clouds:   (f.clouds || []).map(c => ({ cover: c.code, base: c.feet ? c.feet/100 : 0 })),
        })),
      }];
    }
    const wind = s.wind || {};
    const vis  = s.visibility || {};
    const pres = s.pressure || {};
    const tmp  = s.temperature || {};
    const dew  = s.dewpoint || {};
    return [{
      rawOb:       s.raw_text || '',
      stationId:   s.icao || icao,
      temp:        tmp.celsius != null ? tmp.celsius : null,
      dewp:        dew.celsius != null ? dew.celsius : null,
      wdir:        wind.degrees != null ? wind.degrees : null,
      wspd:        wind.speed && wind.speed.kts != null ? wind.speed.kts : null,
      wgst:        wind.gust  && wind.gust.kts  != null ? wind.gust.kts  : null,
      visib:       vis.miles != null ? vis.miles : null,
      altim:       pres.mb != null ? pres.mb : null,
      wxString:    (s.conditions || []).map(c => c.code).join(' '),
      clouds:      (s.clouds || []).map(c => ({ cover: c.code, base: c.feet ? c.feet/100 : 0 })),
      flightRules: s.flight_category || '',
      obsTime:     s.observed || '',
    }];
  };

  // Strategia: 1) CheckWX API key (CORS nativo, perfetto su Android WebView)
  //            2) AWC diretto (browser OK, WebView spesso bloccato)
  //            3) Proxy CORS su AWC — ultima risorsa
  const fetchMetarData = async (awcUrl, workerUrl, isTaf = false) => {
    // 1. Worker CheckWX — chiave sicura lato server, CORS nativo, funziona su WebView
    try {
      const r = await ft(workerUrl, 8000, { mode: 'cors' });
      if (r.ok) {
        const d = await r.json();
        return normalizeCheckWX(d, isTaf);
      }
    } catch(_) {}

    // 2. AWC diretto
    try {
      const r = await ft(awcUrl, 7000, { mode: 'cors' });
      if (r.ok) {
        const d = await r.json();
        if (Array.isArray(d) && d.length) return d;
      }
    } catch(_) {}

    // 3. Proxy CORS su AWC
    const proxyResult = await Promise.any([
      ft(`https://corsproxy.io/?url=${encodeURIComponent(awcUrl)}`, 10000)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(d => { if (!Array.isArray(d) || !d.length) throw new Error('empty'); return d; }),
      ft(`https://api.allorigins.win/raw?url=${encodeURIComponent(awcUrl)}`, 10000)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(d => { if (!Array.isArray(d) || !d.length) throw new Error('empty'); return d; }),
      ft(`https://api.allorigins.win/get?url=${encodeURIComponent(awcUrl)}`, 10000)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(d => { const p = JSON.parse(d.contents || '[]'); if (!Array.isArray(p) || !p.length) throw new Error('empty'); return p; }),
    ]);
    return proxyResult;
  };

  try {
    const [mArr, tArr] = await Promise.all([
      fetchMetarData(AWC_METAR, WORKER_METAR, false),
      fetchMetarData(AWC_TAF,   WORKER_TAF,   true).catch(() => []),
    ]);
    const m = Array.isArray(mArr) ? mArr[0] : null;
    const t = Array.isArray(tArr) ? tArr[0] : null;
    if (!m) throw new Error('Nessun dato per ' + icao);
    renderMetarResult(m, t, icao);
  } catch(e) {
    body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
      <div style="font-size:28px">⚠️</div>
      <div style="margin-top:8px;font-size:13px">Nessun servizio ha risposto per <b>${icao}</b>.<br>
      <span style="font-size:11px;opacity:.7">Controlla il codice ICAO e la connessione, poi riprova.</span></div>
      <button onclick="fetchMetar('${icao}')" style="margin-top:14px;padding:8px 20px;
        border-radius:10px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:12px;font-weight:700">
        ↺ Riprova
      </button>
    </div>`;
  }
}

function metarWxIcon(wx) {
  if (!wx) return '';
  if (wx.includes('TS')) return '⛈';
  if (wx.includes('RA') || wx.includes('DZ')) return '🌧';
  if (wx.includes('SN') || wx.includes('GS')) return '❄️';
  if (wx.includes('FG') || wx.includes('BR')) return '🌫';
  if (wx.includes('HZ')) return '😶‍🌫️';
  if (wx.includes('SQ') || wx.includes('FC')) return '🌪';
  return '🌦';
}

function flightRule(vis, ceil) {
  // vis in statute miles, ceil in feet
  if (ceil < 500 || vis < 1) return ['LIFR','fr-lifr'];
  if (ceil < 1000 || vis < 3) return ['IFR','fr-ifr'];
  if (ceil < 3000 || vis < 5) return ['MVFR','fr-mvfr'];
  return ['VFR','fr-vfr'];
}

function renderMetarResult(m, taf, icao) {
  const body = document.getElementById('metar-body');
  if (!m) {
    body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
      <div style="font-size:28px">🚫</div><div>Nessun METAR disponibile per ${icao}.<br>Verifica il codice ICAO.</div></div>`;
    return;
  }

  // --- decodifica METAR ---
  const wind = m.wdir != null
    ? `${m.wdir === 0 && m.wspd === 0 ? 'CALMA' : m.wdir + '°'} ${m.wspd || 0} kt${m.wgst ? ' / Raffica ' + m.wgst + ' kt' : ''}`
    : 'N/D';
  const vis  = m.visib != null ? (m.visib >= 9999 ? '≥10 km' : m.visib + ' SM') : 'N/D';
  const temp = m.temp  != null ? m.temp + ' °C' : 'N/D';
  const dewp = m.dewp  != null ? m.dewp + ' °C' : 'N/D';
  const altim = m.altim != null ? m.altim.toFixed(0) + ' hPa' : 'N/D';
  const wxStr = (m.wxString || '').trim();
  const wxIcon = metarWxIcon(wxStr);

  // Sky condition
  const skyMap = { SKC:'Cielo libero', CLR:'Cielo libero', FEW:'Poche nuvole', SCT:'Nuvolosità variabile', BKN:'Molto nuvoloso', OVC:'Coperto', VV:'Visibilità verticale' };
  const skyChips = (m.clouds || []).map(c => {
    // aviationweather.gov: c.base è in centinaia di piedi (es. 25 = 2500 ft)
    // Ma alcuni proxy potrebbero restituirlo già in piedi interi
    // Heuristica: se base < 1000 è quasi certamente in centinaia di ft
    const raw = parseFloat(c.base);
    if (c.base == null || isNaN(raw)) {
      return `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover}</span>`;
    }
    const ftVal = raw < 1000 ? raw * 100 : raw; // centinaia → piedi
    const mVal  = Math.round(ftVal * 0.3048);
    return `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover} · ${ftVal.toLocaleString('it-IT')} ft (${mVal} m)</span>`;
  }).join('');

  // Ceiling for flight rules (in feet)
  const bknovc = (m.clouds||[]).filter(c=>['BKN','OVC','VV'].includes(c.cover));
  const ceil = bknovc.length ? Math.min(...bknovc.map(c => {
    const raw = parseFloat(c.base);
    return isNaN(raw) ? 99999 : (raw < 1000 ? raw * 100 : raw);
  })) : 99999;
  const [fr, frClass] = flightRule(m.visib || 99, ceil);

  // Orario
  const obsTime = m.reportTime ? new Date(m.reportTime).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+' UTC' : '';

  // --- TAF ---
  let tafHTML = '<div style="padding:0 16px 8px;color:var(--muted);font-size:12px">Nessun TAF disponibile.</div>';
  if (taf && taf.rawTAF) {
    // Mostra TAF grezzo con parsing basilare
    const lines = taf.rawTAF.replace(/\n/g,' ').split(/(TEMPO|BECMG|FM\d{6}|PROB\d{2}\s+TEMPO|PROB\d{2})/)
      .filter(s=>s.trim());
    let tafParsed = '';
    let mainBlock = true;
    for (let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      if (!l) continue;
      if (/^(TEMPO|BECMG|FM\d{6}|PROB\d{2})/.test(l)) {
        // keyword, next is content
        const keyword = l;
        const content = lines[i+1] ? lines[i+1].trim() : '';
        i++;
        const kLabel = keyword.startsWith('FM') ? '⏩ Da '+keyword.slice(2)
          : keyword.startsWith('TEMPO') ? '⚡ Temporaneamente'
          : keyword.startsWith('BECMG') ? '🔄 In evoluzione'
          : keyword.startsWith('PROB') ? '🎲 '+keyword
          : keyword;
        tafParsed += `<div class="taf-line"><div class="taf-period">${kLabel}</div><div class="taf-text">${content}</div></div>`;
      } else if (mainBlock) {
        tafParsed += `<div class="taf-line"><div class="taf-period">📋 Previsione base</div><div class="taf-text">${l}</div></div>`;
        mainBlock = false;
      }
    }
    const tafValidity = taf.validTimeFrom && taf.validTimeTo
      ? `Valido: ${new Date(taf.validTimeFrom * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} → ${new Date(taf.validTimeTo * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} UTC`
      : '';
    tafHTML = `
      <div class="metar-card">
        <div class="metar-card-title">📋 TAF — ${icao} <span style="font-weight:400;font-size:9px;margin-left:auto">${tafValidity}</span></div>
        <div class="metar-raw">${taf.rawTAF || ''}</div>
        <div>${tafParsed}</div>
      </div>`;
  }

  body.innerHTML = `
    <div class="metar-time">📡 Osservazione: ${obsTime}</div>
    <div class="metar-card">
      <div class="metar-card-title">
        <span class="metar-cond">${wxIcon||'🌡'}</span>
        METAR — ${m.name||icao}
        <span class="metar-flight-rule ${frClass}">${fr}</span>
      </div>
      <div class="metar-raw">${m.rawOb || ''}</div>
      <div class="metar-grid">
        <div class="metar-item"><div class="metar-item-lbl">🌡 Temperatura</div><div class="metar-item-val">${temp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💧 Punto di rugiada</div><div class="metar-item-val">${dewp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💨 Vento</div><div class="metar-item-val" style="font-size:12px">${wind}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">👁 Visibilità</div><div class="metar-item-val">${vis}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">🔵 Pressione QNH</div><div class="metar-item-val">${altim}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">☁️ Nuvolosità</div>
          <div class="metar-sky">${skyChips||'<span class="metar-sky-chip">N/D</span>'}</div>
        </div>
      </div>
      ${wxStr ? `<div class="metar-sky" style="margin-top:10px"><span class="metar-wx-chip">${wxIcon} ${wxStr}</span></div>` : ''}
    </div>
    ${tafHTML}
    <div class="last-updated" style="margin:4px 16px 12px">Fonte: NOAA Aviation Weather Center · aviationweather.gov</div>
  `;
  // Dopo aver renderizzato il METAR, carica piste e widget crosswind
  renderGpsSatCard();
  fetchRunways(icao).then(runways => {
    renderCrosswindWidget(m.wdir, m.wspd, m.wgst || null, runways);
  });
}

// Propagazione SGP4 semplificata
function satElevation(line1, line2, lat, lon, now) {
  try {
    const rad = Math.PI / 180;
    const incl = parseFloat(line2.slice(8,16)) * rad;
    const raan = parseFloat(line2.slice(17,25)) * rad;
    const ecc  = parseFloat('0.' + line2.slice(26,33).trim());
    const argp = parseFloat(line2.slice(34,42)) * rad;
    const mm   = parseFloat(line2.slice(52,63));
    const ma0  = parseFloat(line2.slice(43,51)) * rad;
    const epoch = line1.slice(18,32);
    const ey = parseInt(epoch.slice(0,2));
    const year = ey < 57 ? 2000 + ey : 1900 + ey;
    const doy  = parseFloat(epoch.slice(2));
    const epochMs = Date.UTC(year, 0, 1) + (doy - 1) * 86400000;
    const dt_s = (now - epochMs) / 1000;

    const n  = mm * 2 * Math.PI / 86400;
    const M  = (ma0 + n * dt_s) % (2 * Math.PI);
    let E = M;
    for (let i = 0; i < 15; i++) E = M + ecc * Math.sin(E);
    const nu = 2 * Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));

    const mu = 398600.4418;
    const a  = Math.pow(mu / (n*n), 1/3);
    const r  = a * (1 - ecc * Math.cos(E));
    const xo = r * Math.cos(nu), yo = r * Math.sin(nu);

    const cr=Math.cos(raan), sr=Math.sin(raan);
    const ci=Math.cos(incl), si=Math.sin(incl);
    const ca=Math.cos(argp), sa=Math.sin(argp);

    const x = (cr*ca-sr*sa*ci)*xo + (-cr*sa-sr*ca*ci)*yo;
    const y = (sr*ca+cr*sa*ci)*xo + (-sr*sa+cr*ca*ci)*yo;
    const z = (sa*si)*xo + (ca*si)*yo;

    const JD = now/86400000 + 2440587.5;
    const T  = (JD - 2451545.0) / 36525.0;
    const gmst = (280.46061837 + 360.98564736629*(JD-2451545.0) + T*T*(0.000387933-T/38710000)) % 360;
    const gr = gmst * rad;

    const xe = x*Math.cos(gr) + y*Math.sin(gr);
    const ye = -x*Math.sin(gr) + y*Math.cos(gr);
    const ze = z;

    const latr=lat*rad, lonr=lon*rad, Re=6378.137;
    const x0=Re*Math.cos(latr)*Math.cos(lonr);
    const y0=Re*Math.cos(latr)*Math.sin(lonr);
    const z0=Re*Math.sin(latr);

    const dx=xe-x0, dy=ye-y0, dz=ze-z0;
    const S  = Math.sin(latr)*Math.cos(lonr)*dx + Math.sin(latr)*Math.sin(lonr)*dy - Math.cos(latr)*dz;
    const E2 = -Math.sin(lonr)*dx + Math.cos(lonr)*dy;
    const Z  = Math.cos(latr)*Math.cos(lonr)*dx + Math.cos(latr)*Math.sin(lonr)*dy + Math.sin(latr)*dz;
    const rng = Math.sqrt(S*S+E2*E2+Z*Z);
    const el = Math.asin(Z/rng)/rad;
    const az = (Math.atan2(-E2,S)/rad+360)%360;
    return { el, az, range: rng };
  } catch(e) { return null; }
}

// ── Auto-aggiornamento TLE da Celestrak con cache localStorage ────────────
const TLE_CACHE_KEY = 'gnss_tle_cache';
const TLE_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 ore

const CELESTRAK_URLS = {
  GPS:     'https://ilario-lab.github.io/topweather/tle/gps.json',
  GLONASS: 'https://ilario-lab.github.io/topweather/tle/glonass.json',
  GALILEO: 'https://ilario-lab.github.io/topweather/tle/galileo.json',
  BEIDOU:  'https://ilario-lab.github.io/topweather/tle/beidou.json',
};

function parseCelestrakJSON(jsonData) {
  // La Netlify Function restituisce già array di {name, line1, line2}
  return jsonData.filter(o =>
    o.line1 && o.line2 &&
    o.line1.startsWith('1 ') &&
    o.line2.startsWith('2 ')
  );
}

async function fetchFreshTLE(statusCallback) {
  // 1. Cache in memoria di sessione (no localStorage che è bloccato nelle TWA)
  if (window._tleCache && window._tleCacheTs && (Date.now() - window._tleCacheTs < TLE_CACHE_TTL)) {
    statusCallback('cache');
    return window._tleCache;
  }

  // 2. Scarica dalla Netlify Function (proxy senza CORS)
  statusCallback('fetch');
  const result = {};
  let anyOk = false;
  for (const [id, url] of Object.entries(CELESTRAK_URLS)) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(15000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      const sats = parseCelestrakJSON(json);
      if (sats.length > 0) { result[id] = sats; anyOk = true; }
    } catch(e) {
      console.warn('TLE fetch fallito per', id, e.message);
      result[id] = null;
    }
  }

  if (anyOk) {
    for (const id of Object.keys(EMBEDDED_TLE)) {
      if (!result[id] || result[id].length === 0) result[id] = EMBEDDED_TLE[id];
    }
    window._tleCache = result;
    window._tleCacheTs = Date.now();
    statusCallback('live');
    return result;
  }

  // 3. Fallback: dati embedded
  statusCallback('embedded');
  return EMBEDDED_TLE;
}

let tleSource = 'embedded'; // 'embedded' | 'cache' | 'live'
let activeTLE = EMBEDDED_TLE;

async function initGpsSat() {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    🛰 Aggiorno dati orbitali...</div>`;

  // Scarica TLE (con cache e fallback)
  activeTLE = await fetchFreshTLE(s => { tleSource = s; });

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    📍 Richiedo posizione GPS...</div>`;

  if (!navigator.geolocation) {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center">GPS non supportato dal browser.</div>`;
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    gpsSatPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
    computeAndRender(gpsSatPos);

    clearInterval(gpsSatInterval);
    gpsSatInterval = setInterval(() => {
      if (gpsSatPos) computeAndRender(gpsSatPos);
    }, 30000);

  }, (err) => {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">
      ⚠️ Posizione non disponibile: ${err.message}</div>`;
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
}

function computeAndRender(pos) {
  const now = Date.now();
  const allSats = [];
  const constellationResults = [];

  for (const c of GNSS_CONSTELLATIONS) {
    const tles = activeTLE[c.id] || EMBEDDED_TLE[c.id] || [];
    const visible = [];
    for (const sat of tles) {
      const r = satElevation(sat.line1, sat.line2, pos.lat, pos.lon, now);
      if (r && r.el >= 0) visible.push({ ...sat, el: r.el, az: r.az, range: r.range });
    }
    visible.sort((a,b) => b.el - a.el);
    constellationResults.push({ ...c, total: tles.length, visible });
    allSats.push(...visible.map(s => ({...s, constellation:c.id, color:c.color})));
  }

  renderGpsSat(constellationResults, allSats, pos, now);
}

function renderGpsSat(constellations, allSats, pos, now) {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  const totalVis = allSats.length;
  const polarSize = 200;
  const cx = polarSize/2, cy = polarSize/2, cr = polarSize/2 - 10;

  const satDots = allSats.map(s => {
    const rDot = cr * (1 - s.el/90);
    const azR  = (s.az - 90) * Math.PI/180;
    const sx = cx + rDot * Math.cos(azR);
    const sy = cy + rDot * Math.sin(azR);
    return `<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="5" fill="${s.color}" opacity="0.9"
      stroke="rgba(255,255,255,0.3)" stroke-width="1">
      <title>${s.name}\nEl: ${s.el.toFixed(0)}° Az: ${s.az.toFixed(0)}°</title>
    </circle>
    <text x="${(sx+6).toFixed(1)}" y="${(sy+4).toFixed(1)}" font-size="7" fill="${s.color}" opacity="0.8">${s.el.toFixed(0)}°</text>`;
  }).join('');

  const polarSVG = `
    <svg width="${polarSize}" height="${polarSize}" viewBox="0 0 ${polarSize} ${polarSize}" style="display:block;margin:0 auto">
      <circle cx="${cx}" cy="${cy}" r="${cr}"     fill="rgba(0,0,0,0.3)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="${cr*2/3}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <circle cx="${cx}" cy="${cy}" r="${cr/3}"   fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
      <line x1="${cx}" y1="${cy-cr}" x2="${cx}" y2="${cy+cr}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

      <text x="${cx-3}" y="${cy-cr-3}" font-size="9" fill="rgba(255,255,255,0.35)">N</text>
      <text x="${cx-3}" y="${cy+cr+11}" font-size="9" fill="rgba(255,255,255,0.35)">S</text>
      <text x="${cx+cr+3}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">E</text>
      <text x="${cx-cr-11}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">W</text>
      <text x="${cx-4}" y="${cy+cr*2/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">30°</text>
      <text x="${cx-4}" y="${cy+cr/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">60°</text>
      ${satDots}
    </svg>`;

  const constRows = constellations.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;font-weight:600;color:var(--text)">${c.name}</div>
      <div style="font-size:11px;color:var(--muted)">${c.total} sats</div>
      <div style="font-size:13px;font-weight:700;color:${c.color};min-width:28px;text-align:right">${c.visible.length} ↑</div>
    </div>`).join('');

  const top8 = allSats.slice(0,8).map(s => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0">
      <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
      <div style="font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
      <div style="font-size:11px;font-weight:600;color:var(--text)">${s.el.toFixed(1)}°</div>
      <div style="font-size:10px;color:var(--muted)">${s.az.toFixed(0)}°</div>
    </div>`).join('');

  const qualityColor = pos.accuracy < 5 ? '#4ade80' : pos.accuracy < 20 ? '#f59e0b' : '#f87171';
  const qualityLabel = pos.accuracy < 5 ? 'Eccellente' : pos.accuracy < 20 ? 'Buono' : pos.accuracy < 50 ? 'Discreto' : 'Scarso';
  const nowDate = new Date(now);

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:10px;
        padding:6px 12px;font-size:20px;font-weight:700;color:#4ade80">${totalVis}</div>

      </div>
      <button onclick="window._tleCache=null;window._tleCacheTs=null;initGpsSat()" style="padding:4px 10px;border-radius:8px;border:1px solid var(--glass-border);
        background:var(--glass);color:var(--muted);font-size:10px;cursor:pointer">↺ Aggiorna</button>

}

function renderLunaPanel(main, sunData, today) {
  const moon = main.moon;

function renderPianetiPanel(today, lat, lon) {
  // Calcolo approssimativo visibilità pianeti (algoritmo Jean Meeus semplificato)
  const JD = toJulian(today);
  const T = (JD - 2451545.0) / 36525.0;

  const planets = [
    { name: 'Mercurio', icon: '☿', ...mercuryVis(T, today, lat) },
    { name: 'Venere',   icon: '♀', ...venusVis(T, today, lat) },
    { name: 'Marte',    icon: '♂', ...marsVis(T, today, lat) },
    { name: 'Giove',    icon: '♃', ...jupiterVis(T, today, lat) },
    { name: 'Saturno',  icon: '♄', ...saturnVis(T, today, lat) },
    { name: 'Urano',    icon: '⛢', ...uranusVis(T, today, lat) },
  ];

  const cards = planets.map(p => {
    const visCls = p.visible === 'sera' ? 'p-vis' : p.visible === 'mattina' ? 'p-dawn' : 'p-inv';
    const visLbl = p.visible === 'sera' ? '🌆 Visibile sera' : p.visible === 'mattina' ? '🌄 Visibile mattina' : '● Non visibile';
    return `<div class="planet-card">
      <div class="planet-icon">${p.icon}</div>
      <div class="planet-name">${p.name}</div>
      <div class="planet-detail">${p.info}</div>
      <div class="planet-visible ${visCls}">${visLbl}</div>
    </div>`;
  }).join('');

  return `
    <div class="astro-card" style="margin-bottom:10px">
      <div class="astro-card-title">🪐 Pianeti del Sistema Solare</div>
      <div style="font-size:11px;color:var(--muted);line-height:1.5">

    <div class="last-updated" style="padding:4px 0 12px">Calcolo orbitale approssimativo · Jean Meeus cap. 33–36</div>
  `;
}

// ── ISS Live Position — wheretheiss.at (CORS aperto) ─────────
let issTimer = null;
async function fetchISSPosition(userLat, userLon) {
  const elStatus = document.getElementById('iss-status');
  try {
    const r = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();

    const issLat  = parseFloat(d.latitude);
    const issLon  = parseFloat(d.longitude);
    const issAlt  = parseFloat(d.altitude).toFixed(0);
    const issVel  = Math.round(parseFloat(d.velocity)).toLocaleString('it-IT');
    const issVis  = d.visibility === 'daylight' ? '☀️ Giorno' : '🌙 Notte';

    const set = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
    set('iss-lat', issLat.toFixed(2) + '°');
    set('iss-lon', issLon.toFixed(2) + '°');
    set('iss-alt', issAlt);
    set('iss-vel', issVel);
    set('iss-vis', issVis);

    if (userLat && userLon) {
      const dist = Math.round(haversineKm(userLat, userLon, issLat, issLon));
      set('iss-dist', dist.toLocaleString('it-IT'));
    }

    if (elStatus) {
      elStatus.style.background = 'rgba(91,196,187,0.07)';
      elStatus.style.borderColor = 'rgba(91,196,187,0.2)';
      elStatus.style.color = 'var(--teal)';
      elStatus.textContent = `● Live — ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    }
  } catch(e) {
    if (elStatus) {
      elStatus.style.color = 'var(--danger)';
      elStatus.textContent = '⚠️ API non raggiungibile — riprovo...';
    }
  }
  // Rischedula solo se il pannello ISS è ancora attivo
  if (document.getElementById('asub-iss')?.classList.contains('active')) {
    issTimer = setTimeout(() => fetchISSPosition(userLat, userLon), 5000);
  }
}

// ── Pannello Voyager ─────────────────────────────────────────
// Dati di riferimento NASA (pubblicati + estrapolazione lineare)
// Voyager 1: vel ~17.043 km/s ≈ 3.595 AU/anno (eliocentric)
// Voyager 2: vel ~15.341 km/s ≈ 3.232 AU/anno
// Distanze di riferimento confermate da NASA/JPL al 1 Gen 2024:
//   V1 ≈ 162.43 AU,  V2 ≈ 135.73 AU  (fonte: NASA Eyes on Solar System)
const V1_REF  = { date: new Date('2024-01-01T00:00:00Z'), au: 162.43, velKms: 17.043, velAuYear: 3.595 };
const V2_REF  = { date: new Date('2024-01-01T00:00:00Z'), au: 135.73, velKms: 15.341, velAuYear: 3.232 };
const AU_KM   = 149597870.7; // km per 1 AU
const LIGHT_S = 299792.458;  // km/s

function voyagerNow(ref) {
  const now = Date.now();
  const yearsElapsed = (now - ref.date.getTime()) / (365.25 * 24 * 3600 * 1000);
  const au = ref.au + ref.velAuYear * yearsElapsed;
  const km = au * AU_KM;
  const lightSec = km / LIGHT_S;
  const lightMin = lightSec / 60;
  const lightH   = lightMin / 60;
  return { au: au.toFixed(2), km: Math.round(km).toLocaleString('it-IT'), lightH: lightH.toFixed(1), lightMin: lightMin.toFixed(0), velKms: ref.velKms };
}

    const elapsed = (Date.now() - sessionStart) / 1000;
    const d1 = V1_REF.velKms * elapsed;
    const d2 = V2_REF.velKms * elapsed;

    const t1   = document.getElementById('v1-ticker');
    const t2   = document.getElementById('v2-ticker');
    const km1  = document.getElementById('v1-km-live');
    const km2  = document.getElementById('v2-km-live');

    if (t1) t1.textContent  = d1.toLocaleString('it-IT', {maximumFractionDigits:1});
    if (t2) t2.textContent  = d2.toLocaleString('it-IT', {maximumFractionDigits:1});
    if (km1) km1.textContent = Math.round(v1KmNow + d1).toLocaleString('it-IT') + ' km';
    if (km2) km2.textContent = Math.round(v2KmNow + d2).toLocaleString('it-IT') + ' km';

    if (elap) {
      const s = Math.floor(elapsed);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      elap.textContent = h > 0
        ? `da ${h}h ${m%60}m ${s%60}s`
        : m > 0 ? `da ${m}m ${s%60}s` : `da ${s}s`;
    }

    // Ferma se il pannello non è più visibile
    if (!document.getElementById('asub-voyager')?.classList.contains('active')) {
      clearInterval(voyagerTickerInterval);
      voyagerTickerInterval = null;
    }
  }, 1000);
}


function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// Algoritmo sunrise/sunset NOAA (gml.noaa.gov/grad/solcalc)
// Restituisce orari in UTC come oggetti Date
function sunTimes(lat, lon, date) {
  const rad = Math.PI / 180;

  // Julian Day Number (mezzogiorno UTC del giorno dato)
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const A = Math.floor((14-m)/12);
  const Y = y + 4800 - A;
  const M2 = m + 12*A - 3;
  const JD = d + Math.floor((153*M2+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045;

  // Secolo giuliano da J2000
  const JC = (JD - 2451545.0) / 36525.0;

  // Longitudine media del sole
  const L0 = (280.46646 + JC*(36000.76983 + JC*0.0003032)) % 360;

  // Anomalia media
  const Mdeg = (357.52911 + JC*(35999.05029 - 0.0001537*JC)) % 360;
  const Mr = Mdeg * rad;

  // Centro dell'equazione
  const C = (1.914602 - JC*(0.004817 + 0.000014*JC))*Math.sin(Mr)
           + (0.019993 - 0.000101*JC)*Math.sin(2*Mr)
           + 0.000289*Math.sin(3*Mr);

  // Longitudine vera e apparente
  const SunLon = L0 + C;
  const omega  = 125.04 - 1934.136*JC;
  const AppLon = SunLon - 0.00569 - 0.00478*Math.sin(omega*rad);

  // Obliquità corretta
  const MeanObl = 23 + (26 + (21.448 - JC*(46.815 + JC*(0.00059 - JC*0.001813)))/60)/60;
  const OblCorr = MeanObl + 0.00256*Math.cos(omega*rad);

  // Declinazione solare
  const sinDecl = Math.sin(OblCorr*rad) * Math.sin(AppLon*rad);
  const Decl = Math.asin(sinDecl) / rad;

  // Equazione del tempo (minuti)
  const y2 = Math.tan(OblCorr*rad/2)**2;
  const ecc = 0.016708634;
  const EqT = 4/rad * (y2*Math.sin(2*L0*rad) - 2*ecc*Math.sin(Mr)
              + 4*ecc*y2*Math.sin(Mr)*Math.cos(2*L0*rad)
              - 0.5*y2*y2*Math.sin(4*L0*rad)
              - 1.25*ecc*ecc*Math.sin(2*Mr));

  // Angolo orario all'alba/tramonto
  const cosHA = (Math.sin(-0.8333*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
               / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  if (Math.abs(cosHA) > 1) return null;
  const HA = Math.acos(cosHA) / rad; // gradi

  // Mezzogiorno solare in minuti da mezzanotte UTC
  const noonMin  = 720 - 4*lon - EqT;
  const riseMin  = noonMin - HA*4;
  const setMin   = noonMin + HA*4;

  // Crepuscolo civile (~34 min prima/dopo per -6° sotto orizzonte, usiamo -50' per astronomico civile approx)
  const cosHAdawn = (Math.sin(-6*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
                   / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  const HAdawn = Math.abs(cosHAdawn) <= 1 ? Math.acos(Math.max(-1,Math.min(1,cosHAdawn)))/rad : HA+20;
  const dawnMin = noonMin - HAdawn*4;
  const duskMin = noonMin + HAdawn*4;

  // Converti minuti UTC → Date UTC
  const minsToDate = (mins) => {
    const base = new Date(Date.UTC(y, m-1, d));
    return new Date(base.getTime() + mins*60000);
  };

  return {
    rise:    minsToDate(riseMin),
    set:     minsToDate(setMin),
    transit: minsToDate(noonMin),
    dawn:    minsToDate(dawnMin),
    dusk:    minsToDate(duskMin),
    dayLen:  (setMin - riseMin) / 60,
    decl:    Decl.toFixed(1),
    elevation: (90 - Math.abs(lat - Decl)).toFixed(1),
  };
}

// Fase lunare
function moonPhase(date) {
  const known = new Date(2000, 0, 6, 18, 14); // new moon 6 Jan 2000
  const diff = (date - known) / (1000*60*60*24);
  const cycle = 29.53058867;
  const phase = ((diff % cycle) + cycle) % cycle;
  const pct = phase / cycle;
  const icons = ['🌑','🌒','🌒','🌓','🌔','🌔','🌕','🌖','🌖','🌗','🌘','🌘','🌑'];
  const names = ['Luna Nuova','Crescente','Crescente','Primo Quarto','Gibbosa Crescente','Gibbosa Crescente','Luna Piena','Gibbosa Calante','Gibbosa Calante','Ultimo Quarto','Calante','Calante','Luna Nuova'];
  const idx = Math.round(pct * 12) % 13;
  return { phase, pct, icon: icons[idx], name: names[idx] };
}

// Stagione astronomica
function season(date, lat) {
  const m = date.getMonth();
  const isNorth = lat >= 0;
  if (isNorth) {
    if (m >= 2 && m <= 4) return ['🌸 Primavera', '21 Mar'];
    if (m >= 5 && m <= 7) return ['☀️ Estate',    '21 Giu'];
    if (m >= 8 && m <= 10) return ['🍂 Autunno',  '22 Set'];
    return ['❄️ Inverno', '21 Dic'];
  } else {
    if (m >= 2 && m <= 4) return ['🍂 Autunno',   '21 Mar'];
    if (m >= 5 && m <= 7) return ['❄️ Inverno',   '21 Giu'];
    if (m >= 8 && m <= 10) return ['🌸 Primavera','22 Set'];
    return ['☀️ Estate', '21 Dic'];
  }
}

function fmt(date) {
  if (!date) return 'N/D';
  return date.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Rome'});
}
function fmtDur(h) {
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  return `${hh}h ${String(mm).padStart(2,'0')}m`;
}

  ];

  if (photoEl) photoEl.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
      ${photos.slice(0,6).map(p => `

      🌌 Immagini NASA/ESA/CSA/STScI — Tap per aprire Webb Telescope Gallery
    </div>
    <div style="text-align:center;padding-bottom:4px;display:flex;gap:8px;justify-content:center">
      <a href="https://webbtelescope.org/images" target="_blank"
        style="font-size:11px;color:#7eb8e8;text-decoration:none;
        background:rgba(126,184,232,0.1);border:1px solid rgba(126,184,232,0.25);
        border-radius:50px;padding:6px 14px;display:inline-block">🔭 Webb Gallery →</a>
      <a href="https://spacetelescopelive.org/webb" target="_blank"
        style="font-size:11px;color:#a082ff;text-decoration:none;

        border-radius:50px;padding:6px 14px;display:inline-block">📡 Osservazioni Live →</a>

  `;

  if (updEl) updEl.textContent = `Immagini: NASA Image Library & STScI · Temperature: NASA GSFC · ${new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
}


let _deferredInstallPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredInstallPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});

async function installPWA() {
  if (!_deferredInstallPrompt) {
    alert('Per installare:\n• Android Chrome → Menu ⋮ → "Installa app"\n• iOS Safari → Condividi 🔗 → "Aggiungi a schermata Home"');
    return;
  }
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.textContent = '⏳';
  _deferredInstallPrompt.prompt();
  const { outcome } = await _deferredInstallPrompt.userChoice;
  if (outcome === 'accepted') {
    if (btn) btn.style.display = 'none';
    _deferredInstallPrompt = null;
  } else {
    if (btn) btn.textContent = '⬇️';
  }
}

window.addEventListener('appinstalled', () => {
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  _deferredInstallPrompt = null;
});

let effInitialized = false;

function initEffemeridi() {
  if (effInitialized) return;
  effInitialized = true;
  renderEffemeridi();
}

function renderEffemeridi() {
  const el = document.getElementById('eff-content');
  if (!el) return;

  const lat  = currentLat || 38.11;
  const lon  = currentLon || 15.66;
  const today = new Date();

  const sunData = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    d.setHours(12, 0, 0, 0);
    sunData.push({ d, sun: sunTimes(lat, lon, d), moon: moonPhase(d) });
  }
  const { sun: s, moon } = sunData[0];
  const [stagione, solstizio] = season(today, lat);

  // Barra giorno
  let timeBar = '';
  if (s) {
    const midnight = new Date(today); midnight.setHours(0,0,0,0);
    const ms = 86400000;
    const rP  = ((s.dawn  - midnight) / ms * 100).toFixed(1);
    const sP  = ((s.dusk  - midnight) / ms * 100).toFixed(1);
    const w   = (sP - rP).toFixed(1);
    const now = ((today   - midnight) / ms * 100).toFixed(1);
    timeBar = `
      <div class="astro-timeline" style="margin:10px 0 4px">
        <div class="astro-daybar" style="left:${rP}%;width:${w}%"></div>
        <div class="astro-now-tick" style="left:${now}%"></div>
      </div>
      <div class="astro-tl-label"><span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>24:00</span></div>`;
  }

  // Carte 6 giorni successivi
  const dayCards = sunData.slice(1).map(({ d, sun, moon: m }) => {
    if (!sun) return '';
    const dn = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'][d.getDay()];
    return `<div class="astro-day-card">
      <div style="font-size:11px;font-weight:700;color:var(--text)">${dn} ${d.getDate()}</div>
      <div style="font-size:10px;color:var(--muted)">🌅 ${fmt(sun.rise)}</div>
      <div style="font-size:10px;color:var(--muted)">🌇 ${fmt(sun.set)}</div>
      <div style="font-size:10px;color:var(--muted)">${m.icon} ${fmtDur(sun.dayLen)}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <!-- Oggi: Sole -->
    <div class="astro-card">
      <div class="astro-card-title">☀️ Sole — ${today.toLocaleDateString('it-IT',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}</div>
      ${timeBar}
      ${s ? `
        <div style="height:10px"></div>
        <div class="astro-row">
          <div class="astro-icon">🌅</div>
          <div><div class="astro-label">Alba</div><div class="astro-value">${fmt(s.rise)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Crepuscolo civile</div><div class="astro-sub">${fmt(s.dawn)}</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🌞</div>
          <div><div class="astro-label">Mezzogiorno solare</div><div class="astro-value">${fmt(s.transit)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Elevazione max</div><div class="astro-sub">${s.elevation}°</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">🌇</div>
          <div><div class="astro-label">Tramonto</div><div class="astro-value">${fmt(s.set)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Crepuscolo serale</div><div class="astro-sub">${fmt(s.dusk)}</div></div>
        </div>
        <div class="astro-row">
          <div class="astro-icon">⏱</div>
          <div><div class="astro-label">Durata del giorno</div><div class="astro-value">${fmtDur(s.dayLen)}</div></div>
          <div style="margin-left:auto;text-align:right"><div class="astro-label">Declinazione</div><div class="astro-sub">${s.decl}°</div></div>
        </div>
      ` : '<div style="color:var(--muted);font-size:12px">Dati non disponibili.</div>'}
    </div>

    <!-- Oggi: Luna -->
    <div class="astro-card">
      <div class="astro-card-title">🌙 Luna di oggi</div>
      <div style="display:flex;align-items:center;gap:16px">
        <div style="font-size:54px;line-height:1;filter:drop-shadow(0 0 14px rgba(200,200,255,0.3))">${moon.icon}</div>
        <div style="flex:1">
          <div style="font-size:16px;font-weight:700;color:var(--text)">${moon.name}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">Giorno ${moon.phase.toFixed(1)} di 29.5</div>
          <div class="moon-bar-wrap" style="margin-top:8px">
            <div class="moon-bar" style="width:${Math.round((moon.pct<0.5?moon.pct*2:(1-moon.pct)*2)*100)}%"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">Illuminazione ~${Math.round((moon.pct<0.5?moon.pct*2:(1-moon.pct)*2)*100)}%</div>
        </div>
      </div>
    </div>

    <!-- Stagione -->
    <div class="astro-card">
      <div class="astro-card-title">🗓 Stagione Astronomica</div>
      <div class="astro-row">
        <div style="font-size:30px">${stagione.split(' ')[0]}</div>
        <div>
          <div class="astro-value">${stagione.split(' ').slice(1).join(' ')}</div>
          <div class="astro-sub">Inizio astronomico: ${solstizio}</div>
        </div>
      </div>
    </div>

    <!-- 6 giorni -->
    <div style="padding:0 16px 8px;font-size:9.5px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#ffc850;opacity:0.85">Prossimi 6 giorni</div>
    <div class="astro-7day">${dayCards}</div>
    <div class="last-updated" style="padding:4px 0 16px">Calcolo locale · Algoritmo NOAA / Jean Meeus · ${currentCity}</div>
  `;
}
