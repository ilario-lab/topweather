<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Top Weather">
<meta name="theme-color" content="#080e1a">
<title>Top Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #080e1a;
    --surface: #0f1826;
    --surface2: #141f30;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #c8a96e;
    --accent2: #7eb8e8;
    --accent3: #6ecba8;
    --text: #e8ecf4;
    --muted: rgba(232,236,244,0.45);
    --muted2: rgba(232,236,244,0.25);
    --danger: #e07070;
    --teal: #5bc4bb;
    --gold: #c8a96e;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% -5%, rgba(30,60,110,0.55) 0%, transparent 65%),
      radial-gradient(ellipse 70% 50% at 90% 90%, rgba(10,30,60,0.4) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 10% 70%, rgba(15,40,80,0.3) 0%, transparent 55%),
      linear-gradient(180deg, #080e1a 0%, #060b14 100%);
    pointer-events: none;
  }

  /* Subtle grain texture */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.6;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 430px; margin: 0 auto;
    padding: 0 0 48px;
    min-height: 100vh;
  }

  /* ── SEARCH BAR ── */
  .search-bar {
    padding: 56px 16px 0;
    display: flex; gap: 8px;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 44px 13px 18px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    letter-spacing: 0.2px;
    transition: border-color 0.25s, background 0.25s;
  }
  .search-input::placeholder { color: var(--muted2); }
  .search-input:focus {
    border-color: rgba(200,169,110,0.35);
    background: var(--surface2);
  }
  .search-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 0; opacity: 0.55;
    transition: opacity 0.2s;
  }
  .search-btn:hover { opacity: 0.9; }
  .geo-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 0 16px;
    color: var(--text);
    font-size: 17px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .geo-btn:active {
    background: var(--surface2);
    border-color: rgba(91,196,187,0.35);
  }

  .suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    overflow: hidden; z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  .suggestion-item {
    padding: 12px 18px; cursor: pointer;
    font-size: 13px; font-weight: 400;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    letter-spacing: 0.1px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: rgba(255,255,255,0.05); }
  .suggestion-country {
    color: var(--muted); font-size: 11px; margin-left: 6px;
  }

  /* ── HEADER ── */
  .header {
    padding: 22px 20px 6px;
    text-align: center;
  }
  .city-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
    opacity: 0.85;
  }
  .city-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
    color: var(--text);
  }
  .city-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  /* ── NAV TABS ── */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 16px 16px 0;
  }
  .tab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 11px 4px 9px;
    font-size: 10.5px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    letter-spacing: 0.2px;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .tab::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .tab-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
  .tab:active { transform: scale(0.95); opacity: 0.9; }

  .tab.active {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.3);
    color: var(--accent);
  }
  .tab.active .tab-icon { transform: scale(1.1); }
  .tab.active::after {
    content: '';
    position: absolute; bottom: 0; left: 30%; right: 30%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 2px 2px 0 0;
  }

  .tab[data-name="radar"].active  { background: rgba(91,196,187,0.1); border-color: rgba(91,196,187,0.3); color: var(--teal); }
  .tab[data-name="radar"].active::after { background: linear-gradient(90deg, transparent, var(--teal), transparent); }
  .tab[data-name="ventusky"].active { background: rgba(126,184,232,0.1); border-color: rgba(126,184,232,0.3); color: var(--accent2); }
  .tab[data-name="ventusky"].active::after { background: linear-gradient(90deg, transparent, var(--accent2), transparent); }
  .tab[data-name="terremoti"].active { background: rgba(224,112,112,0.1); border-color: rgba(224,112,112,0.3); color: var(--danger); }
  .tab[data-name="terremoti"].active::after { background: linear-gradient(90deg, transparent, var(--danger), transparent); }
  .tab[data-name="mare"].active { background: rgba(110,203,168,0.1); border-color: rgba(110,203,168,0.3); color: var(--accent3); }
  .tab[data-name="mare"].active::after { background: linear-gradient(90deg, transparent, var(--accent3), transparent); }
  .tab[data-name="pollini"].active { background: rgba(134,224,172,0.1); border-color: rgba(134,224,172,0.3); color: #86e0ac; }
  .tab[data-name="pollini"].active::after { background: linear-gradient(90deg, transparent, #86e0ac, transparent); }
  .tab[data-name="gfs"].active { background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); color: #fbbf24; }
  .tab[data-name="gfs"].active::after { background: linear-gradient(90deg, transparent, #fbbf24, transparent); }
  .tab[data-name="metar"].active { background: rgba(99,202,255,0.1); border-color: rgba(99,202,255,0.3); color: #63caff; }
  .tab[data-name="metar"].active::after { background: linear-gradient(90deg, transparent, #63caff, transparent); }
  .tab[data-name="effemeridi"].active { background: rgba(255,200,80,0.1); border-color: rgba(255,200,80,0.3); color: #ffc850; }
  .tab[data-name="effemeridi"].active::after { background: linear-gradient(90deg, transparent, #ffc850, transparent); }

  /* ── MAIN CARD ── */
  .main-card {
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px 24px 24px;
    position: relative; overflow: hidden;
  }
  .main-card::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .main-card::after {
    content: '';
    position: absolute; bottom: -40px; left: -40px;
    width: 150px; height: 150px;
    background: radial-gradient(circle, rgba(91,196,187,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .current-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .temp-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 86px;
    font-weight: 400;
    line-height: 1;
    letter-spacing: -5px;
    color: var(--text);
  }
  .temp-main sup {
    font-size: 28px;
    letter-spacing: 0;
    position: relative; top: 14px;
    opacity: 0.75;
  }
  .feels-like {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.2px;
  }
  .weather-icon-main {
    font-size: 70px;
    line-height: 1;
    filter: drop-shadow(0 0 24px rgba(200,169,110,0.3));
    animation: float 5s ease-in-out infinite;
  }
  @keyframes float {
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-9px)}
  }

  .condition {
    font-size: 16px;
    font-weight: 500;
    margin-top: 16px;
    letter-spacing: 0.1px;
    color: var(--text);
  }
  .date-time {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.2px;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
    margin: 20px 0;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3,1fr);
  }
  .stat-item { text-align: center; position: relative; }
  .stat-item:not(:last-child)::after {
    content: '';
    position: absolute; right: 0; top: 15%; height: 70%;
    width: 1px;
    background: var(--border);
  }
  .stat-icon { font-size: 16px; margin-bottom: 5px; }
  .stat-value { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; }
  .stat-label {
    font-size: 9.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 3px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 0 20px;
    margin: 28px 0 12px;
    opacity: 0.8;
  }

  /* ── HOURLY ── */
  .hourly-scroll {
    display: flex; gap: 8px;
    padding: 4px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card {
    flex: 0 0 68px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 6px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .hour-card.active {
    background: rgba(200,169,110,0.1);
    border-color: rgba(200,169,110,0.3);
  }
  .hour-time {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 7px;
    letter-spacing: 0.2px;
  }
  .hour-card.active .hour-time { color: var(--accent); }
  .hour-icon { font-size: 20px; margin-bottom: 7px; }
  .hour-temp { font-size: 14px; font-weight: 500; }

  /* ── DAILY ── */
  .daily-list {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .day-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s;
  }
  .day-name { font-size: 13px; font-weight: 500; width: 72px; }
  .day-icon { font-size: 21px; }
  .day-desc {
    font-size: 11px; color: var(--muted);
    flex: 1; text-align: center;
    padding: 0 6px;
  }
  .day-temps { display: flex; gap: 8px; align-items: center; }
  .day-high { font-size: 14px; font-weight: 500; }
  .day-low { font-size: 12px; color: var(--muted); }

  /* ── SUN ── */
  .sun-card {
    margin: 0 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    display: flex; justify-content: space-around; align-items: center;
  }
  .sun-item { text-align: center; }
  .sun-icon { font-size: 24px; margin-bottom: 5px; }
  .sun-time { font-size: 18px; font-weight: 500; letter-spacing: -0.5px; }
  .sun-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 3px;
  }
  .sun-divider { width: 1px; height: 44px; background: var(--border); }

  /* ── SEA ── */
  .sea-grid {
    padding: 0 16px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .sea-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 14px;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .sea-item::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(91,196,187,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .sea-item-icon { font-size: 26px; margin-bottom: 8px; }
  .sea-item-value { font-size: 22px; font-weight: 500; color: var(--teal); letter-spacing: -0.5px; }
  .sea-item-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-top: 4px;
  }
  .sea-item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .wave-bar {
    margin: 10px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
  }
  .wave-bar-title { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
  .wave-scale { display: flex; align-items: flex-end; gap: 4px; height: 44px; }
  .wave-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .wave-bar-fill {
    width: 100%; border-radius: 4px 4px 0 0;
    background: linear-gradient(180deg, var(--teal), rgba(91,196,187,0.3));
    min-height: 4px;
  }
  .wave-bar-time { font-size: 9px; color: var(--muted); }

  /* ── POLLEN ── */
  .pollen-grid {
    padding: 0 16px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .pollen-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .pollen-icon { font-size: 24px; flex-shrink: 0; }
  .pollen-info { flex: 1; }
  .pollen-name { font-size: 13px; font-weight: 500; }
  .pollen-level { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pollen-bar-wrap {
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 99px; margin-top: 8px; overflow: hidden;
  }
  .pollen-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .pollen-badge {
    font-size: 10.5px; font-weight: 600;
    padding: 4px 10px; border-radius: 50px; white-space: nowrap;
  }
  .level-none   { color: var(--teal); background: rgba(91,196,187,0.12); }
  .level-low    { color: #a8e063; background: rgba(168,224,99,0.12); }
  .level-medium { color: var(--accent); background: rgba(200,169,110,0.12); }
  .level-high   { color: var(--danger); background: rgba(224,112,112,0.12); }
  .level-vhigh  { color: #ff3860; background: rgba(255,56,96,0.12); }

  /* ── LOADING / ERROR ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 300px; gap: 14px;
  }
  .loading-icon { font-size: 40px; animation: spin 2s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .loading-text { font-size: 12px; color: var(--muted); letter-spacing: 0.3px; }
  .error-msg {
    background: rgba(224,112,112,0.08);
    border: 1px solid rgba(224,112,112,0.2);
    border-radius: 16px; padding: 16px 18px; margin: 20px 16px;
    font-size: 13px; color: rgba(255,180,180,0.85);
    text-align: center; line-height: 1.6;
  }

  /* ── FOOTER ── */
  .last-updated {
    text-align: center; font-size: 10.5px;
    color: var(--muted2); margin-top: 24px; padding: 0 20px;
    letter-spacing: 0.2px;
  }
  .refresh-btn {
    display: block; margin: 10px auto 0;
    background: rgba(200,169,110,0.1);
    border: 1px solid rgba(200,169,110,0.25);
    color: var(--accent);
    font-family: 'Outfit', sans-serif;
    font-size: 12px; font-weight: 500;
    padding: 9px 22px; border-radius: 50px;
    cursor: pointer; letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .refresh-btn:active {
    background: rgba(200,169,110,0.18);
    transform: scale(0.97);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .geo-loading {
    font-size: 11px; color: var(--teal);
    text-align: center; padding: 6px 20px 0;
    min-height: 22px; letter-spacing: 0.2px;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(160deg, #0d1826 0%, #080e1a 60%, #050a12 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #splash.hide {
    opacity: 0; transform: scale(1.03); pointer-events: none;
  }
  .splash-icon { font-size: 68px; animation: splashFloat 2.2s ease-in-out infinite; }
  @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .splash-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text);
  }
  .splash-sub {
    font-size: 11px; color: var(--muted); letter-spacing: 2.5px;
    text-transform: uppercase;
  }
  .splash-dots { display: flex; gap: 7px; margin-top: 8px; }
  .splash-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); opacity: 0.3;
    animation: dotPulse 1.3s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: 0.22s; }
  .splash-dot:nth-child(3) { animation-delay: 0.44s; }
  @keyframes dotPulse {
    0%,100%{opacity:0.25;transform:scale(1)}
    50%{opacity:1;transform:scale(1.4)}
  }

  /* ── MODELLI PREVISIONALI sub-tabs ── */
  .model-subtabs {
    display: flex; gap: 6px;
    padding: 0 16px 12px;
    overflow-x: auto; scrollbar-width: none;
  }
  .model-subtabs::-webkit-scrollbar { display: none; }
  .model-subtab {
    flex: 0 0 auto; padding: 8px 14px; border-radius: 50px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.2px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; white-space: nowrap;
    transition: all 0.2s;
  }
  .model-subtab.active {
    background: rgba(251,191,36,0.12);
    border-color: rgba(251,191,36,0.35);
    color: #fbbf24;
  }
  .model-subpanel { display: none; }
  .model-subpanel.active { display: block; }

  /* ── TEMPORALI / FULMINAZIONI ── */
  .lightning-wrap {
    margin: 0 16px 10px;
    border-radius: 18px; overflow: hidden;
    border: 1px solid var(--border);

async function fetchKp() {
  try {
    // Fonte: GFZ Potsdam - dati Kp realtime (JSON)
    const r = await fetch('https://kp.gfz-potsdam.de/app/json/?start=now-24h&end=now&index=Kp');
    if (!r.ok) throw new Error();
    const j = await r.json();
    return j;
  } catch(e) {
    // fallback: NOAA planetary Kp 1-minute
    try {
      const r2 = await fetch('https://services.swpc.noaa.gov/json/planetary_k_index_1m.json');
      if (!r2.ok) throw new Error();
      const data = await r2.json();
      return { source: 'noaa', data };
    } catch(e2) {
      return null;
    }
  }
}

function kpClass(kp) {
  if (kp < 1)  return { cls: 'kp-quiet',    label: 'Silenzioso' };
  if (kp < 3)  return { cls: 'kp-quiet',    label: 'Quieto' };
  if (kp < 4)  return { cls: 'kp-unsettled', label: 'Instabile' };
  if (kp < 5)  return { cls: 'kp-active',   label: 'Attivo' };
  if (kp < 6)  return { cls: 'kp-minor',    label: 'Tempesta G1' };
  if (kp < 7)  return { cls: 'kp-moderate', label: 'Tempesta G2' };
  if (kp < 8)  return { cls: 'kp-strong',   label: 'Tempesta G3' };
  if (kp < 9)  return { cls: 'kp-strong',   label: 'Tempesta G4' };
  return { cls: 'kp-strong', label: 'Tempesta G5' };
}

function kpColor(kp) {
  if (kp < 3)  return '#5bc4bb';
  if (kp < 4)  return '#a8e063';
  if (kp < 5)  return '#c8a96e';
  if (kp < 6)  return '#f5a623';
  if (kp < 7)  return '#e07070';
  return '#ff3860';
}

function kpDescription(kp) {
  if (kp < 1)  return 'Campo geomagnetico praticamente assente. Condizioni ideali per comunicazioni radio.';
  if (kp < 3)  return 'Attività geomagnetica quieta. Nessun effetto sulle infrastrutture. Aurora visibile solo ad alte latitudini polari.';
  if (kp < 4)  return 'Campo geomagnetico instabile. Piccole fluttuazioni. Aurora possibile oltre 65° lat. Nord.';
  if (kp < 5)  return 'Attività geomagnetica attiva. Aurora visibile oltre 60° latitudine. Lieve effetto su sistemi GPS ad alta precisione.';
  if (kp < 6)  return 'Tempesta geomagnetica G1. Aurora visibile fin verso 60° lat. Fluttuazioni di tensione nelle reti elettriche ad alta latitudine.';
  if (kp < 7)  return 'Tempesta geomagnetica G2. Aurora fino a 55° lat. Possibili interruzioni radio HF ad alte latitudini.';
  if (kp < 8)  return 'Tempesta geomagnetica G3. Aurora fino a 50° lat. Problemi di navigazione satellitare, possibili blackout radio.';
  return 'Tempesta geomagnetica intensa G4-G5. Aurora visibile a latitudini medie. Rischio per infrastrutture critiche.';
}

async function renderKpCard() {
  const kpData = await fetchKp();
  let currentKp = null;
  let history = [];
  let updatedStr = '';

  if (kpData) {
    if (kpData.source === 'noaa' && kpData.data) {
      // NOAA 1-minute data — prendi ultimi 8 valori (ultime 8 ore circa ogni ora)
      const arr = kpData.data;
      const step = Math.max(1, Math.floor(arr.length / 8));
      for (let i = 0; i < 8; i++) {
        const idx = Math.min(arr.length - 1, i * step);
        history.push(arr[idx]?.kp_index ?? 0);
      }
      currentKp = arr[arr.length - 1]?.kp_index ?? null;
      const lastTime = arr[arr.length - 1]?.time_tag;
      if (lastTime) updatedStr = 'Aggiornato: ' + new Date(lastTime).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    } else if (Array.isArray(kpData)) {
      // GFZ format
      history = kpData.slice(-8).map(d => parseFloat(d.Kp) || 0);
      currentKp = history[history.length - 1] ?? null;
      updatedStr = 'Fonte: GFZ Potsdam · ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
    }
  }

  if (currentKp === null) {
    return `<div class="kp-card" style="margin-bottom:12px">
      <div class="kp-title" style="margin-bottom:8px">🌐 Indice Kp — Attività Geomagnetica</div>
      <div style="font-size:12px;color:var(--muted)">Dati non disponibili al momento. Riprova tra qualche istante.</div>
    </div>`;
  }

  const kpRound = Math.round(currentKp * 10) / 10;
  const { cls, label } = kpClass(kpRound);
  const maxKp = Math.max(...history, 1);

  const bars = history.map((v, i) => {
    const pct = Math.max(6, (v / 9) * 100);
    const col = kpColor(v);
    const h = i < history.length - 1 ? '' : ''; // last is current
    return `<div class="kp-bar-col">
      <div class="kp-bar-fill" style="height:${pct}%;background:${col};opacity:${i === history.length-1 ? 1 : 0.5}"></div>
      <div class="kp-bar-label">${v.toFixed(1)}</div>
    </div>`;
  }).join('');

  return `<div class="kp-card" style="margin-bottom:12px">
    <div class="kp-header">
      <div class="kp-title">🌐 Indice Kp — Attività Geomagnetica</div>
      <div class="kp-badge">
        <div class="kp-value" style="color:${kpColor(kpRound)}">${kpRound.toFixed(1)}</div>
        <div class="kp-label ${cls}">${label}</div>
      </div>
    </div>
    <div style="font-size:9.5px;color:var(--muted2);margin-bottom:8px;letter-spacing:0.3px">Ultime 8 rilevazioni</div>
    <div class="kp-bar-wrap">${bars}</div>
    <div style="display:flex;justify-content:space-between;font-size:8.5px;color:var(--muted2);padding:0 2px">
      <span>Kp 0 – Silenzioso</span><span>Kp 9 – G5 Estrema</span>
    </div>
    <div class="kp-desc">${kpDescription(kpRound)}</div>
    <div class="kp-updated">${updatedStr} · NOAA SWPC / GFZ Potsdam</div>
  </div>`;
}

function magClass(m) {
  if (m < 2.0) return 'mag-minor';
  if (m < 3.5) return 'mag-light';
  if (m < 5.0) return 'mag-moderate';
  if (m < 6.0) return 'mag-strong';
  return 'mag-major';
}
function magLabel(m) {
  if (m < 2.0) return 'Micro';
  if (m < 3.5) return 'Leggero';
  if (m < 5.0) return 'Moderato';
  if (m < 6.0) return 'Forte';
  if (m < 7.0) return '⚠️ Maggiore';
  return '🚨 Grande';
}
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Adesso';
  if (m < 60) return `${m} min fa`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h fa`;
  return `${Math.floor(h / 24)}g fa`;
}

// ── INGV: terremoti Italia in tempo reale ────────────────────
async function fetchQuakesIT(days) {
  const end = new Date().toISOString().replace('T',' ').slice(0,19);
  const start = new Date(Date.now() - days * 86400000).toISOString().replace('T',' ').slice(0,19);
  const url = `https://webservices.ingv.it/fdsnws/event/1/query?format=geojson`
    + `&starttime=${encodeURIComponent(start)}&endtime=${encodeURIComponent(end)}`
    + `&minmagnitude=1.5&orderby=time&limit=80`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Errore INGV');
  return r.json();
}

// ── USGS: terremoti mondiali ─────────────────────────────────
async function fetchQuakesWorld(days) {
  const end = new Date().toISOString();
  const start = new Date(Date.now() - days * 86400000).toISOString();
  const url = `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson`
    + `&starttime=${start}&endtime=${end}`
    + `&minmagnitude=4.5&orderby=time&limit=100`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Errore USGS');
  return r.json();
}

async function initQuakes() {
  const el = document.getElementById('quake-content');
  if (!el) return;
  el.innerHTML = `<div class="loading"><div class="loading-icon">🌀</div><div class="loading-text">Caricamento...</div></div>`;

  const [kpResult, itResult, worldResult] = await Promise.allSettled([
    renderKpCard(),
    fetchQuakesIT(parseInt(quakeFilterIT)),
    fetchQuakesWorld(parseInt(quakeFilterWorld))
  ]);

  const kp = kpResult.status === 'fulfilled' ? kpResult.value : '';
  allQuakesIT    = itResult.status    === 'fulfilled' ? (itResult.value.features    || []) : [];
  allQuakesWorld = worldResult.status === 'fulfilled' ? (worldResult.value.features || []) : [];

  renderAllQuakes(kp);
}

// ── Helper: colore per magnitudo ─────────────────────────────
function quakeColor(m) {
  if (m >= 6)   return '#ff3860';
  if (m >= 5)   return '#ff6b6b';
  if (m >= 4)   return '#f5a623';
  if (m >= 2.5) return '#a8e063';
  return '#5bc4bb';
}

// ── Helper: HTML lista terremoti ─────────────────────────────
function quakeListHTML(quakes, scope) {
  const zoomFn = scope === 'IT' ? 'zoomQuakeIT' : 'zoomQuakeWorld';
  if (quakes.length === 0) return `
    <div class="no-alerts" style="margin:0 16px 8px">
      <span style="font-size:22px">✅</span>

  return quakes.map((f, i) => {
    const p = f.properties;
    const m = (p.mag ?? 0).toFixed(1);
    const depth = f.geometry?.coordinates?.[2]?.toFixed(0) ?? '?';
    const place = p.place || 'Posizione sconosciuta';
    return `<div class="quake-row" onclick="${zoomFn}(${i})">

      <div class="quake-depth">🔻${depth} km</div>

  }).join('');
}

// PWA — Service Worker inline (installabile senza server)
// ============================================================
function registerPWA() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'topweather-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.') || e.request.url.includes('earthquake')) return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'}).catch(()=>{});
}
registerPWA();

function doGeo() {
  if (!navigator.geolocation) { setGeoStatus('Geolocalizzazione non supportata', true); return; }
  setGeoStatus('🔍 Rilevamento posizione...');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      setGeoStatus('');
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${currentLat}&lon=${currentLon}&format=json&accept-language=it`);
        const j = await r.json();
        const addr = j.address || {};
        currentCity = addr.city || addr.town || addr.village || addr.county || 'La tua posizione';
        currentRegion = [addr.state||'', addr.country||''].filter(Boolean).join(', ');
      } catch(e) {
        currentCity = 'La tua posizione';
        currentRegion = `${currentLat.toFixed(2)}°N ${currentLon.toFixed(2)}°E`;
      }
      updateHeader(); load();
    },
    err => {
      const msgs = {1:'Accesso negato',2:'Posizione non disponibile',3:'Timeout'};
      setGeoStatus('⚠️ ' + (msgs[err.code]||'Errore'), true);
    },
    {timeout:10000, enableHighAccuracy:true}
  );
}

function setGeoStatus(msg, isErr) {
  const el = document.getElementById('geoStatus');
  el.textContent = msg;
  el.style.color = isErr ? '#ff8080' : 'var(--teal)';
}

function onSearchInput() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { hideSuggestions(); return; }
  searchTimer = setTimeout(() => fetchSuggestions(q), 350);
}

function onSearchKey(e) {
  if (e.key==='Enter') doSearch();
  if (e.key==='Escape') hideSuggestions();
}

async function fetchSuggestions(q) {
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=it&format=json`);
    const j = await r.json();
    const results = j.results || [];
    if (!results.length) { hideSuggestions(); return; }
    const box = document.getElementById('suggestions');
    box.innerHTML = results.map(r => `
      <div class="suggestion-item" onclick="selectCity(${r.latitude},${r.longitude},'${esc(r.name)}','${esc((r.admin1||'')+(r.country?', '+r.country:''))}')">
        ${r.name}<span class="suggestion-country">${r.admin1?r.admin1+', ':''}${r.country||''}</span>
      </div>`).join('');
    box.style.display = 'block';
  } catch(e) { hideSuggestions(); }
}

function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
function hideSuggestions(){ document.getElementById('suggestions').style.display='none'; }

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  hideSuggestions();
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=it&format=json`);
    const j = await r.json();
    const res = (j.results||[])[0];
    if (!res) { setGeoStatus('⚠️ Città non trovata', true); return; }
    selectCity(res.latitude, res.longitude, res.name, (res.admin1||'')+(res.country?', '+res.country:''));
  } catch(e) { setGeoStatus('⚠️ Errore ricerca', true); }
}

function selectCity(lat, lon, name, region) {
  currentLat=lat; currentLon=lon; currentCity=name; currentRegion=region;
  document.getElementById('searchInput').value='';
  effInitialized = false; // ricalcola effemeridi per nuova città
  hideSuggestions(); updateHeader(); load();
}

function updateHeader() {
  document.getElementById('cityName').textContent = currentCity;
  document.getElementById('citySub').textContent = currentRegion;
}

// Genera allerte sintetiche dai dati Open-Meteo
function deriveAlerts(data) {
  if (!data || !data.daily) return [];
  const d = data.daily;
  const alerts = [];
  const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  for (let i = 0; i < Math.min(3, d.time.length); i++) {
    const date = new Date(d.time[i]);
    const dayName = i===0 ? 'Oggi' : i===1 ? 'Domani' : DAYS_IT[date.getDay()];
    const wind = d.wind_speed_10m_max?.[i] ?? 0;
    const gusts = d.wind_gusts_10m_max?.[i] ?? 0;
    const rain = d.precipitation_sum?.[i] ?? 0;
    const rainProb = d.precipitation_probability_max?.[i] ?? 0;
    const code = d.weather_code?.[i] ?? 0;
    const tMax = d.temperature_2m_max?.[i] ?? null;
    const tMin = d.temperature_2m_min?.[i] ?? null;
    const appMax = d.apparent_temperature_max?.[i] ?? tMax;
    const appMin = d.apparent_temperature_min?.[i] ?? tMin;

    // 🌡️ Caldo estremo
    if (tMax !== null && tMax >= 36) {
      const sev = tMax >= 42 ? 'sev-extreme' : tMax >= 40 ? 'sev-severe' : tMax >= 38 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🌡️',
        title: `Caldo ${tMax>=40?'estremo':'intenso'} — ${dayName}`,
        desc: `Temperatura massima: ${tMax.toFixed(0)}°C. Percepita: ${appMax!==null?appMax.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. max: ${tMax.toFixed(1)}°C · Percepita max: ${appMax!==null?appMax.toFixed(1)+'°C':'-'}. Evitare l'esposizione al sole nelle ore centrali (12–16). Bere acqua frequentemente. Attenzione a anziani, bambini e animali.`,
        day: dayName,
      });
    }

    // 🥶 Freddo intenso
    if (tMin !== null && tMin <= -2) {
      const sev = tMin <= -10 ? 'sev-severe' : tMin <= -5 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🥶',
        title: `Freddo intenso — ${dayName}`,
        desc: `Temperatura minima: ${tMin.toFixed(0)}°C. Percepita: ${appMin!==null?appMin.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. min: ${tMin.toFixed(1)}°C · Percepita min: ${appMin!==null?appMin.toFixed(1)+'°C':'-'}. Possibile formazione di ghiaccio su strade e marciapiedi. Coprirsi adeguatamente.`,
        day: dayName,
      });
    }

    // ⛈️ Temporale
    if ([95,96,99].includes(code)) {
      const sev = code===99 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '⛈️',
        title: `Temporale${code===99?' con grandine':''} — ${dayName}`,
        desc: `Previsti temporali${code===99?' con possibile grandine':''}.${rain>0?' Accumulo stimato: '+rain.toFixed(1)+' mm.':''}`,
        detail: `Codice WMO: ${code}. Precipitazioni: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. Raffiche: ${gusts.toFixed(0)} km/h.`,
        day: dayName,
      });
    }
    // 💨 Vento forte
    if (gusts >= 75 || wind >= 50) {
      const sev = gusts >= 100 ? 'sev-severe' : gusts >= 75 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '💨',
        title: `Vento forte — ${dayName}`,
        desc: `Vento: ${wind.toFixed(0)} km/h, raffiche fino a ${gusts.toFixed(0)} km/h.`,
        detail: `Vento sostenuto: ${wind.toFixed(0)} km/h. Raffiche massime: ${gusts.toFixed(0)} km/h. Prestare attenzione alla navigazione e alla guida.`,
        day: dayName,
      });
    }
    // 🌧️ Pioggia intensa
    if (rain >= 40) {
      const sev = rain >= 80 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '🌧️',
        title: `Pioggia intensa — ${dayName}`,
        desc: `Accumulo previsto: ${rain.toFixed(1)} mm. Rischio allagamenti.`,
        detail: `Precipitazioni totali: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. Possibili allagamenti locali e difficoltà alla viabilità.`,
        day: dayName,
      });
    }
    // ❄️ Neve (codici 71-77)
    if ([71,73,75,77].includes(code)) {
      const sev = code>=75 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '❄️',
        title: `Neve — ${dayName}`,
        desc: `Previste nevicate${code>=75?' abbondanti':''}.`,
        detail: `Codice WMO: ${code}. Possibili disagi alla viabilità. Verificare le condizioni stradali.`,
        day: dayName,
      });
    }
  }
  // sort by severity
  const order = {'sev-extreme':0,'sev-severe':1,'sev-moderate':2,'sev-minor':3};
  return alerts.sort((a,b) => (order[a.sev]??4) - (order[b.sev]??4));
}

function alertSevLabel(sev) {
  return {'sev-extreme':'ESTREMO','sev-severe':'SEVERO','sev-moderate':'MODERATO','sev-minor':'MINORE'}[sev] || '';
}

function pollenLevel(v) {
  if (v===null||v===undefined) return {label:'N/D',cls:'level-none',pct:0};
  if (v<10)  return {label:'Assente',   cls:'level-none',  pct:Math.min(v/10*20,20)};
  if (v<50)  return {label:'Basso',     cls:'level-low',   pct:20+(v-10)/40*20};
  if (v<200) return {label:'Moderato',  cls:'level-medium',pct:40+(v-50)/150*20};
  if (v<700) return {label:'Alto',      cls:'level-high',  pct:60+(v-200)/500*20};
  return          {label:'Molto alto', cls:'level-vhigh', pct:Math.min(80+(v-700)/300*20,100)};
}
const pollenColor = {'level-none':'#4ecdc4','level-low':'#a8e063','level-medium':'#f5a623','level-high':'#ff6b6b','level-vhigh':'#ff3860'};

function waveLabel(h){ if(h<0.3)return'Calmo'; if(h<0.8)return'Quasi calmo'; if(h<1.5)return'Poco mosso'; if(h<2.5)return'Mosso'; if(h<4)return'Molto mosso'; return'Agitato'; }
function waveIcon(h){ if(h<0.5)return'🏖️'; if(h<3)return'🌊'; return'⛈️'; }

// Restituisce l'icona meteo tenendo conto se è giorno o notte
// sunriseTs e sunsetTs sono timestamp Unix in secondi (opzionali)
function getIcon(code, timeIso, sunriseIso, sunsetIso) {
  const t = timeIso ? new Date(timeIso) : new Date();
  const isNight = sunriseIso && sunsetIso
    ? t < new Date(sunriseIso) || t > new Date(sunsetIso)
    : (()=>{ const h=t.getHours(); return h<6||h>=21; })();

  // Icone notturne solo per cielo sereno/poco nuvoloso
  if (isNight) {
    if (code===0)  return '🌕';   // sereno → luna piena
    if (code===1)  return '🌔';   // prevalentemente sereno → luna quasi piena
    if (code===2)  return '🌙';   // parzialmente nuvoloso → luna con nuvola
    if (code===3)  return '☁️';   // nuvoloso (uguale giorno/notte)
  }
  return getWMO(code).icon;
}

function render(weatherData, marineData, pollenData) {

  const nowHour = now.getHours();

  const sunrise0 = d.sunrise[0]; // es. "2026-04-21T06:12"
  const sunset0  = d.sunset[0];

  // Icona corrente con controllo notte
  const currentIcon = getIcon(c.weather_code, now.toISOString(), sunrise0, sunset0);

  const currentIdx = h.time.findIndex(t => new Date(t).getHours()===nowHour);
  const start = currentIdx>=0 ? currentIdx : 0;
  const hourSlots = [];
  for(let i=start;i<Math.min(start+8,h.time.length);i++){
    // Per ogni slot orario scegli l'alba/tramonto del giorno giusto
    const slotDate = new Date(h.time[i]);
    const dayIdx = d.time.findIndex(dt => dt === slotDate.toISOString().slice(0,10));
    const sr = dayIdx>=0 ? d.sunrise[dayIdx] : sunrise0;
    const ss = dayIdx>=0 ? d.sunset[dayIdx]  : sunset0;
    hourSlots.push({
      time: h.time[i],
      temp: Math.round(h.temperature_2m[i]),
      icon: getIcon(h.weather_code[i], h.time[i], sr, ss),
      isNow: i===start,

  // Allerte inline
  const alerts = window._lastAlerts || [];
  const alertsInlineHTML = alerts.length ? `
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:7px;">

  // METEO panel

async function load() {
  document.getElementById('weather-content').innerHTML = `<div class="loading"><div class="loading-icon">🌀</div><div class="loading-text">Caricamento...</div></div>`;
  try {
    const [weather, marine, pollen, alertData] = await Promise.allSettled([
      fetchWeather(), fetchMarine(), fetchPollen(), fetchAlerts()
    ]);
    if (weather.status==='rejected') throw new Error('Meteo non disponibile');
    const alerts = alertData.status==='fulfilled' ? deriveAlerts(alertData.value) : [];
    window._lastAlerts = alerts;
    render(weather.value, marine.status==='fulfilled'?marine.value:null, pollen.status==='fulfilled'?pollen.value:null);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = `<div class="error-msg">⚠️ ${e.message||'Errore'}<br>Controlla la connessione.<br><br><button class="refresh-btn" onclick="load()">Riprova</button></div>`;
  }
  // Hide splash
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('hide'); setTimeout(()=>splash.remove(), 700); }
}

async function loadRadarFrames() {
  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const j = await r.json();

    if (radarCurrentType === 'rainviewer') {
      radarFrames = [...(j.radar.past || []), ...(j.radar.nowcast || [])];
    } else if (radarCurrentType === 'sat_ir') {
      radarFrames = j.satellite?.infrared || [];
    } else {
      radarFrames = j.satellite?.visible || [];
    }

    if (!radarFrames.length) { setRadarTime('Nessun dato'); return; }

    const slider = document.getElementById('radarSlider');
    if (slider) { slider.max = radarFrames.length - 1; slider.value = radarFrames.length - 1; }
    radarIdx = radarFrames.length - 1;
    showRadarFrame(radarIdx);
  } catch(e) { setRadarTime('Errore caricamento'); }
}

function showRadarFrame(idx) {
  if (!radarMap || !radarFrames.length) return;
  radarIdx = idx;

  if (radarLayer) { radarMap.removeLayer(radarLayer); radarLayer = null; }

  const frame = radarFrames[idx];
  const ts = frame.time;
  const path = frame.path;

  let tileUrl;
  if (radarCurrentType === 'rainviewer') {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/2/1_1.png`;
  } else {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/0/0_0.png`;
  }

  radarLayer = L.tileLayer(tileUrl, { opacity: 0.7, maxZoom: 18 }).addTo(radarMap);

  const d = new Date(ts * 1000);
  setRadarTime(d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}));

  const slider = document.getElementById('radarSlider');
  if (slider) slider.value = idx;
}

function setRadarTime(t) {
  const el = document.getElementById('radarTime');
  if (el) el.textContent = t;
}

function onRadarSlider(val) {
  stopRadarPlay();
  showRadarFrame(parseInt(val));
}

function toggleRadarPlay() {
  radarPlaying ? stopRadarPlay() : startRadarPlay();
}

function startRadarPlay() {
  radarPlaying = true;
  const btn = document.getElementById('radarPlayBtn');
  if (btn) btn.textContent = '⏸';
  radarTimer = setInterval(() => {
    radarIdx = (radarIdx + 1) % radarFrames.length;

}

function stopRadarPlay() {
  radarPlaying = false;

// Scala colori T 850hPa
function temp850Color(t) {
  const stops = [
    [-20,[130,0,200]],[-10,[0,0,255]],[0,[0,180,255]],
    [5,[0,220,120]],[10,[100,230,0]],[15,[255,230,0]],
    [20,[255,140,0]],[25,[255,50,0]],[30,[200,0,0]]
  ];
  t = Math.max(-20, Math.min(30, t));
  for (let i = 0; i < stops.length-1; i++) {
    const [t0,c0] = stops[i], [t1,c1] = stops[i+1];
    if (t >= t0 && t <= t1) {
      const f = (t-t0)/(t1-t0);
      return `rgba(${~~(c0[0]+(c1[0]-c0[0])*f)},${~~(c0[1]+(c1[1]-c0[1])*f)},${~~(c0[2]+(c1[2]-c0[2])*f)},0.70)`;
    }
  }
  return 'rgba(200,0,0,0.70)';
}

async function fetchGFSData() {
  const det = document.getElementById('gfs-load-detail');
  try {
    // Fetch tutti i punti in parallelo — parametri corretti Open-Meteo
    // temperature_850hPa, windspeed_850hPa, winddirection_850hPa sono i nomi ufficiali
    const urls = GFS_GRID.map(p =>
      `https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}` +
      `&hourly=temperature_850hPa,windspeed_850hPa,winddirection_850hPa` +
      `&forecast_days=5&timeformat=unixtime`
    );

    if (det) det.textContent = `0 / ${urls.length} punti...`;

    // Fetch sequenziali a gruppi di 4 per non sovraccaricare
    const results = [];
    for (let i = 0; i < urls.length; i += 4) {
      const batch = urls.slice(i, i+4).map(u => fetch(u).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }));
      const batchRes = await Promise.all(batch);
      results.push(...batchRes);
      if (det) det.textContent = `${Math.min(i+4, urls.length)} / ${urls.length} punti...`;
    }

    // Estrai ore dal primo risultato
    gfsHours = results[0].hourly.time; // unix timestamps

    // Ridimensiona a ogni 3h (prendi ogni 3° elemento)
    const stride = 3;
    const idxs = gfsHours.map((_,i)=>i).filter(i=>i%stride===0);
    gfsHours = idxs.map(i=>gfsHours[i]);

    gfsDataGrid = GFS_GRID.map((p, ri) => {
      const h = results[ri].hourly;
      return {
        lat: p.lat, lon: p.lon,
        temps:  idxs.map(i => h.temperature_850hPa?.[i] ?? null),
        wspeed: idxs.map(i => h.windspeed_850hPa?.[i] ?? null),
        wdir:   idxs.map(i => h.winddirection_850hPa?.[i] ?? null),
      };
    });

    // Nascondi loading
    const ld = document.getElementById('gfs-load');
    if (ld) ld.style.display = 'none';

    const slider = document.getElementById('gfs-slider');
    if (slider) slider.max = gfsHours.length - 1;

    gfsDrawFrame(0);

  } catch(e) {
    const ld = document.getElementById('gfs-load');
    if (ld) ld.innerHTML = `<div style="font-size:20px">⚠️</div>
      <div>Errore: ${e.message}</div>
      <div style="font-size:10px;opacity:.6;margin-top:4px">Riprova tra qualche minuto</div>
      <button onclick="gfsInitialized=false;initGFS()" style="margin-top:8px;padding:6px 14px;
        border-radius:8px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:11px">
        ↺ Riprova
      </button>`;
  }
}

function gfsDrawFrame(idx) {
  if (!gfsMap || !gfsDataGrid.length) return;
  gfsFrameIndex = idx;

  // Rimuovi overlays precedenti
  gfsOverlays.forEach(l => gfsMap.removeLayer(l));
  gfsOverlays = [];

  // Badge tempo
  const ts = gfsHours[idx] * 1000;
  const d = new Date(ts);
  const badge = document.getElementById('gfs-badge');
  if (badge) badge.textContent = d.toLocaleString('it-IT',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  if (gfsVar === 'temp') {
    gfsDataGrid.forEach(pt => {
      const val = pt.temps[idx];
      if (val == null) return;
      const rect = L.rectangle(
        [[pt.lat-1.0, pt.lon-1.0],[pt.lat+1.0, pt.lon+1.0]],
        { color:'none', fillColor: temp850Color(val), fillOpacity: 0.72, weight: 0 }
      );
      rect.bindTooltip(`<b>${val.toFixed(1)}°C</b><br>${pt.lat}°N ${pt.lon}°E`,{sticky:true,className:'gfs-tip'});
      rect.addTo(gfsMap);
      gfsOverlays.push(rect);
    });
  } else {
    gfsDataGrid.forEach(pt => {
      const spd = pt.wspeed[idx];
      const dir = pt.wdir[idx];
      if (spd == null || dir == null) return;
      // Freccia che punta nella direzione di provenienza
      const rad = (dir - 180) * Math.PI / 180;
      const len = Math.min(0.8 + spd * 0.03, 1.4);
      const s = [pt.lat - Math.cos(rad)*len, pt.lon - Math.sin(rad)*len];
      const e = [pt.lat + Math.cos(rad)*len, pt.lon + Math.sin(rad)*len];
      const t = Math.min(spd/35, 1);
      const col = `rgb(${~~(t*255)},${~~(200-t*160)},${~~(255-t*220)})`;
      const line = L.polyline([s,e],{color:col,weight:2.5,opacity:.9});
      const dot  = L.circleMarker(e,{radius:3,color:col,fillColor:col,fillOpacity:1,weight:0});
      line.bindTooltip(`<b>${spd.toFixed(0)} km/h</b> da ${dir.toFixed(0)}°`,{sticky:true});
      line.addTo(gfsMap); dot.addTo(gfsMap);
      gfsOverlays.push(line, dot);
    });
  }

  // UI
  const pct = (idx / Math.max(gfsHours.length-1,1)) * 100;
  const prog = document.getElementById('gfs-prog');
  if (prog) prog.style.width = pct+'%';
  const sl = document.getElementById('gfs-slider');
  if (sl) sl.value = idx;
  const lbl = document.getElementById('gfs-lbl');
  if (lbl) lbl.textContent = `+${idx*3}h`;
}

function gfsSeek(v) { stopGFSPlay(); gfsDrawFrame(+v); }
function toggleGFSPlay() { gfsPlaying ? stopGFSPlay() : startGFSPlay(); }
function startGFSPlay() {
  gfsPlaying=true;
  document.getElementById('gfs-playbtn').textContent='⏸';
  gfsTimer=setInterval(()=>gfsDrawFrame((gfsFrameIndex+1)%Math.max(gfsHours.length,1)),gfsSpeed);
}
function stopGFSPlay() {
  gfsPlaying=false; clearInterval(gfsTimer);
  const b=document.getElementById('gfs-playbtn'); if(b) b.textContent='▶';
}
function gfsSetSpd(ms,btn) {
  gfsSpeed=ms;
  document.querySelectorAll('.gfs-spd').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(gfsPlaying){stopGFSPlay();startGFSPlay();}
}
function gfsSetVar(v,btn) {
  gfsVar=v;
  document.querySelectorAll('.gfs-var-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const leg=document.getElementById('gfs-legend');
  if(leg) leg.style.display=v==='temp'?'flex':'none';
  if(gfsDataGrid.length) gfsDrawFrame(gfsFrameIndex);
}

let lightningTimer = null;

function startLightningCounter() {
  fetchLightningCount();
  if (lightningTimer) clearInterval(lightningTimer);
  lightningTimer = setInterval(fetchLightningCount, 30000);
}

async function fetchLightningCount() {
  try {
    // API pubblica Blitzortung: ultimo minuto, area Europa/Mondo
    // Usiamo due endpoint: uno recente (1 min) e uno storico (1h)
    const [r1m, r60m] = await Promise.allSettled([
      fetch('https://data.blitzortung.org/Data_1/strikes/1/0.json', {mode:'cors'}),
      fetch('https://data.blitzortung.org/Data_1/strikes/6/0.json', {mode:'cors'})
    ]);

    let count10m = '—', count1h = '—', lastStr = '—';

    if (r1m.status === 'fulfilled' && r1m.value.ok) {
      const d = await r1m.value.json();
      const arr = Array.isArray(d) ? d : (d.strokes || []);
      count10m = arr.length.toLocaleString('it-IT');
      if (arr.length > 0) {
        const last = arr[arr.length - 1];
        const ts = last.time ? last.time / 1000000 : Date.now();
        const ago = Math.round((Date.now() - ts) / 1000);
        lastStr = ago < 60 ? `${ago}s` : `${Math.round(ago/60)}m`;
      }
    }
    if (r60m.status === 'fulfilled' && r60m.value.ok) {
      const d2 = await r60m.value.json();
      const arr2 = Array.isArray(d2) ? d2 : (d2.strokes || []);
      count1h = arr2.length.toLocaleString('it-IT');
    }

    const el1h  = document.getElementById('blitz-count-1h');
    const el10m = document.getElementById('blitz-count-10m');
    const elLast= document.getElementById('blitz-last');
    if (el1h)  el1h.textContent  = count1h;
    if (el10m) el10m.textContent = count10m;
    if (elLast) elLast.textContent = lastStr;
  } catch(e) {
    // silenzioso — le statistiche rimangono a —
  }
}

async function fetchMetar(icao) {
  metarStationId = icao;
  const body = document.getElementById('metar-body');
  if (!body) return;
  body.innerHTML = `<div class="loading"><div class="loading-icon">📡</div><div class="loading-text">Carico ${icao}...</div></div>`;

  const METAR_URL = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
  const TAF_URL   = `https://aviationweather.gov/api/data/taf?ids=${icao}&format=json`;

  // fetch con timeout via AbortController
  const ft = (url, ms=8000) => {
    const c = new AbortController();
    const id = setTimeout(() => c.abort(), ms);
    return fetch(url, {signal: c.signal}).finally(() => clearTimeout(id));
  };

  // Prova a parsare JSON in modo sicuro
  const safeJson = async (res) => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  };

  // 4 strategie diverse — la prima che risponde vince
  const tryStrategy = async (label) => {
    if (label === 'direct') {
      // Strategia 1: API diretta (funziona se il browser/CDN non blocca CORS)
      const [m, t] = await Promise.all([
        ft(METAR_URL, 6000).then(safeJson),
        ft(TAF_URL, 6000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'corsproxy') {
      const P = 'https://corsproxy.io/?url=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 9000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   9000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'allorigins') {
      const P = 'https://api.allorigins.win/get?url=';
      const [mr, tr] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(r => r.json()),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(r => r.json()).catch(() => ({contents:'[]'})),
      ]);
      const m = JSON.parse(mr.contents || '[]');
      const t = JSON.parse(tr.contents || '[]');
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'codetabs') {
      const P = 'https://api.codetabs.com/v1/proxy?quest=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
  };

  const strategies = ['direct', 'corsproxy', 'allorigins', 'codetabs'];

  for (let i = 0; i < strategies.length; i++) {
    try {
      const result = await tryStrategy(strategies[i]);
      if (!result.m) throw new Error('empty response');
      renderMetarResult(result.m, result.t, icao);
      return;
    } catch (e) {
      console.warn(`METAR strategy ${strategies[i]} failed:`, e.message);
      if (i < strategies.length - 1) {
        body.innerHTML = `<div class="loading">
          <div class="loading-icon">📡</div>
          <div class="loading-text">Fonte ${i+1} non disponibile, provo alternativa ${i+2}/${strategies.length}...</div>
        </div>`;
      }
    }
  }

  // Tutte le fonti fallite
  body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
    <div style="font-size:28px">⚠️</div>
    <div style="margin-top:8px;font-size:13px">Nessun servizio ha risposto per <b>${icao}</b>.<br>
    <span style="font-size:11px;opacity:.7">Controlla il codice ICAO e la connessione, poi riprova.</span></div>
    <button onclick="fetchMetar('${icao}')" style="margin-top:14px;padding:8px 20px;
      border-radius:10px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:12px;font-weight:700">
      ↺ Riprova
    </button>
  </div>`;
}

function metarWxIcon(wx) {
  if (!wx) return '';
  if (wx.includes('TS')) return '⛈';
  if (wx.includes('RA') || wx.includes('DZ')) return '🌧';
  if (wx.includes('SN') || wx.includes('GS')) return '❄️';
  if (wx.includes('FG') || wx.includes('BR')) return '🌫';
  if (wx.includes('HZ')) return '😶‍🌫️';
  if (wx.includes('SQ') || wx.includes('FC')) return '🌪';
  return '🌦';
}

function flightRule(vis, ceil) {
  // vis in statute miles, ceil in feet
  if (ceil < 500 || vis < 1) return ['LIFR','fr-lifr'];
  if (ceil < 1000 || vis < 3) return ['IFR','fr-ifr'];
  if (ceil < 3000 || vis < 5) return ['MVFR','fr-mvfr'];
  return ['VFR','fr-vfr'];
}

function renderMetarResult(m, taf, icao) {
  const body = document.getElementById('metar-body');
  if (!m) {
    body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
      <div style="font-size:28px">🚫</div><div>Nessun METAR disponibile per ${icao}.<br>Verifica il codice ICAO.</div></div>`;
    return;
  }

  // --- decodifica METAR ---
  const wind = m.wdir != null
    ? `${m.wdir === 0 && m.wspd === 0 ? 'CALMA' : m.wdir + '°'} ${m.wspd || 0} kt${m.wgst ? ' / Raffica ' + m.wgst + ' kt' : ''}`
    : 'N/D';
  const vis  = m.visib != null ? (m.visib >= 9999 ? '≥10 km' : m.visib + ' SM') : 'N/D';
  const temp = m.temp  != null ? m.temp + ' °C' : 'N/D';
  const dewp = m.dewp  != null ? m.dewp + ' °C' : 'N/D';
  const altim = m.altim != null ? m.altim.toFixed(0) + ' hPa' : 'N/D';
  const wxStr = (m.wxString || '').trim();
  const wxIcon = metarWxIcon(wxStr);

  // Sky condition
  const skyMap = { SKC:'Cielo libero', CLR:'Cielo libero', FEW:'Poche nuvole', SCT:'Nuvolosità variabile', BKN:'Molto nuvoloso', OVC:'Coperto', VV:'Visibilità verticale' };
  const skyChips = (m.clouds || []).map(c =>
    `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover} ${c.base != null ? c.base*100+'\'' : ''}</span>`
  ).join('');

  // Ceiling for flight rules
  const bknovc = (m.clouds||[]).filter(c=>['BKN','OVC','VV'].includes(c.cover));
  const ceil = bknovc.length ? Math.min(...bknovc.map(c=>c.base*100)) : 99999;
  const [fr, frClass] = flightRule(m.visib || 99, ceil);

  // Orario
  const obsTime = m.reportTime ? new Date(m.reportTime).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+' UTC' : '';

  // --- TAF ---
  let tafHTML = '<div style="padding:0 16px 8px;color:var(--muted);font-size:12px">Nessun TAF disponibile.</div>';
  if (taf && taf.rawTAF) {
    // Mostra TAF grezzo con parsing basilare
    const lines = taf.rawTAF.replace(/\n/g,' ').split(/(TEMPO|BECMG|FM\d{6}|PROB\d{2}\s+TEMPO|PROB\d{2})/)
      .filter(s=>s.trim());
    let tafParsed = '';
    let mainBlock = true;
    for (let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      if (!l) continue;
      if (/^(TEMPO|BECMG|FM\d{6}|PROB\d{2})/.test(l)) {
        // keyword, next is content
        const keyword = l;
        const content = lines[i+1] ? lines[i+1].trim() : '';
        i++;
        const kLabel = keyword.startsWith('FM') ? '⏩ Da '+keyword.slice(2)
          : keyword.startsWith('TEMPO') ? '⚡ Temporaneamente'
          : keyword.startsWith('BECMG') ? '🔄 In evoluzione'
          : keyword.startsWith('PROB') ? '🎲 '+keyword
          : keyword;
        tafParsed += `<div class="taf-line"><div class="taf-period">${kLabel}</div><div class="taf-text">${content}</div></div>`;
      } else if (mainBlock) {
        tafParsed += `<div class="taf-line"><div class="taf-period">📋 Previsione base</div><div class="taf-text">${l}</div></div>`;
        mainBlock = false;
      }
    }
    const tafValidity = taf.validTimeFrom && taf.validTimeTo
      ? `Valido: ${new Date(taf.validTimeFrom * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} → ${new Date(taf.validTimeTo * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} UTC`
      : '';
    tafHTML = `
      <div class="metar-card">
        <div class="metar-card-title">📋 TAF — ${icao} <span style="font-weight:400;font-size:9px;margin-left:auto">${tafValidity}</span></div>
        <div class="metar-raw">${taf.rawTAF || ''}</div>
        <div>${tafParsed}</div>
      </div>`;
  }

  body.innerHTML = `
    <div class="metar-time">📡 Osservazione: ${obsTime}</div>
    <div class="metar-card">
      <div class="metar-card-title">
        <span class="metar-cond">${wxIcon||'🌡'}</span>
        METAR — ${m.name||icao}
        <span class="metar-flight-rule ${frClass}">${fr}</span>
      </div>
      <div class="metar-raw">${m.rawOb || ''}</div>
      <div class="metar-grid">
        <div class="metar-item"><div class="metar-item-lbl">🌡 Temperatura</div><div class="metar-item-val">${temp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💧 Punto di rugiada</div><div class="metar-item-val">${dewp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💨 Vento</div><div class="metar-item-val" style="font-size:12px">${wind}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">👁 Visibilità</div><div class="metar-item-val">${vis}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">🔵 Pressione QNH</div><div class="metar-item-val">${altim}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">☁️ Nuvolosità</div>
          <div class="metar-sky">${skyChips||'<span class="metar-sky-chip">N/D</span>'}</div>
        </div>
      </div>
      ${wxStr ? `<div class="metar-sky" style="margin-top:10px"><span class="metar-wx-chip">${wxIcon} ${wxStr}</span></div>` : ''}
    </div>
    ${tafHTML}
    <div class="last-updated" style="margin:4px 16px 12px">Fonte: NOAA Aviation Weather Center · aviationweather.gov</div>
  `;
  // Dopo aver renderizzato il METAR, avvia subito i satelliti GNSS
  renderGpsSatCard();
}

// ============================================================
let gpsSatInterval = null;

  { id: 'GLONASS', name: 'GLONASS', color: '#60a5fa' },

// Propagazione SGP4 semplificata
function satElevation(line1, line2, lat, lon, now) {
  try {
    const rad = Math.PI / 180;
    const incl = parseFloat(line2.slice(8,16)) * rad;
    const raan = parseFloat(line2.slice(17,25)) * rad;
    const ecc  = parseFloat('0.' + line2.slice(26,33).trim());
    const argp = parseFloat(line2.slice(34,42)) * rad;
    const mm   = parseFloat(line2.slice(52,63));
    const ma0  = parseFloat(line2.slice(43,51)) * rad;
    const epoch = line1.slice(18,32);
    const ey = parseInt(epoch.slice(0,2));
    const year = ey < 57 ? 2000 + ey : 1900 + ey;
    const doy  = parseFloat(epoch.slice(2));
    const epochMs = Date.UTC(year, 0, 1) + (doy - 1) * 86400000;
    const dt_s = (now - epochMs) / 1000;

    const n  = mm * 2 * Math.PI / 86400;
    const M  = (ma0 + n * dt_s) % (2 * Math.PI);
    let E = M;
    for (let i = 0; i < 15; i++) E = M + ecc * Math.sin(E);
    const nu = 2 * Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));

    const mu = 398600.4418;
    const a  = Math.pow(mu / (n*n), 1/3);
    const r  = a * (1 - ecc * Math.cos(E));
    const xo = r * Math.cos(nu), yo = r * Math.sin(nu);

    const cr=Math.cos(raan), sr=Math.sin(raan);
    const ci=Math.cos(incl), si=Math.sin(incl);
    const ca=Math.cos(argp), sa=Math.sin(argp);

    const x = (cr*ca-sr*sa*ci)*xo + (-cr*sa-sr*ca*ci)*yo;
    const y = (sr*ca+cr*sa*ci)*xo + (-sr*sa+cr*ca*ci)*yo;
    const z = (sa*si)*xo + (ca*si)*yo;

    const JD = now/86400000 + 2440587.5;
    const T  = (JD - 2451545.0) / 36525.0;
    const gmst = (280.46061837 + 360.98564736629*(JD-2451545.0) + T*T*(0.000387933-T/38710000)) % 360;
    const gr = gmst * rad;

    const xe = x*Math.cos(gr) + y*Math.sin(gr);
    const ye = -x*Math.sin(gr) + y*Math.cos(gr);
    const ze = z;

    const latr=lat*rad, lonr=lon*rad, Re=6378.137;
    const x0=Re*Math.cos(latr)*Math.cos(lonr);
    const y0=Re*Math.cos(latr)*Math.sin(lonr);
    const z0=Re*Math.sin(latr);

    const dx=xe-x0, dy=ye-y0, dz=ze-z0;
    const S  = Math.sin(latr)*Math.cos(lonr)*dx + Math.sin(latr)*Math.sin(lonr)*dy - Math.cos(latr)*dz;
    const E2 = -Math.sin(lonr)*dx + Math.cos(lonr)*dy;
    const Z  = Math.cos(latr)*Math.cos(lonr)*dx + Math.cos(latr)*Math.sin(lonr)*dy + Math.sin(latr)*dz;
    const rng = Math.sqrt(S*S+E2*E2+Z*Z);
    const el = Math.asin(Z/rng)/rad;
    const az = (Math.atan2(-E2,S)/rad+360)%360;
    return { el, az, range: rng };
  } catch(e) { return null; }
}

// ── Auto-aggiornamento TLE da Celestrak con cache localStorage ────────────
const TLE_CACHE_KEY = 'gnss_tle_cache';
const TLE_CACHE_TTL = 24 * 60 * 60 * 1000; // 24 ore

const CELESTRAK_URLS = {
  GPS:     'https://celestrak.org/NORAD/elements/gp.php?GROUP=gps-ops&FORMAT=json',
  GLONASS: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=glo-ops&FORMAT=json',
  GALILEO: 'https://celestrak.org/NORAD/elements/gp.php?GROUP=galileo&FORMAT=json',
  BEIDOU:  'https://celestrak.org/NORAD/elements/gp.php?GROUP=beidou&FORMAT=json',
};

function parseCelestrakJSON(jsonData) {
  // Celestrak JSON OMM format → array di {name, line1, line2}
  return jsonData.map(o => {
    const name  = (o.OBJECT_NAME || '').trim();
    const line1 = (o.TLE_LINE1 || '').trim();
    const line2 = (o.TLE_LINE2 || '').trim();
    if (line1.startsWith('1 ') && line2.startsWith('2 ')) return { name, line1, line2 };
    return null;
  }).filter(Boolean);
}

async function fetchFreshTLE(statusCallback) {
  // 1. Controlla cache localStorage
  try {
    const cached = localStorage.getItem(TLE_CACHE_KEY);
    if (cached) {
      const { ts, data } = JSON.parse(cached);
      if (Date.now() - ts < TLE_CACHE_TTL) {
        statusCallback('cache');
        return data;
      }
    }
  } catch(e) {}

  // 2. Prova a scaricare da Celestrak (funziona dal browser reale)
  statusCallback('fetch');
  const result = {};
  let anyOk = false;
  for (const [id, url] of Object.entries(CELESTRAK_URLS)) {
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const json = await r.json();
      const sats = parseCelestrakJSON(json);
      if (sats.length > 0) { result[id] = sats; anyOk = true; }
    } catch(e) {
      result[id] = null; // useremo fallback per questa costellazione
    }
  }

  if (anyOk) {
    // Completa le costellazioni fallite con i dati embedded
    for (const id of Object.keys(EMBEDDED_TLE)) {
      if (!result[id] || result[id].length === 0) result[id] = EMBEDDED_TLE[id];
    }
    // Salva in cache
    try { localStorage.setItem(TLE_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: result })); } catch(e) {}
    statusCallback('live');
    return result;
  }

  // 3. Fallback: dati embedded
  statusCallback('embedded');
  return EMBEDDED_TLE;
}

let tleSource = 'embedded'; // 'embedded' | 'cache' | 'live'
let activeTLE = EMBEDDED_TLE;

async function initGpsSat() {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    🛰 Aggiorno dati orbitali...</div>`;

  // Scarica TLE (con cache e fallback)
  activeTLE = await fetchFreshTLE(s => { tleSource = s; });

  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    📍 Richiedo posizione GPS...</div>`;

  if (!navigator.geolocation) {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center">GPS non supportato dal browser.</div>`;
    return;
  }

  navigator.geolocation.getCurrentPosition((pos) => {
    gpsSatPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };
    computeAndRender(gpsSatPos);

    clearInterval(gpsSatInterval);
    gpsSatInterval = setInterval(() => {
      if (gpsSatPos) computeAndRender(gpsSatPos);
    }, 30000);

  }, (err) => {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">
      ⚠️ Posizione non disponibile: ${err.message}</div>`;
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
}

function computeAndRender(pos) {
  const now = Date.now();
  const allSats = [];
  const constellationResults = [];

  for (const c of GNSS_CONSTELLATIONS) {
    const tles = activeTLE[c.id] || EMBEDDED_TLE[c.id] || [];
    const visible = [];
    for (const sat of tles) {
      const r = satElevation(sat.line1, sat.line2, pos.lat, pos.lon, now);
      if (r && r.el >= 0) visible.push({ ...sat, el: r.el, az: r.az, range: r.range });
    }
    visible.sort((a,b) => b.el - a.el);
    constellationResults.push({ ...c, total: tles.length, visible });
    allSats.push(...visible.map(s => ({...s, constellation:c.id, color:c.color})));
  }

  renderGpsSat(constellationResults, allSats, pos, now);
}

// Algoritmo sunrise/sunset NOAA (gml.noaa.gov/grad/solcalc)
// Restituisce orari in UTC come oggetti Date
function sunTimes(lat, lon, date) {
  const rad = Math.PI / 180;

  // Julian Day Number (mezzogiorno UTC del giorno dato)
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const A = Math.floor((14-m)/12);
  const Y = y + 4800 - A;
  const M2 = m + 12*A - 3;
  const JD = d + Math.floor((153*M2+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045;

  // Secolo giuliano da J2000
  const JC = (JD - 2451545.0) / 36525.0;

  // Longitudine media del sole
  const L0 = (280.46646 + JC*(36000.76983 + JC*0.0003032)) % 360;

  // Anomalia media
  const Mdeg = (357.52911 + JC*(35999.05029 - 0.0001537*JC)) % 360;
  const Mr = Mdeg * rad;

  // Centro dell'equazione
  const C = (1.914602 - JC*(0.004817 + 0.000014*JC))*Math.sin(Mr)
           + (0.019993 - 0.000101*JC)*Math.sin(2*Mr)
           + 0.000289*Math.sin(3*Mr);

  // Longitudine vera e apparente
  const SunLon = L0 + C;
  const omega  = 125.04 - 1934.136*JC;
  const AppLon = SunLon - 0.00569 - 0.00478*Math.sin(omega*rad);

  // Obliquità corretta
  const MeanObl = 23 + (26 + (21.448 - JC*(46.815 + JC*(0.00059 - JC*0.001813)))/60)/60;
  const OblCorr = MeanObl + 0.00256*Math.cos(omega*rad);

  // Declinazione solare
  const sinDecl = Math.sin(OblCorr*rad) * Math.sin(AppLon*rad);
  const Decl = Math.asin(sinDecl) / rad;

  // Equazione del tempo (minuti)
  const y2 = Math.tan(OblCorr*rad/2)**2;
  const ecc = 0.016708634;
  const EqT = 4/rad * (y2*Math.sin(2*L0*rad) - 2*ecc*Math.sin(Mr)
              + 4*ecc*y2*Math.sin(Mr)*Math.cos(2*L0*rad)
              - 0.5*y2*y2*Math.sin(4*L0*rad)
              - 1.25*ecc*ecc*Math.sin(2*Mr));

  // Angolo orario all'alba/tramonto
  const cosHA = (Math.sin(-0.8333*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
               / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  if (Math.abs(cosHA) > 1) return null;
  const HA = Math.acos(cosHA) / rad; // gradi

  // Mezzogiorno solare in minuti da mezzanotte UTC
  const noonMin  = 720 - 4*lon - EqT;
  const riseMin  = noonMin - HA*4;
  const setMin   = noonMin + HA*4;

  // Crepuscolo civile (~34 min prima/dopo per -6° sotto orizzonte, usiamo -50' per astronomico civile approx)
  const cosHAdawn = (Math.sin(-6*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
                   / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  const HAdawn = Math.abs(cosHAdawn) <= 1 ? Math.acos(Math.max(-1,Math.min(1,cosHAdawn)))/rad : HA+20;
  const dawnMin = noonMin - HAdawn*4;
  const duskMin = noonMin + HAdawn*4;

  // Converti minuti UTC → Date UTC
  const minsToDate = (mins) => {
    const base = new Date(Date.UTC(y, m-1, d));
    return new Date(base.getTime() + mins*60000);
  };

  return {
    rise:    minsToDate(riseMin),
    set:     minsToDate(setMin),
    transit: minsToDate(noonMin),
    dawn:    minsToDate(dawnMin),
    dusk:    minsToDate(duskMin),
    dayLen:  (setMin - riseMin) / 60,
    decl:    Decl.toFixed(1),
    elevation: (90 - Math.abs(lat - Decl)).toFixed(1),
  };
}

// Fase lunare
function moonPhase(date) {
  const known = new Date(2000, 0, 6, 18, 14); // new moon 6 Jan 2000
  const diff = (date - known) / (1000*60*60*24);
  const cycle = 29.53058867;
  const phase = ((diff % cycle) + cycle) % cycle;
  const pct = phase / cycle;
  const icons = ['🌑','🌒','🌒','🌓','🌔','🌔','🌕','🌖','🌖','🌗','🌘','🌘','🌑'];
  const names = ['Luna Nuova','Crescente','Crescente','Primo Quarto','Gibbosa Crescente','Gibbosa Crescente','Luna Piena','Gibbosa Calante','Gibbosa Calante','Ultimo Quarto','Calante','Calante','Luna Nuova'];
  const idx = Math.round(pct * 12) % 13;
  return { phase, pct, icon: icons[idx], name: names[idx] };
}

// Stagione astronomica
function season(date, lat) {
  const m = date.getMonth();
  const isNorth = lat >= 0;
  if (isNorth) {
    if (m >= 2 && m <= 4) return ['🌸 Primavera', '21 Mar'];
    if (m >= 5 && m <= 7) return ['☀️ Estate',    '21 Giu'];
    if (m >= 8 && m <= 10) return ['🍂 Autunno',  '22 Set'];
    return ['❄️ Inverno', '21 Dic'];
  } else {
    if (m >= 2 && m <= 4) return ['🍂 Autunno',   '21 Mar'];
    if (m >= 5 && m <= 7) return ['❄️ Inverno',   '21 Giu'];
    if (m >= 8 && m <= 10) return ['🌸 Primavera','22 Set'];
    return ['☀️ Estate', '21 Dic'];
  }
}

function fmt(date) {
  if (!date) return 'N/D';
  return date.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Rome'});
}
function fmtDur(h) {
  const hh = Math.floor(h), mm = Math.round((h-hh)*60);
  return `${hh}h ${String(mm).padStart(2,'0')}m`;
}
