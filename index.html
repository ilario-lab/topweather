<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Top Weather">
<meta name="theme-color" content="#0a1628">
<title>Top Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --deep: #0a1628;
    --accent: #f5a623;
    --gold: #e8c97a;
    --white: #f0f4ff;
    --muted: rgba(240,244,255,0.5);
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.12);
    --teal: #4ecdc4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--deep);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #1e4fa0 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, #0d2a5e 0%, transparent 50%),
      linear-gradient(180deg, #0a1628 0%, #071020 100%);
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 25%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 5%, rgba(255,255,255,0.8) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.5) 0%, transparent 100%);
    z-index: 0; pointer-events: none;
  }
  .app {
    position: relative; z-index: 1;
    max-width: 430px; margin: 0 auto;
    padding: 0 0 40px; min-height: 100vh;
  }

  /* SEARCH BAR */
  .search-bar { padding: 52px 20px 0; display: flex; gap: 8px; }
  .search-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 50px; padding: 12px 44px 12px 18px;
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; backdrop-filter: blur(10px);
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(245,166,35,0.5); }
  .search-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 16px; padding: 0;
  }
  .geo-btn {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 50px; padding: 0 16px; color: var(--white);
    font-size: 18px; cursor: pointer; backdrop-filter: blur(10px);
    transition: all 0.2s; white-space: nowrap;
  }
  .geo-btn:active { background: rgba(78,205,196,0.2); border-color: var(--teal); }
  .suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #112040; border: 1px solid var(--glass-border);
    border-radius: 16px; overflow: hidden; z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .suggestion-item {
    padding: 12px 18px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid var(--glass-border); transition: background 0.15s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover, .suggestion-item:active { background: rgba(255,255,255,0.08); }
  .suggestion-country { color: var(--muted); font-size: 11px; margin-left: 6px; }

  /* HEADER */
  .header { padding: 18px 24px 4px; text-align: center; }
  .city-label { font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .city-name { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; }
  .city-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* NAV GRID */
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 14px 20px 0;
  }
  .tab {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    padding: 12px 6px 10px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    backdrop-filter: blur(10px);
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .tab::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .tab-icon { font-size: 22px; line-height: 1; transition: transform 0.22s cubic-bezier(.34,1.56,.64,1); }
  .tab-label { letter-spacing: 0.3px; }
  .tab:active { transform: scale(0.94); }
  .tab.active {
    background: rgba(245,166,35,0.15);
    border-color: rgba(245,166,35,0.45);
    color: var(--gold);
    box-shadow: 0 4px 20px rgba(245,166,35,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .tab.active .tab-icon { transform: scale(1.15); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 25%; right: 25%;
    height: 2px;
    background: var(--gold);
    border-radius: 2px 2px 0 0;
  }
  .tab[data-name="radar"].active  { background: rgba(78,205,196,0.13); border-color: rgba(78,205,196,0.4); color: var(--teal); }
  .tab[data-name="radar"].active::after { background: var(--teal); }
  .tab[data-name="ventusky"].active { background: rgba(120,100,255,0.13); border-color: rgba(120,100,255,0.4); color: #a78bfa; }
  .tab[data-name="ventusky"].active::after { background: #a78bfa; }
  .tab[data-name="terremoti"].active { background: rgba(255,107,107,0.13); border-color: rgba(255,107,107,0.4); color: #ff6b6b; }
  .tab[data-name="terremoti"].active::after { background: #ff6b6b; }
  .tab[data-name="mare"].active { background: rgba(56,182,255,0.13); border-color: rgba(56,182,255,0.4); color: #38b6ff; }
  .tab[data-name="mare"].active::after { background: #38b6ff; }
  .tab[data-name="pollini"].active { background: rgba(134,239,172,0.13); border-color: rgba(134,239,172,0.4); color: #86efac; }
  .tab[data-name="pollini"].active::after { background: #86efac; }
  .tab[data-name="gfs"].active { background: rgba(251,191,36,0.13); border-color: rgba(251,191,36,0.4); color: #fbbf24; }
  .tab[data-name="gfs"].active::after { background: #fbbf24; }
  .tab[data-name="metar"].active { background: rgba(99,202,255,0.13); border-color: rgba(99,202,255,0.4); color: #63caff; }
  .tab[data-name="metar"].active::after { background: #63caff; }
  .tab[data-name="effemeridi"].active { background: rgba(255,200,80,0.13); border-color: rgba(255,200,80,0.4); color: #ffc850; }
  .tab[data-name="effemeridi"].active::after { background: #ffc850; }

  /* MAIN CARD */
  .main-card {
    margin: 14px 20px; background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 28px; padding: 28px 24px 24px; backdrop-filter: blur(20px);
    position: relative; overflow: hidden;
  }
  .main-card::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(245,166,35,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .current-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .temp-main { font-family: 'Playfair Display', serif; font-size: 82px; font-weight: 400; line-height: 1; letter-spacing: -4px; display: inline-block; }
  .temp-main sup { font-size: 26px; letter-spacing: 0; position: relative; top: 12px; }
  .feels-like { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .weather-icon-main { font-size: 68px; line-height: 1; filter: drop-shadow(0 0 20px rgba(255,220,100,0.4)); animation: float 4s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .condition { font-size: 17px; font-weight: 500; margin-top: 14px; }
  .date-time { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .card-divider { height: 1px; background: var(--glass-border); margin: 18px 0; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); }
  .stat-item { text-align: center; position: relative; }
  .stat-item:not(:last-child)::after { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 1px; background: var(--glass-border); }
  .stat-icon { font-size: 17px; margin-bottom: 4px; }
  .stat-value { font-size: 16px; font-weight: 500; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* SECTION TITLE */
  .section-title { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); padding: 0 24px; margin: 26px 0 10px; }

  /* HOURLY */
  .hourly-scroll { display: flex; gap: 10px; padding: 4px 20px; overflow-x: auto; scrollbar-width: none; }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-card { flex: 0 0 70px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 13px 8px; text-align: center; backdrop-filter: blur(10px); }
  .hour-card.active { background: rgba(245,166,35,0.18); border-color: rgba(245,166,35,0.4); }
  .hour-time { font-size: 11px; color: var(--muted); margin-bottom: 7px; }
  .hour-card.active .hour-time { color: var(--gold); }
  .hour-icon { font-size: 20px; margin-bottom: 7px; }
  .hour-temp { font-size: 14px; font-weight: 500; }

  /* DAILY */
  .daily-list { padding: 0 20px; display: flex; flex-direction: column; gap: 7px; }
  .day-row { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 16px; padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; backdrop-filter: blur(10px); }
  .day-name { font-size: 14px; font-weight: 500; width: 76px; }
  .day-icon { font-size: 22px; }
  .day-desc { font-size: 12px; color: var(--muted); flex: 1; text-align: center; padding: 0 6px; }
  .day-temps { display: flex; gap: 8px; align-items: center; }
  .day-high { font-size: 15px; font-weight: 500; }
  .day-low { font-size: 13px; color: var(--muted); }

  /* SUN */
  .sun-card { margin: 0 20px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 22px; padding: 18px 24px; backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; }
  .sun-item { text-align: center; }
  .sun-icon { font-size: 26px; margin-bottom: 5px; }
  .sun-time { font-size: 19px; font-weight: 500; }
  .sun-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }
  .sun-divider { width: 1px; height: 46px; background: var(--glass-border); }

  /* SEA */
  .sea-grid { padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sea-item { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 18px 16px; backdrop-filter: blur(10px); text-align: center; position: relative; overflow: hidden; }
  .sea-item::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(78,205,196,0.07) 0%, transparent 70%); pointer-events: none; }
  .sea-item-icon { font-size: 28px; margin-bottom: 8px; }
  .sea-item-value { font-size: 22px; font-weight: 500; color: var(--teal); }
  .sea-item-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .sea-item-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .wave-bar { margin: 10px 20px 0; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 20px; padding: 16px 20px; backdrop-filter: blur(10px); }
  .wave-bar-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .wave-scale { display: flex; align-items: flex-end; gap: 4px; height: 44px; }
  .wave-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .wave-bar-fill { width: 100%; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, var(--teal), #1a6ea8); min-height: 4px; }
  .wave-bar-time { font-size: 9px; color: var(--muted); }

  /* POLLEN */
  .pollen-grid { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
  .pollen-row { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 18px; padding: 14px 18px; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 14px; }
  .pollen-icon { font-size: 26px; flex-shrink: 0; }
  .pollen-info { flex: 1; }
  .pollen-name { font-size: 14px; font-weight: 500; }
  .pollen-level { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pollen-bar-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; margin-top: 8px; overflow: hidden; }
  .pollen-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s ease; }
  .pollen-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 50px; white-space: nowrap; }
  .level-none   { color: #4ecdc4; background: rgba(78,205,196,0.15); }
  .level-low    { color: #a8e063; background: rgba(168,224,99,0.15); }
  .level-medium { color: #f5a623; background: rgba(245,166,35,0.15); }
  .level-high   { color: #ff6b6b; background: rgba(255,107,107,0.15); }
  .level-vhigh  { color: #ff3860; background: rgba(255,56,96,0.15); }

  /* LOADING / ERROR */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 14px; }
  .loading-icon { font-size: 44px; animation: spin 2s linear infinite; }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .loading-text { font-size: 13px; color: var(--muted); }
  .error-msg { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.2); border-radius: 16px; padding: 16px 20px; margin: 20px; font-size: 13px; color: rgba(255,180,180,0.9); text-align: center; line-height: 1.5; }

  /* FOOTER */
  .last-updated { text-align: center; font-size: 11px; color: var(--muted); margin-top: 22px; padding: 0 24px; }
  .refresh-btn { display: block; margin: 10px auto 0; background: rgba(245,166,35,0.15); border: 1px solid rgba(245,166,35,0.3); color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 22px; border-radius: 50px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
  .refresh-btn:active { background: rgba(245,166,35,0.25); transform: scale(0.97); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .geo-loading { font-size: 11px; color: var(--teal); text-align: center; padding: 6px 24px 0; min-height: 22px; }

  /* SPLASH SCREEN */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(160deg, #0d1f40 0%, #0a1628 60%, #071020 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #splash.hide {
    opacity: 0; transform: scale(1.04); pointer-events: none;
  }
  .splash-icon { font-size: 72px; animation: splashFloat 2s ease-in-out infinite; }
  @keyframes splashFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .splash-title {
    font-family: 'Playfair Display', serif;
    font-size: 38px; font-weight: 700; letter-spacing: -1px;
    color: var(--white);
  }
  .splash-sub {
    font-size: 13px; color: var(--muted); letter-spacing: 2px;
    text-transform: uppercase;
  }
  .splash-dots { display: flex; gap: 6px; margin-top: 10px; }
  .splash-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--gold); opacity: 0.3;
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .splash-dot:nth-child(2) { animation-delay: 0.2s; }
  .splash-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dotPulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

  /* VENTUSKY */
  #panel-ventusky { padding: 14px 0 0; }
  .ventusky-wrap {
    margin: 0 20px;
    border-radius: 22px; overflow: hidden;
    border: 1px solid var(--glass-border);
    position: relative; height: 480px;
  }
  .ventusky-wrap iframe {
    width: 100%; height: 100%; border: none; display: block;
  }
  .ventusky-note {
    margin: 12px 20px 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 16px; padding: 12px 16px;
    font-size: 11px; color: var(--muted); line-height: 1.6;
    backdrop-filter: blur(10px);
  }
  .ventusky-note strong { color: var(--gold); }
  .radar-wrap {
    margin: 0 20px;
    border-radius: 22px; overflow: hidden;
    border: 1px solid var(--glass-border);
    position: relative;
  }
  #radarMap { width: 100%; height: 340px; background: #0a1628; }
  .radar-controls {
    margin: 12px 20px 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 18px; padding: 14px 16px; backdrop-filter: blur(10px);
  }
  .radar-timeline {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .radar-play-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(245,166,35,0.18); border: 1px solid rgba(245,166,35,0.4);
    color: var(--gold); font-size: 14px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .radar-play-btn:active { background: rgba(245,166,35,0.3); }
  .radar-slider {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 99px;
    background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .radar-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px;
    border-radius: 50%; background: var(--gold); cursor: pointer;
    box-shadow: 0 0 6px rgba(245,166,35,0.5);
  }
  .radar-time {
    font-size: 12px; color: var(--gold); font-weight: 500; min-width: 42px; text-align: right;
  }
  .radar-row {
    display: flex; justify-content: space-between; align-items: center;
  }
  .radar-label { font-size: 11px; color: var(--muted); }
  .radar-legend {
    display: flex; align-items: center; gap: 4px;
  }
  .radar-legend-bar {
    width: 80px; height: 6px; border-radius: 99px;
    background: linear-gradient(90deg, #00d4ff, #00ff88, #ffff00, #ff8800, #ff0000);
  }
  .radar-legend-labels {
    display: flex; justify-content: space-between;
    font-size: 9px; color: var(--muted); margin-top: 2px; width: 80px;
  }
  .leaflet-container { background: #e8e0d8 !important; }
  .radar-layers {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .radar-layer-btn {
    flex: 1; padding: 6px 4px; border-radius: 10px; font-size: 11px; font-weight: 500;
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
    color: var(--muted); cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .radar-layer-btn.active {
    background: rgba(78,205,196,0.15); border-color: rgba(78,205,196,0.4);
    color: var(--teal);
  }

  /* TERREMOTI */
  .quake-list { padding: 0 20px; display: flex; flex-direction: column; gap: 8px; }
  .quake-row {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 18px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    backdrop-filter: blur(10px); cursor: pointer;
    transition: background 0.2s;
  }
  .quake-row:active { background: rgba(255,255,255,0.12); }
  .quake-mag {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; flex-shrink: 0;
    font-family: 'Playfair Display', serif;
  }
  .mag-minor  { background: rgba(78,205,196,0.2);  color: #4ecdc4; border: 1px solid rgba(78,205,196,0.3); }
  .mag-light  { background: rgba(168,224,99,0.2);  color: #a8e063; border: 1px solid rgba(168,224,99,0.3); }
  .mag-moderate{ background: rgba(245,166,35,0.2); color: #f5a623; border: 1px solid rgba(245,166,35,0.3); }
  .mag-strong { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
  .mag-major  { background: rgba(200,0,0,0.3);     color: #ff4040; border: 1px solid rgba(200,0,0,0.5); }
  .quake-info { flex: 1; min-width: 0; }
  .quake-place { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .quake-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .quake-depth { font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; }
  .quake-filter-row {
    display: flex; gap: 6px; padding: 0 20px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none;
  }
  .quake-filter-row::-webkit-scrollbar { display: none; }
  .quake-filter {
    flex: 0 0 auto; padding: 6px 14px; border-radius: 50px; font-size: 11px; font-weight: 500;
    background: var(--glass); border: 1px solid var(--glass-border);
    color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .quake-filter.active { background: rgba(255,107,107,0.15); border-color: rgba(255,107,107,0.4); color: #ff6b6b; }
  .quake-map-wrap {
    margin: 0 20px 12px; border-radius: 18px; overflow: hidden;
    border: 1px solid var(--glass-border); height: 200px;
  }
  #quakeMap { width: 100%; height: 100%; }
  .alert-banner {
    margin: 10px 20px 0;
    border-radius: 18px; padding: 14px 16px;
    display: flex; align-items: flex-start; gap: 12px;
    animation: alertPulse 2.5s ease-in-out infinite;
    cursor: pointer;
  }
  @keyframes alertPulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.82; }
  }
  .alert-banner.sev-extreme  { background: rgba(180,0,0,0.25);   border: 1px solid rgba(220,50,50,0.6);  }
  .alert-banner.sev-severe   { background: rgba(200,60,0,0.22);  border: 1px solid rgba(230,100,0,0.5); }
  .alert-banner.sev-moderate { background: rgba(180,130,0,0.2);  border: 1px solid rgba(230,180,0,0.45);}
  .alert-banner.sev-minor    { background: rgba(0,100,180,0.18); border: 1px solid rgba(60,160,230,0.4);}
  .alert-icon { font-size: 26px; flex-shrink: 0; margin-top: 1px; }
  .alert-body { flex: 1; }
  .alert-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .alert-banner.sev-extreme  .alert-title { color: #ff6060; }
  .alert-banner.sev-severe   .alert-title { color: #ff9940; }
  .alert-banner.sev-moderate .alert-title { color: #ffd040; }
  .alert-banner.sev-minor    .alert-title { color: #60c8ff; }
  .alert-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .alert-meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .alert-chevron { font-size: 14px; color: var(--muted); flex-shrink: 0; align-self: center; }
  .alert-detail {
    margin: 6px 20px 0;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 14px; padding: 14px 16px;
    font-size: 12px; color: var(--muted); line-height: 1.6;
    display: none;
  }
  .alert-detail.open { display: block; }
  .no-alerts {
    margin: 10px 20px 0;
    background: rgba(78,205,196,0.08); border: 1px solid rgba(78,205,196,0.2);
    border-radius: 16px; padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--teal);
  }
</style>

    <div class="splash-title">Top Weather</div>

    <div class="tab" data-name="mare" onclick="switchTab('mare',this)">

<script>
let currentLat = 38.1147, currentLon = 15.6500;
let currentCity = 'Reggio Calabria', currentRegion = 'Calabria, Italia';
let activeTab = 'meteo';
let searchTimer = null;

const WMO = {
  0:{label:'Sereno',icon:'☀️'},1:{label:'Prevalentemente sereno',icon:'🌤️'},
  2:{label:'Parzialmente nuvoloso',icon:'⛅'},3:{label:'Nuvoloso',icon:'☁️'},
  45:{label:'Nebbia',icon:'🌫️'},48:{label:'Nebbia gelata',icon:'🌫️'},
  51:{label:'Pioggerella',icon:'🌦️'},53:{label:'Pioggerella moderata',icon:'🌦️'},
  55:{label:'Pioggerella intensa',icon:'🌧️'},61:{label:'Pioggia leggera',icon:'🌧️'},
  63:{label:'Pioggia moderata',icon:'🌧️'},65:{label:'Pioggia intensa',icon:'🌧️'},
  71:{label:'Neve leggera',icon:'🌨️'},73:{label:'Neve moderata',icon:'❄️'},
  75:{label:'Neve intensa',icon:'❄️'},80:{label:'Rovesci leggeri',icon:'🌦️'},
  81:{label:'Rovesci moderati',icon:'🌧️'},82:{label:'Rovesci violenti',icon:'⛈️'},
  95:{label:'Temporale',icon:'⛈️'},96:{label:'Temporale con grandine',icon:'🌩️'},
  99:{label:'Temporale forte',icon:'🌩️'},
};
const getWMO = c => WMO[c] || {label:'Variabile',icon:'🌡️'};
const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const MONTHS_IT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
const formatDate = d => `${DAYS_IT[d.getDay()]} ${d.getDate()} ${MONTHS_IT[d.getMonth()]}`;
const formatTime = s => new Date(s).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
const windDir = deg => ['N','NE','E','SE','S','SO','O','NO'][Math.round(deg/45)%8];

function switchTab(name, el) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-'+name);
  if (panel) panel.classList.add('active');
  if (name === 'radar') initRadar();
  if (name === 'terremoti') initQuakes();
  if (name === 'gfs') initGFS();
  if (name === 'metar') initMetar();
  if (name === 'effemeridi') initEffemeridi();
}

// ============================================================
// TERREMOTI — USGS Earthquake API (gratuita, nessuna chiave)
// ============================================================
let quakeMap = null;
let quakeMarkers = [];
let quakeFilter = '30'; // giorni
let allQuakes = [];

function magClass(m) {
  if (m < 2.5) return 'mag-minor';
  if (m < 4.0) return 'mag-light';
  if (m < 5.0) return 'mag-moderate';
  if (m < 6.0) return 'mag-strong';
  return 'mag-major';
}
function magLabel(m) {
  if (m < 4.5) return 'Leggero';
  if (m < 5.5) return 'Moderato';
  if (m < 6.5) return 'Forte';
  if (m < 7.5) return '⚠️ Maggiore';
  return '🚨 Grande';
}
function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff/60000);
  if (m < 60) return `${m} min fa`;
  const h = Math.floor(m/60);
  if (h < 24) return `${h}h fa`;
  return `${Math.floor(h/24)}g fa`;
}

async function fetchQuakes(days) {
  const end = new Date().toISOString();
  const start = new Date(Date.now() - days*86400000).toISOString();
  // Terremoti globali
  const url = `https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson`
    + `&starttime=${start}&endtime=${end}`
    + `&minmagnitude=4.5&orderby=time&limit=100`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('Errore USGS');
  return r.json();
}

async function initQuakes() {
  await loadQuakes(quakeFilter);
}

async function loadQuakes(days) {
  quakeFilter = days;
  const el = document.getElementById('quake-content');
  if (!el) return;
  el.innerHTML = `<div class="loading"><div class="loading-icon">🌀</div><div class="loading-text">Caricamento terremoti...</div></div>`;

  try {
    const data = await fetchQuakes(parseInt(days));
    allQuakes = data.features || [];
    renderQuakes(allQuakes, days);
  } catch(e) {
    el.innerHTML = `<div class="error-msg">⚠️ Impossibile caricare i dati sismici.<br>Controlla la connessione.<br><br><button class="refresh-btn" onclick="loadQuakes('${days}')">Riprova</button></div>`;
  }
}

function renderQuakes(quakes, days) {
  const el = document.getElementById('quake-content');
  if (!el) return;

  const filters = [
    {label:'Ultime 24h', val:'1'},
    {label:'7 giorni',   val:'7'},
    {label:'30 giorni',  val:'30'},
  ];

  const listHTML = quakes.length === 0
    ? `<div class="no-alerts" style="margin:0 20px"><span style="font-size:24px">✅</span><div><div style="font-weight:600">Nessun terremoto rilevato</div><div style="font-size:11px;color:var(--muted)">Nessuna attività sismica significativa (M4.5+) nel periodo selezionato.</div></div></div>`
    : quakes.map((f,i) => {
        const p = f.properties;
        const m = p.mag?.toFixed(1) ?? '?';
        const depth = f.geometry?.coordinates?.[2]?.toFixed(0) ?? '?';
        const place = p.place || 'Posizione sconosciuta';
        return `<div class="quake-row" onclick="zoomQuake(${i})">
          <div class="quake-mag ${magClass(p.mag)}">${m}</div>
          <div class="quake-info">
            <div class="quake-place">${place}</div>
            <div class="quake-meta">${magLabel(p.mag)} · ${timeAgo(p.time)}</div>
          </div>
          <div class="quake-depth">🔻${depth} km</div>
        </div>`;
      }).join('');

  el.innerHTML = `
    <div class="quake-filter-row">
      ${filters.map(f=>`<div class="quake-filter ${days===f.val?'active':''}" onclick="loadQuakes('${f.val}')">${f.label}</div>`).join('')}
    </div>
    <div class="quake-map-wrap"><div id="quakeMap"></div></div>
    <div class="quake-list">${listHTML}</div>
    <div class="last-updated" style="margin-top:16px;padding-bottom:8px">
      ${quakes.length} eventi · Mondo · M4.5+ · Fonte: USGS
      <br><button class="refresh-btn" style="margin-top:8px" onclick="loadQuakes('${days}')">⟳ Aggiorna</button>
    </div>`;

  // Mappa
  setTimeout(() => {
    if (quakeMap) { quakeMap.remove(); quakeMap = null; }
    quakeMap = L.map('quakeMap', {
      center: [20, 0], zoom: 2,
      zoomControl: false, attributionControl: false,
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {maxZoom:18}).addTo(quakeMap);

    // Marker terremoti
    quakeMarkers = quakes.map(f => {
      const [lon, lat] = f.geometry.coordinates;
      const m = f.properties.mag ?? 0;
      const color = m>=6?'#ff3860':m>=5?'#ff6b6b':m>=4?'#f5a623':m>=2.5?'#a8e063':'#4ecdc4';
      return L.circleMarker([lat, lon], {
        radius: Math.max(4, m * 3),
        color, fillColor: color, fillOpacity: 0.6, weight: 1.5,
      }).addTo(quakeMap)
        .bindPopup(`<b>M${m.toFixed(1)}</b><br>${f.properties.place}<br>Prof: ${f.geometry.coordinates[2]?.toFixed(0)} km`);
    });
  }, 100);
}

function zoomQuake(i) {
  if (!quakeMap || !allQuakes[i]) return;
  const [lon, lat] = allQuakes[i].geometry.coordinates;
  quakeMap.setView([lat, lon], 8, {animate:true});

  document.querySelector('.quake-map-wrap')?.scrollIntoView({behavior:'smooth', block:'center'});
}

// ============================================================
// PWA — Service Worker inline (installabile senza server)
// ============================================================
function registerPWA() {
  if (!('serviceWorker' in navigator)) return;
  const swCode = `
const CACHE = 'topweather-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.') || e.request.url.includes('earthquake')) return;
  e.respondWith(
    fetch(e.request).catch(() => caches.match(e.request))
  );
});`;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'/'}).catch(()=>{});
}
registerPWA();

function doGeo() {
  if (!navigator.geolocation) { setGeoStatus('Geolocalizzazione non supportata', true); return; }
  setGeoStatus('🔍 Rilevamento posizione...');
  navigator.geolocation.getCurrentPosition(
    async pos => {
      currentLat = pos.coords.latitude;
      currentLon = pos.coords.longitude;
      setGeoStatus('');
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${currentLat}&lon=${currentLon}&format=json&accept-language=it`);
        const j = await r.json();
        const addr = j.address || {};
        currentCity = addr.city || addr.town || addr.village || addr.county || 'La tua posizione';
        currentRegion = [addr.state||'', addr.country||''].filter(Boolean).join(', ');
      } catch(e) {
        currentCity = 'La tua posizione';
        currentRegion = `${currentLat.toFixed(2)}°N ${currentLon.toFixed(2)}°E`;
      }
      updateHeader(); load();
    },
    err => {
      const msgs = {1:'Accesso negato',2:'Posizione non disponibile',3:'Timeout'};
      setGeoStatus('⚠️ ' + (msgs[err.code]||'Errore'), true);
    },
    {timeout:10000, enableHighAccuracy:true}
  );
}

// Genera allerte sintetiche dai dati Open-Meteo
function deriveAlerts(data) {
  if (!data || !data.daily) return [];
  const d = data.daily;
  const alerts = [];
  const DAYS_IT = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];

  for (let i = 0; i < Math.min(3, d.time.length); i++) {
    const date = new Date(d.time[i]);
    const dayName = i===0 ? 'Oggi' : i===1 ? 'Domani' : DAYS_IT[date.getDay()];
    const wind = d.wind_speed_10m_max?.[i] ?? 0;
    const gusts = d.wind_gusts_10m_max?.[i] ?? 0;
    const rain = d.precipitation_sum?.[i] ?? 0;
    const rainProb = d.precipitation_probability_max?.[i] ?? 0;
    const code = d.weather_code?.[i] ?? 0;
    const tMax = d.temperature_2m_max?.[i] ?? null;
    const tMin = d.temperature_2m_min?.[i] ?? null;
    const appMax = d.apparent_temperature_max?.[i] ?? tMax;
    const appMin = d.apparent_temperature_min?.[i] ?? tMin;

    // 🌡️ Caldo estremo
    if (tMax !== null && tMax >= 36) {
      const sev = tMax >= 42 ? 'sev-extreme' : tMax >= 40 ? 'sev-severe' : tMax >= 38 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🌡️',
        title: `Caldo ${tMax>=40?'estremo':'intenso'} — ${dayName}`,
        desc: `Temperatura massima: ${tMax.toFixed(0)}°C. Percepita: ${appMax!==null?appMax.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. max: ${tMax.toFixed(1)}°C · Percepita max: ${appMax!==null?appMax.toFixed(1)+'°C':'-'}. Evitare l'esposizione al sole nelle ore centrali (12–16). Bere acqua frequentemente. Attenzione a anziani, bambini e animali.`,
        day: dayName,
      });
    }

    // 🥶 Freddo intenso
    if (tMin !== null && tMin <= -2) {
      const sev = tMin <= -10 ? 'sev-severe' : tMin <= -5 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '🥶',
        title: `Freddo intenso — ${dayName}`,
        desc: `Temperatura minima: ${tMin.toFixed(0)}°C. Percepita: ${appMin!==null?appMin.toFixed(0)+'°C':'-'}.`,
        detail: `Temp. min: ${tMin.toFixed(1)}°C · Percepita min: ${appMin!==null?appMin.toFixed(1)+'°C':'-'}. Possibile formazione di ghiaccio su strade e marciapiedi. Coprirsi adeguatamente.`,
        day: dayName,
      });
    }

    // ⛈️ Temporale
    if ([95,96,99].includes(code)) {
      const sev = code===99 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '⛈️',
        title: `Temporale${code===99?' con grandine':''} — ${dayName}`,
        desc: `Previsti temporali${code===99?' con possibile grandine':''}.${rain>0?' Accumulo stimato: '+rain.toFixed(1)+' mm.':''}`,
        detail: `Codice WMO: ${code}. Precipitazioni: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. Raffiche: ${gusts.toFixed(0)} km/h.`,
        day: dayName,
      });
    }
    // 💨 Vento forte
    if (gusts >= 75 || wind >= 50) {
      const sev = gusts >= 100 ? 'sev-severe' : gusts >= 75 ? 'sev-moderate' : 'sev-minor';
      alerts.push({
        sev, icon: '💨',
        title: `Vento forte — ${dayName}`,
        desc: `Vento: ${wind.toFixed(0)} km/h, raffiche fino a ${gusts.toFixed(0)} km/h.`,
        detail: `Vento sostenuto: ${wind.toFixed(0)} km/h. Raffiche massime: ${gusts.toFixed(0)} km/h. Prestare attenzione alla navigazione e alla guida.`,
        day: dayName,
      });
    }
    // 🌧️ Pioggia intensa
    if (rain >= 40) {
      const sev = rain >= 80 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '🌧️',
        title: `Pioggia intensa — ${dayName}`,
        desc: `Accumulo previsto: ${rain.toFixed(1)} mm. Rischio allagamenti.`,
        detail: `Precipitazioni totali: ${rain.toFixed(1)} mm. Probabilità: ${rainProb}%. Possibili allagamenti locali e difficoltà alla viabilità.`,
        day: dayName,
      });
    }
    // ❄️ Neve (codici 71-77)
    if ([71,73,75,77].includes(code)) {
      const sev = code>=75 ? 'sev-severe' : 'sev-moderate';
      alerts.push({
        sev, icon: '❄️',
        title: `Neve — ${dayName}`,
        desc: `Previste nevicate${code>=75?' abbondanti':''}.`,
        detail: `Codice WMO: ${code}. Possibili disagi alla viabilità. Verificare le condizioni stradali.`,
        day: dayName,
      });
    }
  }
  // sort by severity
  const order = {'sev-extreme':0,'sev-severe':1,'sev-moderate':2,'sev-minor':3};
  return alerts.sort((a,b) => (order[a.sev]??4) - (order[b.sev]??4));
}

// Restituisce l'icona meteo tenendo conto se è giorno o notte
// sunriseTs e sunsetTs sono timestamp Unix in secondi (opzionali)
function getIcon(code, timeIso, sunriseIso, sunsetIso) {
  const t = timeIso ? new Date(timeIso) : new Date();
  const isNight = sunriseIso && sunsetIso
    ? t < new Date(sunriseIso) || t > new Date(sunsetIso)
    : (()=>{ const h=t.getHours(); return h<6||h>=21; })();

  // Icone notturne solo per cielo sereno/poco nuvoloso
  if (isNight) {
    if (code===0)  return '🌕';   // sereno → luna piena
    if (code===1)  return '🌔';   // prevalentemente sereno → luna quasi piena
    if (code===2)  return '🌙';   // parzialmente nuvoloso → luna con nuvola
    if (code===3)  return '☁️';   // nuvoloso (uguale giorno/notte)
  }
  return getWMO(code).icon;
}

async function load() {
  document.getElementById('weather-content').innerHTML = `<div class="loading"><div class="loading-icon">🌀</div><div class="loading-text">Caricamento...</div></div>`;
  try {
    const [weather, marine, pollen, alertData] = await Promise.allSettled([
      fetchWeather(), fetchMarine(), fetchPollen(), fetchAlerts()
    ]);
    if (weather.status==='rejected') throw new Error('Meteo non disponibile');
    const alerts = alertData.status==='fulfilled' ? deriveAlerts(alertData.value) : [];
    window._lastAlerts = alerts;
    render(weather.value, marine.status==='fulfilled'?marine.value:null, pollen.status==='fulfilled'?pollen.value:null);
  } catch(e) {
    document.getElementById('weather-content').innerHTML = `<div class="error-msg">⚠️ ${e.message||'Errore'}<br>Controlla la connessione.<br><br><button class="refresh-btn" onclick="load()">Riprova</button></div>`;
  }
  // Hide splash
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('hide'); setTimeout(()=>splash.remove(), 700); }
}

async function loadRadarFrames() {
  try {
    const r = await fetch('https://api.rainviewer.com/public/weather-maps.json');
    const j = await r.json();

    if (radarCurrentType === 'rainviewer') {
      radarFrames = [...(j.radar.past || []), ...(j.radar.nowcast || [])];
    } else if (radarCurrentType === 'sat_ir') {
      radarFrames = j.satellite?.infrared || [];
    } else {
      radarFrames = j.satellite?.visible || [];
    }

    if (!radarFrames.length) { setRadarTime('Nessun dato'); return; }

    const slider = document.getElementById('radarSlider');
    if (slider) { slider.max = radarFrames.length - 1; slider.value = radarFrames.length - 1; }
    radarIdx = radarFrames.length - 1;
    showRadarFrame(radarIdx);
  } catch(e) { setRadarTime('Errore caricamento'); }
}

function showRadarFrame(idx) {
  if (!radarMap || !radarFrames.length) return;
  radarIdx = idx;

  if (radarLayer) { radarMap.removeLayer(radarLayer); radarLayer = null; }

  const frame = radarFrames[idx];
  const ts = frame.time;
  const path = frame.path;

  let tileUrl;
  if (radarCurrentType === 'rainviewer') {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/2/1_1.png`;
  } else {
    tileUrl = `https://tilecache.rainviewer.com${path}/256/{z}/{x}/{y}/0/0_0.png`;
  }

  radarLayer = L.tileLayer(tileUrl, { opacity: 0.7, maxZoom: 18 }).addTo(radarMap);

  const d = new Date(ts * 1000);
  setRadarTime(d.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}));

  const slider = document.getElementById('radarSlider');
  if (slider) slider.value = idx;
}

function setRadarTime(t) {
  const el = document.getElementById('radarTime');
  if (el) el.textContent = t;
}

function onRadarSlider(val) {
  stopRadarPlay();
  showRadarFrame(parseInt(val));
}

function toggleRadarPlay() {
  radarPlaying ? stopRadarPlay() : startRadarPlay();
}

function startRadarPlay() {
  radarPlaying = true;
  const btn = document.getElementById('radarPlayBtn');
  if (btn) btn.textContent = '⏸';
  radarTimer = setInterval(() => {
    radarIdx = (radarIdx + 1) % radarFrames.length;
    showRadarFrame(radarIdx);
  }, 600);
}

function stopRadarPlay() {
  radarPlaying = false;
  const btn = document.getElementById('radarPlayBtn');
  if (btn) btn.textContent = '▶';
  if (radarTimer) { clearInterval(radarTimer); radarTimer = null; }
}

function setRadarType(type, el) {
  radarCurrentType = type;
  document.querySelectorAll('.radar-layer-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  stopRadarPlay();
  loadRadarFrames();
}

// Scala colori T 850hPa
function temp850Color(t) {
  const stops = [
    [-20,[130,0,200]],[-10,[0,0,255]],[0,[0,180,255]],
    [5,[0,220,120]],[10,[100,230,0]],[15,[255,230,0]],
    [20,[255,140,0]],[25,[255,50,0]],[30,[200,0,0]]
  ];
  t = Math.max(-20, Math.min(30, t));
  for (let i = 0; i < stops.length-1; i++) {
    const [t0,c0] = stops[i], [t1,c1] = stops[i+1];
    if (t >= t0 && t <= t1) {
      const f = (t-t0)/(t1-t0);
      return `rgba(${~~(c0[0]+(c1[0]-c0[0])*f)},${~~(c0[1]+(c1[1]-c0[1])*f)},${~~(c0[2]+(c1[2]-c0[2])*f)},0.70)`;
    }
  }
  return 'rgba(200,0,0,0.70)';
}

async function fetchGFSData() {
  const det = document.getElementById('gfs-load-detail');
  try {
    // Fetch tutti i punti in parallelo — parametri corretti Open-Meteo
    // temperature_850hPa, windspeed_850hPa, winddirection_850hPa sono i nomi ufficiali
    const urls = GFS_GRID.map(p =>
      `https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}` +
      `&hourly=temperature_850hPa,windspeed_850hPa,winddirection_850hPa` +
      `&forecast_days=5&timeformat=unixtime`
    );

    if (det) det.textContent = `0 / ${urls.length} punti...`;

    // Fetch sequenziali a gruppi di 4 per non sovraccaricare
    const results = [];
    for (let i = 0; i < urls.length; i += 4) {
      const batch = urls.slice(i, i+4).map(u => fetch(u).then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return r.json();
      }));
      const batchRes = await Promise.all(batch);
      results.push(...batchRes);
      if (det) det.textContent = `${Math.min(i+4, urls.length)} / ${urls.length} punti...`;
    }

    // Estrai ore dal primo risultato
    gfsHours = results[0].hourly.time; // unix timestamps

    // Ridimensiona a ogni 3h (prendi ogni 3° elemento)
    const stride = 3;
    const idxs = gfsHours.map((_,i)=>i).filter(i=>i%stride===0);
    gfsHours = idxs.map(i=>gfsHours[i]);

    gfsDataGrid = GFS_GRID.map((p, ri) => {
      const h = results[ri].hourly;
      return {
        lat: p.lat, lon: p.lon,
        temps:  idxs.map(i => h.temperature_850hPa?.[i] ?? null),
        wspeed: idxs.map(i => h.windspeed_850hPa?.[i] ?? null),
        wdir:   idxs.map(i => h.winddirection_850hPa?.[i] ?? null),
      };
    });

    // Nascondi loading
    const ld = document.getElementById('gfs-load');
    if (ld) ld.style.display = 'none';

    const slider = document.getElementById('gfs-slider');
    if (slider) slider.max = gfsHours.length - 1;

    gfsDrawFrame(0);

  } catch(e) {
    const ld = document.getElementById('gfs-load');
    if (ld) ld.innerHTML = `<div style="font-size:20px">⚠️</div>
      <div>Errore: ${e.message}</div>
      <div style="font-size:10px;opacity:.6;margin-top:4px">Riprova tra qualche minuto</div>
      <button onclick="gfsInitialized=false;initGFS()" style="margin-top:8px;padding:6px 14px;
        border-radius:8px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:11px">
        ↺ Riprova
      </button>`;
  }
}

function gfsDrawFrame(idx) {
  if (!gfsMap || !gfsDataGrid.length) return;
  gfsFrameIndex = idx;

  // Rimuovi overlays precedenti
  gfsOverlays.forEach(l => gfsMap.removeLayer(l));
  gfsOverlays = [];

  // Badge tempo
  const ts = gfsHours[idx] * 1000;
  const d = new Date(ts);
  const badge = document.getElementById('gfs-badge');
  if (badge) badge.textContent = d.toLocaleString('it-IT',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});

  if (gfsVar === 'temp') {
    gfsDataGrid.forEach(pt => {
      const val = pt.temps[idx];
      if (val == null) return;
      const rect = L.rectangle(
        [[pt.lat-1.0, pt.lon-1.0],[pt.lat+1.0, pt.lon+1.0]],
        { color:'none', fillColor: temp850Color(val), fillOpacity: 0.72, weight: 0 }
      );
      rect.bindTooltip(`<b>${val.toFixed(1)}°C</b><br>${pt.lat}°N ${pt.lon}°E`,{sticky:true,className:'gfs-tip'});
      rect.addTo(gfsMap);
      gfsOverlays.push(rect);
    });
  } else {
    gfsDataGrid.forEach(pt => {
      const spd = pt.wspeed[idx];
      const dir = pt.wdir[idx];
      if (spd == null || dir == null) return;
      // Freccia che punta nella direzione di provenienza
      const rad = (dir - 180) * Math.PI / 180;
      const len = Math.min(0.8 + spd * 0.03, 1.4);
      const s = [pt.lat - Math.cos(rad)*len, pt.lon - Math.sin(rad)*len];
      const e = [pt.lat + Math.cos(rad)*len, pt.lon + Math.sin(rad)*len];
      const t = Math.min(spd/35, 1);
      const col = `rgb(${~~(t*255)},${~~(200-t*160)},${~~(255-t*220)})`;
      const line = L.polyline([s,e],{color:col,weight:2.5,opacity:.9});
      const dot  = L.circleMarker(e,{radius:3,color:col,fillColor:col,fillOpacity:1,weight:0});
      line.bindTooltip(`<b>${spd.toFixed(0)} km/h</b> da ${dir.toFixed(0)}°`,{sticky:true});
      line.addTo(gfsMap); dot.addTo(gfsMap);
      gfsOverlays.push(line, dot);
    });
  }

  // UI
  const pct = (idx / Math.max(gfsHours.length-1,1)) * 100;
  const prog = document.getElementById('gfs-prog');
  if (prog) prog.style.width = pct+'%';
  const sl = document.getElementById('gfs-slider');
  if (sl) sl.value = idx;
  const lbl = document.getElementById('gfs-lbl');
  if (lbl) lbl.textContent = `+${idx*3}h`;
}

function gfsSeek(v) { stopGFSPlay(); gfsDrawFrame(+v); }
function toggleGFSPlay() { gfsPlaying ? stopGFSPlay() : startGFSPlay(); }
function startGFSPlay() {
  gfsPlaying=true;
  document.getElementById('gfs-playbtn').textContent='⏸';
  gfsTimer=setInterval(()=>gfsDrawFrame((gfsFrameIndex+1)%Math.max(gfsHours.length,1)),gfsSpeed);
}
function stopGFSPlay() {
  gfsPlaying=false; clearInterval(gfsTimer);
  const b=document.getElementById('gfs-playbtn'); if(b) b.textContent='▶';
}
function gfsSetSpd(ms,btn) {
  gfsSpeed=ms;
  document.querySelectorAll('.gfs-spd').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  if(gfsPlaying){stopGFSPlay();startGFSPlay();}
}
function gfsSetVar(v,btn) {
  gfsVar=v;
  document.querySelectorAll('.gfs-var-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const leg=document.getElementById('gfs-legend');
  if(leg) leg.style.display=v==='temp'?'flex':'none';
  if(gfsDataGrid.length) gfsDrawFrame(gfsFrameIndex);
}

async function fetchMetar(icao) {
  metarStationId = icao;
  const body = document.getElementById('metar-body');
  if (!body) return;
  body.innerHTML = `<div class="loading"><div class="loading-icon">📡</div><div class="loading-text">Carico ${icao}...</div></div>`;

  const METAR_URL = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json`;
  const TAF_URL   = `https://aviationweather.gov/api/data/taf?ids=${icao}&format=json`;

  // fetch con timeout via AbortController
  const ft = (url, ms=8000) => {
    const c = new AbortController();
    const id = setTimeout(() => c.abort(), ms);
    return fetch(url, {signal: c.signal}).finally(() => clearTimeout(id));
  };

  // Prova a parsare JSON in modo sicuro
  const safeJson = async (res) => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  };

  // 4 strategie diverse — la prima che risponde vince
  const tryStrategy = async (label) => {
    if (label === 'direct') {
      // Strategia 1: API diretta (funziona se il browser/CDN non blocca CORS)
      const [m, t] = await Promise.all([
        ft(METAR_URL, 6000).then(safeJson),
        ft(TAF_URL, 6000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'corsproxy') {
      const P = 'https://corsproxy.io/?url=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 9000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   9000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'allorigins') {
      const P = 'https://api.allorigins.win/get?url=';
      const [mr, tr] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(r => r.json()),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(r => r.json()).catch(() => ({contents:'[]'})),
      ]);
      const m = JSON.parse(mr.contents || '[]');
      const t = JSON.parse(tr.contents || '[]');
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
    if (label === 'codetabs') {
      const P = 'https://api.codetabs.com/v1/proxy?quest=';
      const [m, t] = await Promise.all([
        ft(P + encodeURIComponent(METAR_URL), 10000).then(safeJson),
        ft(P + encodeURIComponent(TAF_URL),   10000).then(safeJson).catch(() => []),
      ]);
      return { m: Array.isArray(m) ? m[0] : null, t: Array.isArray(t) ? t[0] : null };
    }
  };

  const strategies = ['direct', 'corsproxy', 'allorigins', 'codetabs'];

  for (let i = 0; i < strategies.length; i++) {
    try {
      const result = await tryStrategy(strategies[i]);
      if (!result.m) throw new Error('empty response');
      renderMetarResult(result.m, result.t, icao);
      return;
    } catch (e) {
      console.warn(`METAR strategy ${strategies[i]} failed:`, e.message);
      if (i < strategies.length - 1) {
        body.innerHTML = `<div class="loading">
          <div class="loading-icon">📡</div>
          <div class="loading-text">Fonte ${i+1} non disponibile, provo alternativa ${i+2}/${strategies.length}...</div>
        </div>`;
      }
    }
  }

  // Tutte le fonti fallite
  body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
    <div style="font-size:28px">⚠️</div>
    <div style="margin-top:8px;font-size:13px">Nessun servizio ha risposto per <b>${icao}</b>.<br>
    <span style="font-size:11px;opacity:.7">Controlla il codice ICAO e la connessione, poi riprova.</span></div>
    <button onclick="fetchMetar('${icao}')" style="margin-top:14px;padding:8px 20px;
      border-radius:10px;border:none;background:var(--gold);color:#000;cursor:pointer;font-size:12px;font-weight:700">
      ↺ Riprova
    </button>
  </div>`;
}

function metarWxIcon(wx) {
  if (!wx) return '';
  if (wx.includes('TS')) return '⛈';
  if (wx.includes('RA') || wx.includes('DZ')) return '🌧';
  if (wx.includes('SN') || wx.includes('GS')) return '❄️';
  if (wx.includes('FG') || wx.includes('BR')) return '🌫';
  if (wx.includes('HZ')) return '😶‍🌫️';
  if (wx.includes('SQ') || wx.includes('FC')) return '🌪';
  return '🌦';
}

function flightRule(vis, ceil) {
  // vis in statute miles, ceil in feet
  if (ceil < 500 || vis < 1) return ['LIFR','fr-lifr'];
  if (ceil < 1000 || vis < 3) return ['IFR','fr-ifr'];
  if (ceil < 3000 || vis < 5) return ['MVFR','fr-mvfr'];
  return ['VFR','fr-vfr'];
}

function renderMetarResult(m, taf, icao) {
  const body = document.getElementById('metar-body');
  if (!m) {
    body.innerHTML = `<div style="padding:20px 16px;text-align:center;color:var(--muted)">
      <div style="font-size:28px">🚫</div><div>Nessun METAR disponibile per ${icao}.<br>Verifica il codice ICAO.</div></div>`;
    return;
  }

  // --- decodifica METAR ---
  const wind = m.wdir != null
    ? `${m.wdir === 0 && m.wspd === 0 ? 'CALMA' : m.wdir + '°'} ${m.wspd || 0} kt${m.wgst ? ' / Raffica ' + m.wgst + ' kt' : ''}`
    : 'N/D';
  const vis  = m.visib != null ? (m.visib >= 9999 ? '≥10 km' : m.visib + ' SM') : 'N/D';
  const temp = m.temp  != null ? m.temp + ' °C' : 'N/D';
  const dewp = m.dewp  != null ? m.dewp + ' °C' : 'N/D';
  const altim = m.altim != null ? m.altim.toFixed(0) + ' hPa' : 'N/D';
  const wxStr = (m.wxString || '').trim();
  const wxIcon = metarWxIcon(wxStr);

  // Sky condition
  const skyMap = { SKC:'Cielo libero', CLR:'Cielo libero', FEW:'Poche nuvole', SCT:'Nuvolosità variabile', BKN:'Molto nuvoloso', OVC:'Coperto', VV:'Visibilità verticale' };
  const skyChips = (m.clouds || []).map(c =>
    `<span class="metar-sky-chip">${skyMap[c.cover]||c.cover} ${c.base != null ? c.base*100+'\'' : ''}</span>`
  ).join('');

  // Ceiling for flight rules
  const bknovc = (m.clouds||[]).filter(c=>['BKN','OVC','VV'].includes(c.cover));
  const ceil = bknovc.length ? Math.min(...bknovc.map(c=>c.base*100)) : 99999;
  const [fr, frClass] = flightRule(m.visib || 99, ceil);

  // Orario
  const obsTime = m.reportTime ? new Date(m.reportTime).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})+' UTC' : '';

  // --- TAF ---
  let tafHTML = '<div style="padding:0 16px 8px;color:var(--muted);font-size:12px">Nessun TAF disponibile.</div>';
  if (taf && taf.rawTAF) {
    // Mostra TAF grezzo con parsing basilare
    const lines = taf.rawTAF.replace(/\n/g,' ').split(/(TEMPO|BECMG|FM\d{6}|PROB\d{2}\s+TEMPO|PROB\d{2})/)
      .filter(s=>s.trim());
    let tafParsed = '';
    let mainBlock = true;
    for (let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      if (!l) continue;
      if (/^(TEMPO|BECMG|FM\d{6}|PROB\d{2})/.test(l)) {
        // keyword, next is content
        const keyword = l;
        const content = lines[i+1] ? lines[i+1].trim() : '';
        i++;
        const kLabel = keyword.startsWith('FM') ? '⏩ Da '+keyword.slice(2)
          : keyword.startsWith('TEMPO') ? '⚡ Temporaneamente'
          : keyword.startsWith('BECMG') ? '🔄 In evoluzione'
          : keyword.startsWith('PROB') ? '🎲 '+keyword
          : keyword;
        tafParsed += `<div class="taf-line"><div class="taf-period">${kLabel}</div><div class="taf-text">${content}</div></div>`;
      } else if (mainBlock) {
        tafParsed += `<div class="taf-line"><div class="taf-period">📋 Previsione base</div><div class="taf-text">${l}</div></div>`;
        mainBlock = false;
      }
    }
    const tafValidity = taf.validTimeFrom && taf.validTimeTo
      ? `Valido: ${new Date(taf.validTimeFrom * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} → ${new Date(taf.validTimeTo * 1000).toLocaleString('it-IT',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})} UTC`
      : '';
    tafHTML = `
      <div class="metar-card">
        <div class="metar-card-title">📋 TAF — ${icao} <span style="font-weight:400;font-size:9px;margin-left:auto">${tafValidity}</span></div>
        <div class="metar-raw">${taf.rawTAF || ''}</div>
        <div>${tafParsed}</div>
      </div>`;
  }

  body.innerHTML = `
    <div class="metar-time">📡 Osservazione: ${obsTime}</div>
    <div class="metar-card">
      <div class="metar-card-title">
        <span class="metar-cond">${wxIcon||'🌡'}</span>
        METAR — ${m.name||icao}
        <span class="metar-flight-rule ${frClass}">${fr}</span>
      </div>
      <div class="metar-raw">${m.rawOb || ''}</div>
      <div class="metar-grid">
        <div class="metar-item"><div class="metar-item-lbl">🌡 Temperatura</div><div class="metar-item-val">${temp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💧 Punto di rugiada</div><div class="metar-item-val">${dewp}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">💨 Vento</div><div class="metar-item-val" style="font-size:12px">${wind}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">👁 Visibilità</div><div class="metar-item-val">${vis}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">🔵 Pressione QNH</div><div class="metar-item-val">${altim}</div></div>
        <div class="metar-item"><div class="metar-item-lbl">☁️ Nuvolosità</div>
          <div class="metar-sky">${skyChips||'<span class="metar-sky-chip">N/D</span>'}</div>
        </div>
      </div>
      ${wxStr ? `<div class="metar-sky" style="margin-top:10px"><span class="metar-wx-chip">${wxIcon} ${wxStr}</span></div>` : ''}
    </div>
    ${tafHTML}
    <div class="last-updated" style="margin:4px 16px 12px">Fonte: NOAA Aviation Weather Center · aviationweather.gov</div>
    <div id="gps-sat-card" style="margin:0 16px 12px">
      <div style="background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;padding:14px 16px">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:10px">
          🛰 Satelliti GNSS visibili
        </div>
        <div id="gps-sat-body">
          <button onclick="initGpsSat()" style="width:100%;padding:10px;border-radius:10px;border:1px solid var(--glass-border);
            background:var(--glass);color:var(--text);font-size:13px;cursor:pointer">
            📡 Richiedi posizione GPS
          </button>
        </div>
      </div>
    </div>
  `;
}

// GPS SATELLITI — TLE reali da GitHub Pages (aggiornati ogni giorno)
// ============================================================

// ⚙️ CONFIGURA QUI il tuo repository GitHub Pages dopo il setup
const TLE_BASE = 'https://TUO_UTENTE.github.io/gnss-tle';

const GNSS_CONSTELLATIONS = [
  { id: 'GPS',     name: 'GPS',     color: '#4ade80', file: 'gps'     },
  { id: 'GLONASS', name: 'GLONASS', color: '#60a5fa', file: 'glonass' },
  { id: 'GALILEO', name: 'Galileo', color: '#f59e0b', file: 'galileo' },
  { id: 'BEIDOU',  name: 'BeiDou',  color: '#f87171', file: 'beidou'  },
];

// Cache TLE in memoria (evita re-fetch ad ogni aggiornamento 60s)
const tleCache = {};
let tleMeta = null;

async function fetchTLE(constId, file) {
  // Usa cache se presente e recente (max 6 ore)
  if (tleCache[constId] && (Date.now() - tleCache[constId].ts) < 6*3600*1000) {
    return tleCache[constId].sats;
  }

  const url = `${TLE_BASE}/tle/${file}.tle`;
  const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error(`HTTP ${r.status} per ${file}.tle`);
  const text = await r.text();
  if (!text || text.length < 50 || text.includes('<html')) {
    throw new Error(`Risposta non valida per ${file}.tle`);
  }

  // Parsa TLE
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const sats = [];
  for (let i = 0; i < lines.length - 2; i += 3) {
    if (lines[i+1]?.startsWith('1 ') && lines[i+2]?.startsWith('2 ')) {
      sats.push({ name: lines[i], line1: lines[i+1], line2: lines[i+2] });
    }
  }
  if (sats.length === 0) throw new Error(`Nessun satellite trovato in ${file}.tle`);

  tleCache[constId] = { sats, ts: Date.now() };
  return sats;
}

// Calcola satelliti visibili per una costellazione
function calcVisible(sats, lat, lon, now) {
  const visible = [];
  for (const sat of sats) {
    const r = satElevation(sat.line1, sat.line2, lat, lon, now);
    if (r && r.el >= 0) visible.push({ ...sat, el: r.el, az: r.az, range: r.range });
  }
  visible.sort((a, b) => b.el - a.el);
  return visible;
}const GNSS_CONSTELLATIONS = [
  { id: 'GPS',     name: 'GPS',     color: '#4ade80' },
  { id: 'GLONASS', name: 'GLONASS', color: '#60a5fa' },
  { id: 'GALILEO', name: 'Galileo', color: '#f59e0b' },
  { id: 'BEIDOU',  name: 'BeiDou',  color: '#f87171' },
];

// Nessun fetch necessario — TLE sono embedded
// Calcola satelliti visibili per una costellazione
function calcVisible(constId, lat, lon, now) {
  const sats = EMBEDDED_TLE[constId] || [];
  const visible = [];
  for (const sat of sats) {
    const r = satElevation(sat.line1, sat.line2, lat, lon, now);
    if (r && r.el >= 0) visible.push({ ...sat, el: r.el, az: r.az, range: r.range });
  }
  visible.sort((a,b) => b.el - a.el);
  return visible;
}

// Propagazione SGP4 semplificata
// Propagazione SGP4 semplificata — calcola posizione satellite in ECI
// Poi converte in azimuth/elevation dall'osservatore
function satElevation(tle1, tle2, lat, lon, now) {
  try {
    const rad = Math.PI / 180;

    // Estrai parametri TLE
    const incl   = parseFloat(tle2.slice(8,16))  * rad;
    const raan   = parseFloat(tle2.slice(17,25)) * rad;
    const eccStr = '0.' + tle2.slice(26,33).trim();
    const ecc    = parseFloat(eccStr);
    const argp   = parseFloat(tle2.slice(34,42)) * rad;
    const mm     = parseFloat(tle2.slice(52,63)); // mean motion rev/day
    const epoch  = tle1.slice(18,32);

    // Calcola tempo dall'epoca TLE
    const ey = parseInt(epoch.slice(0,2));
    const year = ey < 57 ? 2000 + ey : 1900 + ey;
    const doy  = parseFloat(epoch.slice(2));
    const epochDate = new Date(Date.UTC(year, 0, 1) + (doy - 1) * 86400000);
    const dt = (now - epochDate) / 86400000; // giorni

    // Anomalia media
    const n  = mm * 2 * Math.PI / 86400; // rad/s
    const M0 = parseFloat(tle2.slice(43,51)) * rad;
    const M  = (M0 + n * dt * 86400) % (2 * Math.PI);

    // Anomalia eccentrica (iterazione di Kepler)
    let E = M;
    for (let i = 0; i < 10; i++) E = M + ecc * Math.sin(E);

    // Anomalia vera
    const nu = 2 * Math.atan2(Math.sqrt(1+ecc)*Math.sin(E/2), Math.sqrt(1-ecc)*Math.cos(E/2));

    // Raggio orbitale (km)
    const a = Math.pow(86400 / (mm * 2 * Math.PI), 2/3) * 6378.137 * Math.pow(398600.4418, 1/3) / Math.pow(398600.4418, 1/3);
    const mu = 398600.4418;
    const a_km = Math.pow(mu / (n*n), 1/3);
    const r = a_km * (1 - ecc * Math.cos(E));

    // Posizione in piano orbitale
    const x_orb = r * Math.cos(nu);
    const y_orb = r * Math.sin(nu);

    // Rotazione in ECI (J2000 appross.)
    const cos_raan = Math.cos(raan), sin_raan = Math.sin(raan);
    const cos_incl = Math.cos(incl), sin_incl = Math.sin(incl);
    const cos_argp = Math.cos(argp), sin_argp = Math.sin(argp);

    const x = (cos_raan*cos_argp - sin_raan*sin_argp*cos_incl)*x_orb +
              (-cos_raan*sin_argp - sin_raan*cos_argp*cos_incl)*y_orb;
    const y = (sin_raan*cos_argp + cos_raan*sin_argp*cos_incl)*x_orb +
              (-sin_raan*sin_argp + cos_raan*cos_argp*cos_incl)*y_orb;
    const z = (sin_argp*sin_incl)*x_orb + (cos_argp*sin_incl)*y_orb;

    // GMST (ora siderale di Greenwich)
    const JD = now / 86400000 + 2440587.5;
    const T  = (JD - 2451545.0) / 36525.0;
    const gmst = (280.46061837 + 360.98564736629*(JD-2451545.0) + T*T*(0.000387933 - T/38710000)) % 360;
    const gmstRad = gmst * rad;

    // ECI → ECEF
    const xe = x * Math.cos(gmstRad) + y * Math.sin(gmstRad);
    const ye = -x * Math.sin(gmstRad) + y * Math.cos(gmstRad);
    const ze = z;

    // ECEF → Topocentric (az/el dall'osservatore)
    const latr = lat * rad, lonr = lon * rad;
    const Re = 6378.137;
    const x0 = Re * Math.cos(latr) * Math.cos(lonr);
    const y0 = Re * Math.cos(latr) * Math.sin(lonr);
    const z0 = Re * Math.sin(latr);

    const dx = xe - x0, dy = ye - y0, dz = ze - z0;

    const S = Math.sin(latr)*Math.cos(lonr)*dx + Math.sin(latr)*Math.sin(lonr)*dy - Math.cos(latr)*dz;
    const E2= -Math.sin(lonr)*dx + Math.cos(lonr)*dy;
    const Z = Math.cos(latr)*Math.cos(lonr)*dx + Math.cos(latr)*Math.sin(lonr)*dy + Math.sin(latr)*dz;

    const range = Math.sqrt(S*S + E2*E2 + Z*Z);
    const el = Math.asin(Z / range) / rad;
    const az = (Math.atan2(-E2, S) / rad + 360) % 360;

    return { el, az, range };
  } catch(e) {
    return null;
  }
}

async function initGpsSat() {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;
  body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:10px">
    📍 Richiedo posizione GPS...</div>`;

  // 1. Ottieni posizione dal browser
  if (!navigator.geolocation) {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center">GPS non supportato dal browser.</div>`;
    return;
  }

  navigator.geolocation.getCurrentPosition(async (pos) => {
    gpsSatPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy };

    // Controlla se TLE_BASE è configurato
    if (TLE_BASE.includes('TUO_UTENTE')) {
      body.innerHTML = `<div style="padding:16px;text-align:center;color:var(--muted)">
        <div style="font-size:24px">⚙️</div>
        <div style="margin-top:8px;font-size:13px">
          <b>Configura il backend GitHub Pages</b><br>
          <span style="font-size:11px;opacity:.7">Segui le istruzioni nel README del repository <code>gnss-tle</code>
          e sostituisci <code>TUO_UTENTE</code> nell'app con il tuo username GitHub.</span>
        </div>
      </div>`;
      return;
    }

    const now = new Date();
    const constellationResults = [];
    const allSats = [];

    // Carica meta.json per mostrare data aggiornamento TLE
    try {
      const mRes = await fetch(`${TLE_BASE}/tle/meta.json`, { signal: AbortSignal.timeout(5000) });
      if (mRes.ok) tleMeta = await mRes.json();
    } catch(e) {}

    for (let ci = 0; ci < GNSS_CONSTELLATIONS.length; ci++) {
      const c = GNSS_CONSTELLATIONS[ci];
      body.innerHTML = `<div style="font-size:12px;color:var(--muted);text-align:center;padding:12px">
        📍 ${gpsSatPos.lat.toFixed(3)}°N ${gpsSatPos.lon.toFixed(3)}°E (±${Math.round(gpsSatPos.accuracy)}m)<br>
        <div style="margin-top:6px">🛰 Carico TLE ${c.name} (${ci+1}/${GNSS_CONSTELLATIONS.length})...</div>
        <div style="margin-top:8px;height:4px;background:var(--glass-border);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${((ci)/GNSS_CONSTELLATIONS.length*100).toFixed(0)}%;background:var(--gold);border-radius:2px;transition:width .3s"></div>
        </div>
      </div>`;

      try {
        const sats = await fetchTLE(c.id, c.file);
        const visible = calcVisible(sats, gpsSatPos.lat, gpsSatPos.lon, now);
        constellationResults.push({ ...c, total: sats.length, visible, error: false });
        allSats.push(...visible.map(s => ({...s, constellation: c.id, color: c.color})));
      } catch(e) {
        console.warn(`TLE ${c.id} failed:`, e.message);
        constellationResults.push({ ...c, total: 0, visible: [], error: true, errMsg: e.message });
      }
    }

    renderGpsSat(constellationResults, allSats, gpsSatPos, now);

    // Aggiorna ogni 60s (ricalcola posizioni, non ri-scarica TLE grazie alla cache)
    clearInterval(gpsSatInterval);
    gpsSatInterval = setInterval(() => {
      navigator.geolocation.getCurrentPosition(async (pos2) => {
        gpsSatPos = { lat: pos2.coords.latitude, lon: pos2.coords.longitude, accuracy: pos2.coords.accuracy };
        const t = new Date();
        const res = [], all = [];
        for (const c of GNSS_CONSTELLATIONS) {
          try {
            const sats = await fetchTLE(c.id, c.file); // dalla cache
            const vis = calcVisible(sats, gpsSatPos.lat, gpsSatPos.lon, t);
            res.push({ ...c, total: sats.length, visible: vis, error: false });
            all.push(...vis.map(s => ({...s, constellation: c.id, color: c.color})));
          } catch(e) {
            res.push({ ...c, total: 0, visible: [], error: true });
          }
        }
        renderGpsSat(res, all, gpsSatPos, t);
      }, () => {}, { enableHighAccuracy: true, timeout: 5000, maximumAge: 30000 });
    }, 60000);

  }, (err) => {
    body.innerHTML = `<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">
      ⚠️ Posizione non disponibile: ${err.message}</div>`;
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
}

function renderGpsSat(constellations, allSats, pos, now) {
  const body = document.getElementById('gps-sat-body');
  if (!body) return;

  const cx = polarSize/2, cy = polarSize/2, cr = polarSize/2 - 10;

  // Disegna satelliti sul polar plot
  const satDots = allSats.map(s => {
    // el 90° = centro, 0° = bordo
    const rDot = cr * (1 - s.el/90);
    const azR  = (s.az - 90) * Math.PI/180; // SVG: 0=destra, ma az 0=Nord
    const sx   = cx + rDot * Math.cos(azR);
    const sy   = cy + rDot * Math.sin(azR);

  const polarSVG = `

      <circle cx="${cx}" cy="${cy}" r="${cr*2/3}" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

      <text x="${cx-3}" y="${cy-cr-3}" font-size="9" fill="rgba(255,255,255,0.35)">N</text>
      <text x="${cx-3}" y="${cy+cr+11}" font-size="9" fill="rgba(255,255,255,0.35)">S</text>
      <text x="${cx+cr+3}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">E</text>
      <text x="${cx-cr-11}" y="${cy+4}" font-size="9" fill="rgba(255,255,255,0.35)">W</text>
      <text x="${cx-4}" y="${cy+cr*2/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">30°</text>
      <text x="${cx-4}" y="${cy+cr/3+4}" font-size="7" fill="rgba(255,255,255,0.25)">60°</text>
      ${satDots}
    </svg>`;

  // Sommario per costellazione
  const constRows = constellations.map(c => `
    <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <div style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;font-weight:600;color:var(--text)">${c.name}</div>
      ${c.error ? `<div style="font-size:11px;color:var(--muted)">N/D</div>` : `
        <div style="font-size:11px;color:var(--muted)">${c.total} totali</div>
        <div style="font-size:13px;font-weight:700;color:${c.color};min-width:28px;text-align:right">${c.visible.length} ↑</div>
      `}
    </div>`).join('');

  // Top 5 satelliti per elevazione
  const top5 = allSats.slice(0,8).map(s => `
    <div style="display:flex;align-items:center;gap:6px;padding:4px 0">
      <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
      <div style="font-size:10px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name.replace(/\s+/g,' ').trim()}</div>
      <div style="font-size:11px;font-weight:600;color:var(--text)">${s.el.toFixed(1)}°</div>
      <div style="font-size:10px;color:var(--muted)">${s.az.toFixed(0)}°</div>
    </div>`).join('');

  // Qualità del fix
  const qualityColor = pos.accuracy < 5 ? '#4ade80' : pos.accuracy < 20 ? '#f59e0b' : '#f87171';
  const qualityLabel = pos.accuracy < 5 ? 'Eccellente' : pos.accuracy < 20 ? 'Buono' : pos.accuracy < 50 ? 'Discreto' : 'Scarso';

  body.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.3);border-radius:10px;

        <div style="font-size:12px;font-weight:700;color:${qualityColor}">±${Math.round(pos.accuracy)}m — ${qualityLabel}</div>
      </div>
    </div>

    ${constRows}

    <div style="margin:10px 0 6px;font-size:10px;color:var(--muted);text-align:center">🌐 Vista polare del cielo — punti = satelliti sopra l'orizzonte</div>
    ${polarSVG}

    <div style="margin-top:8px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;margin-bottom:4px">TOP ELEVAZIONE</div>
      ${top5}

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
      <div style="font-size:9px;color:var(--muted);opacity:.6">
        TLE: ${tleMeta ? 'Celestrak ' + tleMeta.updated.slice(0,10) : 'Celestrak'} · Aggiorn. ogni 60s · ${now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
      </div>
      <button onclick="initGpsSat()" style="padding:4px 10px;border-radius:8px;border:1px solid var(--glass-border);
        background:var(--glass);color:var(--muted);font-size:10px;cursor:pointer">↺ Aggiorna</button>
    </div>
  `;
}

// Algoritmo sunrise/sunset NOAA (gml.noaa.gov/grad/solcalc)
// Restituisce orari in UTC come oggetti Date
function sunTimes(lat, lon, date) {
  const rad = Math.PI / 180;

  // Julian Day Number (mezzogiorno UTC del giorno dato)
  const y = date.getFullYear(), m = date.getMonth()+1, d = date.getDate();
  const A = Math.floor((14-m)/12);
  const Y = y + 4800 - A;
  const M2 = m + 12*A - 3;
  const JD = d + Math.floor((153*M2+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045;

  // Secolo giuliano da J2000
  const JC = (JD - 2451545.0) / 36525.0;

  // Longitudine media del sole
  const L0 = (280.46646 + JC*(36000.76983 + JC*0.0003032)) % 360;

  // Anomalia media
  const Mdeg = (357.52911 + JC*(35999.05029 - 0.0001537*JC)) % 360;
  const Mr = Mdeg * rad;

  // Centro dell'equazione
  const C = (1.914602 - JC*(0.004817 + 0.000014*JC))*Math.sin(Mr)
           + (0.019993 - 0.000101*JC)*Math.sin(2*Mr)
           + 0.000289*Math.sin(3*Mr);

  // Longitudine vera e apparente
  const SunLon = L0 + C;
  const omega  = 125.04 - 1934.136*JC;
  const AppLon = SunLon - 0.00569 - 0.00478*Math.sin(omega*rad);

  // Obliquità corretta
  const MeanObl = 23 + (26 + (21.448 - JC*(46.815 + JC*(0.00059 - JC*0.001813)))/60)/60;
  const OblCorr = MeanObl + 0.00256*Math.cos(omega*rad);

  // Declinazione solare
  const sinDecl = Math.sin(OblCorr*rad) * Math.sin(AppLon*rad);
  const Decl = Math.asin(sinDecl) / rad;

  // Equazione del tempo (minuti)
  const y2 = Math.tan(OblCorr*rad/2)**2;
  const ecc = 0.016708634;
  const EqT = 4/rad * (y2*Math.sin(2*L0*rad) - 2*ecc*Math.sin(Mr)
              + 4*ecc*y2*Math.sin(Mr)*Math.cos(2*L0*rad)
              - 0.5*y2*y2*Math.sin(4*L0*rad)
              - 1.25*ecc*ecc*Math.sin(2*Mr));

  // Angolo orario all'alba/tramonto
  const cosHA = (Math.sin(-0.8333*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
               / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  if (Math.abs(cosHA) > 1) return null;
  const HA = Math.acos(cosHA) / rad; // gradi

  // Mezzogiorno solare in minuti da mezzanotte UTC
  const noonMin  = 720 - 4*lon - EqT;
  const riseMin  = noonMin - HA*4;
  const setMin   = noonMin + HA*4;

  // Crepuscolo civile (~34 min prima/dopo per -6° sotto orizzonte, usiamo -50' per astronomico civile approx)
  const cosHAdawn = (Math.sin(-6*rad) - Math.sin(lat*rad)*Math.sin(Decl*rad))
                   / (Math.cos(lat*rad)*Math.cos(Decl*rad));
  const HAdawn = Math.abs(cosHAdawn) <= 1 ? Math.acos(Math.max(-1,Math.min(1,cosHAdawn)))/rad : HA+20;
  const dawnMin = noonMin - HAdawn*4;
  const duskMin = noonMin + HAdawn*4;

  // Converti minuti UTC → Date UTC
  const minsToDate = (mins) => {
    const base = new Date(Date.UTC(y, m-1, d));
    return new Date(base.getTime() + mins*60000);
  };

  return {
    rise:    minsToDate(riseMin),
    set:     minsToDate(setMin),
    transit: minsToDate(noonMin),
    dawn:    minsToDate(dawnMin),
    dusk:    minsToDate(duskMin),
    dayLen:  (setMin - riseMin) / 60,
    decl:    Decl.toFixed(1),
    elevation: (90 - Math.abs(lat - Decl)).toFixed(1),
  };
}

// Fase lunare
function moonPhase(date) {
  const known = new Date(2000, 0, 6, 18, 14); // new moon 6 Jan 2000
  const diff = (date - known) / (1000*60*60*24);
  const cycle = 29.53058867;
  const phase = ((diff % cycle) + cycle) % cycle;
  const pct = phase / cycle;
  const icons = ['🌑','🌒','🌒','🌓','🌔','🌔','🌕','🌖','🌖','🌗','🌘','🌘','🌑'];
  const names = ['Luna Nuova','Crescente','Crescente','Primo Quarto','Gibbosa Crescente','Gibbosa Crescente','Luna Piena','Gibbosa Calante','Gibbosa Calante','Ultimo Quarto','Calante','Calante','Luna Nuova'];
  const idx = Math.round(pct * 12) % 13;
  return { phase, pct, icon: icons[idx], name: names[idx] };
}

// Stagione astronomica
function season(date, lat) {
  const m = date.getMonth();
  const isNorth = lat >= 0;
  if (isNorth) {
    if (m >= 2 && m <= 4) return ['🌸 Primavera', '21 Mar'];
    if (m >= 5 && m <= 7) return ['☀️ Estate',    '21 Giu'];
    if (m >= 8 && m <= 10) return ['🍂 Autunno',  '22 Set'];
    return ['❄️ Inverno', '21 Dic'];
  } else {
    if (m >= 2 && m <= 4) return ['🍂 Autunno',   '21 Mar'];
    if (m >= 5 && m <= 7) return ['❄️ Inverno',   '21 Giu'];
    if (m >= 8 && m <= 10) return ['🌸 Primavera','22 Set'];
    return ['☀️ Estate', '21 Dic'];
  }
}
