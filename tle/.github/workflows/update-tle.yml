name: Update GNSS TLE

on:
  schedule:
    - cron: '0 6 * * *'   # ogni giorno alle 06:00 UTC
  workflow_dispatch:        # eseguibile manualmente dal sito GitHub

jobs:
  update-tle:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # permesso per fare commit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download TLE from Celestrak
        run: |
          mkdir -p tle

          download_tle() {
            local name=$1
            local url=$2
            local file="tle/${name}.tle"
            echo "Downloading ${name}..."
            if curl -sf --max-time 30 \
              -H "User-Agent: Mozilla/5.0 (compatible; TLE-Updater/1.0)" \
              "$url" -o "$file"; then
              lines=$(wc -l < "$file")
              echo "  OK: ${lines} righe"
            else
              echo "  WARN: fallito, provo URL alternativo..."
              # URL alternativo
              curl -sf --max-time 30 \
                -H "User-Agent: Mozilla/5.0" \
                "${2/api\/tle\/?GROUP=/gnss\/}" -o "$file" || echo "  ERR: entrambi falliti"
            fi
          }

          download_tle "gps"     "https://celestrak.org/api/tle/?GROUP=gps-ops&FORMAT=tle"
          download_tle "glonass" "https://celestrak.org/api/tle/?GROUP=glonass-ops&FORMAT=tle"
          download_tle "galileo" "https://celestrak.org/api/tle/?GROUP=galileo&FORMAT=tle"
          download_tle "beidou"  "https://celestrak.org/api/tle/?GROUP=beidou&FORMAT=tle"

      - name: Generate metadata JSON
        run: |
          python3 << 'PYEOF'
          import json, os, datetime

          meta = {
            "updated": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "source": "Celestrak (celestrak.org)",
            "constellations": {}
          }

          for name in ["gps", "glonass", "galileo", "beidou"]:
            path = f"tle/{name}.tle"
            if os.path.exists(path):
              with open(path) as f:
                lines = [l.strip() for l in f if l.strip()]
              # Conta satelliti (ogni 3 righe = 1 satellite)
              count = sum(1 for l in lines if l.startswith("1 "))
              meta["constellations"][name.upper()] = {
                "satellites": count,
                "file": f"tle/{name}.tle"
              }

          with open("tle/meta.json", "w") as f:
            json.dump(meta, f, indent=2)

          print(json.dumps(meta, indent=2))
          PYEOF

      - name: Commit and push TLE files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tle/
          if git diff --staged --quiet; then
            echo "Nessuna modifica ai TLE."
          else
            git commit -m "🛰 Aggiornamento TLE GNSS $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
